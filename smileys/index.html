    s.el.appendChild(d);
  }

  // Transform a cute playground smiley into a battle-hardened warrior look:
  // tribe war-paint color (the face uses var(--ink), so this recolors it),
  // fierce angled brows, and a bolder, more grown-up line weight.
  // West = blue, East = red. Applied from the build phase and kept for the
  // whole saga (the smiley faces use var(--ink), so this recolors them).
  const TRIBE_COLORS = { left: '#2f5d86', right: '#9c3526' };
  function makeWarriorLook(s) {
    const color = TRIBE_COLORS[s.side] || '#5a1810';
    s.el.style.setProperty('--ink', color);
    s.el.classList.add('warrior-look');
    const wrap = s.el.querySelector('.face-wrap');
    if (!wrap) return;
    // Fierce angled brows overlay — angle differs slightly per smiley for variety
    const angle = 4 + Math.random() * 5;
    const brow = document.createElement('div');
    brow.className = 'war-brows';
    brow.style.cssText = 'position:absolute; inset:0; pointer-events:none; z-index:3;';
    brow.innerHTML = `<svg viewBox="0 0 100 100" style="position:absolute;inset:0;overflow:visible">
      <path d="M 26 ${40-angle} L 44 ${40+angle}" stroke="${color}" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M 74 ${40-angle} L 56 ${40+angle}" stroke="${color}" stroke-width="5" stroke-linecap="round" fill="none"/>
    </svg>`;
    wrap.appendChild(brow);
    // A war headband ribbon (class-colored) fluttering behind the head
    const band = document.createElement('div');
    band.className = 'war-band';
    band.style.cssText = `position:absolute; left:0; right:0; top:24%; height:8%; z-index:1; pointer-events:none;`;
    band.innerHTML = `<svg viewBox="0 0 100 20" preserveAspectRatio="none" style="width:100%;height:100%;overflow:visible">
      <path d="M 8 8 Q 50 4 92 8 L 92 14 Q 50 11 8 14 Z" fill="${color}" opacity="0.9"/>
      <path d="M ${s.side==='left'?8:92} 10 q ${s.side==='left'?-16:16} 2 ${s.side==='left'?-20:20} 12 q ${s.side==='left'?10:-10} -2 ${s.side==='left'?14:-14} -8 Z" fill="${color}" opacity="0.75"/>
    </svg>`;
    wrap.appendChild(band);
  }

  // God's love undoes the war: remove tribe colour + fierce brows + headband,
  // hide HP/weapon, and let the original peaceful smiley face return.
  function makePeaceful(s) {
    s.el.style.removeProperty('--ink');
    s.el.classList.remove('warrior-look', 'warrior', 'flip-x', 'builder', 'marching');
    s.el.style.transform = '';
    const wrap = s.el.querySelector('.face-wrap');
    if (wrap) {
      const brow = wrap.querySelector('.war-brows'); if (brow) brow.remove();
      const band = wrap.querySelector('.war-band'); if (band) band.remove();
    }
    if (s.weaponIcon) { s.weaponIcon.remove(); s.weaponIcon = null; }
    const flag = s.el.querySelector('.cmd-flag'); if (flag) flag.remove();
    s.el.classList.remove('commander');
    const hp = s.el.querySelector('.hpbar'); if (hp) hp.style.display = 'none';
  }

  // God's renewal paints every smiley in a bright, happy hue and gives it
  // rosy cheeks — the colourless ink world bursts into colour.
  const VIBRANT_INKS = ['#e8553a','#2aa7a0','#e0962a','#7b54c9','#3f9d4a','#3a86d6','#d9508f','#d8a51e'];
  function makeVibrant(s) {
    s.el.style.setProperty('--ink', pick(VIBRANT_INKS));
    const wrap = s.el.querySelector('.face-wrap');
    if (wrap && !wrap.querySelector('.cheeks')) {
      const ch = document.createElement('div');
      ch.className = 'cheeks';
      ch.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:2;';
      ch.innerHTML = '<svg viewBox="0 0 100 100" style="position:absolute;inset:0;overflow:visible"><circle cx="31" cy="60" r="7" fill="rgba(255,120,120,0.5)"/><circle cx="69" cy="60" r="7" fill="rgba(255,120,120,0.5)"/></svg>';
      wrap.appendChild(ch);
    }
  }

  function assignClass(s, cls) {
    s.cls = cls;
    s.maxHp = Math.round(cls.hp * BATTLE_HP_MULT);
    s.hp = s.maxHp;
    s.dmg = cls.dmg * BATTLE_DMG_MULT;
    s.range = cls.range;
    s.critChance = cls.crit || 0.12;   // per-class critical hit chance
    s.critDmg = cls.critDmg || 1.6;    // per-class critical damage multiplier
    s.cooldown = 0;
    s.atkAnim = 0;
    if (cls.scale) {
      const cur = parseFloat(s.el.style.width);
      s.el.style.width  = (cur * cls.scale) + 'px';
      s.el.style.height = (cur * cls.scale) + 'px';
      s.size = cur * cls.scale;
    }
    // Replace icon with permanent weapon icon (was preview)
    if (s.weaponIcon) s.weaponIcon.remove();
    const icon = document.createElement('div');
    icon.style.cssText = 'position:absolute; left:50%; top:-30px; transform:translateX(-50%); width:24px; height:24px; pointer-events:none;';
    icon.innerHTML = `<svg viewBox="0 0 24 24" style="width:100%;height:100%;overflow:visible"><use href="#${cls.icon}"/></svg>`;
    s.el.appendChild(icon);
    s.weaponIcon = icon;
    if (cls.key === 'flying') {
      const baseTop = parseFloat(s.el.style.top);
      s.flyHover = rand(80, 160);
      s.el.style.top = (baseTop - s.flyHover) + 'px';
      s.flying = true;
      s.baseY = parseFloat(s.el.style.top);
    } else {
      s.baseY = parseFloat(s.el.style.top);
    }
  }

  // ── Battle pacing: long enough for both ults to fire ──
  const BATTLE_HP_MULT = 4.8, BATTLE_DMG_MULT = 0.85;
  let leftCmd = null, rightCmd = null;
  let battleDustTimer = null;

  // ── MP + team HUD (RPG layer) ──
  const MP_MAX = 100;
  const mp = { left: 0, right: 0 };
  let specialActive = false;

  // ── WAR ESCALATION — no battle is allowed to last forever ──
  // • WAR FATIGUE (3+ min): all mending wanes, gone entirely by 6 min
  // • BLOODLUST (4+ min): every blow grows heavier, +10% per 30s (cap ×2.5)
  // • FINAL DUEL (≤2 left each side): the commanders settle it themselves —
  //   no blinks, no barriers, no absorb, shields falter
  let battleT0 = 0;
  const esc = { fatigueOn: false, bloodOn: false, duel: false, duelTimer: 0 };
  function battleMin() { return battleT0 ? (performance.now() - battleT0) / 60000 : 0; }
  function healScale() {
    const m = battleMin();
    return m <= 3 ? 1 : Math.max(0, 1 - (m - 3) / 3);
  }
  function bloodScale() {
    const m = battleMin();
    return m <= 4 ? 1 : Math.min(2.5, 1 + Math.floor((m - 4) * 2) * 0.10);
  }
  const teamHud = document.getElementById('team-hud');
  const hpWEl = document.getElementById('hp-west'), hpEEl = document.getElementById('hp-east');
  const mpWEl = document.getElementById('mp-west'), mpEEl = document.getElementById('mp-east');
  function gainMp(side, amt) {
    if (side !== 'left' && side !== 'right') return;
    mp[side] = Math.max(0, Math.min(MP_MAX, mp[side] + amt));
  }
  function updateTeamHud() {
    if (!teamHud || teamHud.style.display === 'none') return;
    const pct = tribe => {
      let cur = 0, max = 0;
      tribe.forEach(s => { max += s.maxHp || 0; cur += s.alive ? Math.max(0, s.hp) : 0; });
      return max ? (cur / max * 100) : 0;
    };
    hpWEl.style.width = pct(leftTribe) + '%';
    hpEEl.style.width = pct(rightTribe) + '%';
    mpWEl.style.width = (mp.left / MP_MAX * 100) + '%';
    mpEEl.style.width = (mp.right / MP_MAX * 100) + '%';
    mpWEl.classList.toggle('full', mp.left >= MP_MAX);
    mpEEl.classList.toggle('full', mp.right >= MP_MAX);
  }

  // Commanders — WEST: a tank on the front line bearing a great shield,
  // whose war roar speeds up his allies. EAST: a wizard at the backline in
  // a massive hat, mending his ranks with AoE heals.
  function setupCommanders() {
    leftCmd = null; rightCmd = null;
    [['left', leftTribe], ['right', rightTribe]].forEach(([side, tribe]) => {
      const alive = tribe.filter(s => s.alive);
      if (!alive.length) return;
      const wantKey = side === 'left' ? 'armored' : 'wizard';
      const cmd = alive.find(s => s.cls.key === wantKey) || alive[0];
      if (cmd.cls.key !== wantKey) assignClass(cmd, ALL_CLASSES.find(c => c.key === wantKey));
      cmd.commander = true;
      cmd.role = side === 'left' ? 'frontline' : 'backline';
      cmd.maxHp = Math.round(cmd.maxHp * (side === 'left' ? 3.4 : 2.0)); cmd.hp = cmd.maxHp; updateHp(cmd);
      if (side === 'right') {
        // The archmage strikes TRUE — no shield, barrier or vanguard stops
        // his magic (save the tank commander's great shield), and it crits hard
        cmd.trueDamage = true;
        cmd.critChance = 0.42;
        cmd.critDmg = 2.2;
      }
      const cur = parseFloat(cmd.el.style.width);
      cmd.el.style.width = (cur * 1.45) + 'px'; cmd.el.style.height = (cur * 1.45) + 'px'; cmd.size = cur * 1.45;
      cmd.el.classList.add('commander');
      const color = TRIBE_COLORS[side] || '#5a1810';
      const flag = document.createElement('div');
      flag.className = 'cmd-flag';
      flag.innerHTML = `<svg viewBox="0 0 34 44"><path d="M6 44 L6 2" stroke="${color}" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M6 4 L31 9 L6 19 Z" fill="${color}"/></svg>`;
      cmd.el.appendChild(flag);
      const W = window.innerWidth;
      if (side === 'left') {
        // The GREAT SHIELD — carried at the front, always
        const sh = document.createElement('div');
        sh.className = 'cmd-shield';
        sh.innerHTML = `<svg viewBox="0 0 60 80" style="width:100%;height:100%;overflow:visible">
          <path d="M30 2 L56 10 L56 42 Q56 66 30 78 Q4 66 4 42 L4 10 Z" fill="#2f5d86" opacity="0.94" stroke="#1d3c58" stroke-width="3"/>
          <path d="M30 10 L48 15 L48 42 Q48 58 30 68 Q12 58 12 42 L12 15 Z" fill="none" stroke="rgba(245,236,208,.7)" stroke-width="2"/>
          <path d="M22 34 L30 26 L38 34 L30 42 Z" fill="#ffd257" stroke="#1d3c58" stroke-width="2"/>
        </svg>`;
        cmd.el.appendChild(sh);
        cmd.homeX = W * 0.42;
        leftCmd = cmd;
      } else {
        // The MASSIVE WIZARD HAT
        const hat = document.createElement('div');
        hat.className = 'cmd-hat';
        hat.innerHTML = `<svg viewBox="0 0 100 70" style="width:100%;height:100%;overflow:visible">
          <path d="M52 0 Q70 4 66 15 Q59 10 54 17 L76 54 L24 54 Q42 22 52 0 Z" fill="#8c2f22" stroke="#3a2218" stroke-width="2.5"/>
          <ellipse cx="50" cy="57" rx="37" ry="8" fill="#8c2f22" stroke="#3a2218" stroke-width="2.5"/>
          <path d="M36 42 L66 42 L68 50 L34 50 Z" fill="#d9a520" stroke="#3a2218" stroke-width="1.6"/>
          <circle cx="58" cy="30" r="3.2" fill="#ffd257" stroke="#3a2218" stroke-width="1.2"/>
        </svg>`;
        cmd.el.appendChild(hat);
        cmd.homeX = W * 0.9;
        rightCmd = cmd;
      }
    });
  }

  // FINAL DUEL — the field parts; two commanders walk to meet each other.
  // Every trick that made them untouchable is set down at the line: no
  // blinks, no barriers, no absorb stance, shields falter. Only the blow.
  function beginFinalDuel() {
    if (esc.duel || state !== 'ch3') return;
    esc.duel = true;
    warBanner('一騎討ち', 'FINAL DUEL — THE COMMANDERS SETTLE IT', '#e8b33a');
    if (window.__sfx) { window.__sfx.taiko(1.0); setTimeout(() => window.__sfx.taiko(0.8), 500); }
    hitstop(240);
    if (leftCmd && leftCmd.alive) sayBubble(leftCmd, 'もう隠れんなッ…来いッ!!', 2600);
    if (rightCmd && rightCmd.alive) setTimeout(() => {
      if (rightCmd.alive && state === 'ch3') sayBubble(rightCmd, '望むところだッ…!!', 2400);
    }, 900);
  }

  // Commander abilities on a cadence — the WEST roars (attack speed up),
  // the EAST casts a mending rain (AoE heal).
  function commanderRally(cmd) {
    if (!cmd || !cmd.alive) return;
    if (cmd.side === 'left') {
      const o = pick([['吼えろォ！','hoeroo'],['押せェ！','oseee'],['盾の後ろへ！','tate no ushiro e'],['西の誇り！','nishi no hokori']]);
      sayBubble(cmd, o[0], 1600);
      if (window.__sfx) { window.__sfx.speak(o[1], cmd.cls.key); window.__sfx.taiko(0.7); }
      const ring = document.createElement('div'); ring.className = 'rally-ring';
      cmd.el.appendChild(ring); setTimeout(() => ring.remove(), 800);
      cmd.el.classList.add('act-wave'); setTimeout(() => cmd.el.classList.remove('act-wave'), 1400);
      const nowT = performance.now();
      leftTribe.filter(a => a.alive && a !== cmd).forEach(a => {
        a.morale = 1.4; a.moraleUntil = nowT + 2600;
        a.atkBoostUntil = Math.max(a.atkBoostUntil || 0, nowT + 2600);
      });
    } else {
      // East wizard commander: EVERY rally brings the mending rain, and every
      // other rally ALSO sharpens the ranks' damage with a war chant
      wizardMendingRain(cmd, 26);
      cmd._rallyFlip = !cmd._rallyFlip;
      if (!cmd._rallyFlip) return;
      setTimeout(() => {
        if (!cmd.alive || state !== 'ch3') return;
        sayBubble(cmd, '魔力よ、猛れッ！', 1600);
        if (window.__sfx) { window.__sfx.sparkleShimmer(); window.__sfx.speak('maryoku yo takere', 'wizard'); }
        const ring = document.createElement('div'); ring.className = 'rally-ring';
        cmd.el.appendChild(ring); setTimeout(() => ring.remove(), 800);
        const nowT = performance.now();
        rightTribe.filter(a => a.alive).forEach(a => {
          a.dmgBoostUntil = nowT + 4000;
          const ar = a.el.getBoundingClientRect();
          spawnDust(ar.left + ar.width / 2, ar.top + 6, { dark: true, size: rand(8, 14), dy: rand(-18, -8) });
        });
      }, 1500);
    }
  }

  // WEST COMMANDER — SHIELD BASH: when foes crowd him, he swings the great
  // shield itself — an AoE slam that knocks back and STUNS everything in reach
  function shieldBash(cmd) {
    if (!cmd || !cmd.alive || cmd.striking || state !== 'ch3') return;
    const cc = contactPoint(cmd);
    // The great shield strikes all around him — AND straight UP: he hurls
    // its aegis skyward, so even foes riding the wind are swatted down
    const foes = rightTribe.filter(e => {
      if (!e.alive) return false;
      const c = contactPoint(e);
      const dx = Math.abs(c.x - cc.x);
      const skyward = dx < 170 && c.y < cc.y; // the vertical column above him
      return Math.hypot(dx, c.y - cc.y) < 210 || skyward;
    });
    if (!foes.length) return;
    cmd.striking = true;
    sayBubble(cmd, '盾撃ッ!!', 1600);
    if (window.__sfx) { window.__sfx.taiko(0.85); window.__sfx.dashWhoosh(0.8); window.__sfx.speak('tategeki', 'armored'); }
    // wind up…
    cmd.el.style.transition = 'transform .16s ease-out';
    cmd.el.style.transform = 'rotate(-10deg) scale(1.08,.94) translate(-8px,0)';
    later(() => {
      if (!cmd.alive) { cmd.striking = false; return; }
      // …SLAM
      cmd.el.style.transition = 'transform .1s ease-in';
      cmd.el.style.transform = 'rotate(12deg) scale(1.14,.9) translate(14px,0)';
      spawnImpactStar(cc.x + 44, cc.y, 92);
      // the aegis, hurled skyward — a ghost of the great shield climbs the air
      const sky = document.createElement('div');
      sky.className = 'shield-skyward';
      sky.innerHTML = `<svg viewBox="0 0 60 80" style="width:100%;height:100%;overflow:visible">
        <path d="M30 2 L56 10 L56 42 Q56 66 30 78 Q4 66 4 42 L4 10 Z" fill="rgba(47,93,134,.4)" stroke="#2f5d86" stroke-width="3"/>
        <path d="M22 34 L30 26 L38 34 L30 42 Z" fill="rgba(255,210,87,.8)" stroke="#1d3c58" stroke-width="2"/>
      </svg>`;
      cmd.el.appendChild(sky); setTimeout(() => sky.remove(), 900);
      const ring = document.createElement('div'); ring.className = 'rally-ring';
      cmd.el.appendChild(ring); setTimeout(() => ring.remove(), 800);
      hitstop(90);
      shakeBurst();
      if (window.__sfx) { window.__sfx.swordClang(); window.__sfx.giantStomp(); }
      foes.forEach((e, i) => setTimeout(() => {
        if (!e.alive) return;
        applyStun(e, 1500);
        applyDamage(cmd, e, e.x >= cmd.x ? 1 : -1, 14, { kb: 2.6, noBlock: true });
        // fliers caught by the rising aegis are TOSSED, tumbling upward
        if (e.flying && e.alive && !e.striking) {
          const c2 = contactPoint(e);
          spawnImpactStar(c2.x, c2.y, 40);
          e.baseY = Math.max(window.innerHeight * 0.10, e.baseY - rand(50, 110));
          e.el.style.transition = 'top .5s cubic-bezier(.2,.8,.3,1.1), transform .5s ease';
          e.el.style.top = e.baseY + 'px';
          e.el.style.transform = 'rotate(' + ((e.x >= cmd.x ? 1 : -1) * 220) + 'deg)';
          setTimeout(() => { if (e.alive && !e.striking) { e.el.style.transition = 'transform .2s ease'; e.el.style.transform = ''; } }, 520);
        }
      }, i * 60));
      later(() => {
        if (!cmd.alive) { cmd.striking = false; return; }
        cmd.el.style.transition = 'transform .25s ease';
        cmd.el.style.transform = '';
        later(() => { cmd.striking = false; if (cmd.alive) cmd.el.style.transition = ''; }, 260);
      }, 240);
    }, 170);
  }

  // EAST WIZARD — MENDING RAIN: a frequent AoE heal washing over the whole
  // tribe — green burst rings + floating green numbers on every ally mended.
  function wizardMendingRain(cmd, amount = 14, big = false) {
    if (!cmd || !cmd.alive || state !== 'ch3') return;
    sayBubble(cmd, big ? '大いなる癒しッ！！' : '癒しの雨ッ！', 1600);
    if (window.__sfx) {
      window.__sfx.healChime();
      if (big) window.__sfx.sparkleShimmer();
      window.__sfx.speak(big ? 'ooinaru iyashi' : 'iyashi no ame', 'wizard');
    }
    const ring = document.createElement('div'); ring.className = 'rally-ring heal';
    cmd.el.appendChild(ring); setTimeout(() => ring.remove(), 800);
    rightTribe.filter(a => a.alive && a.hp < a.maxHp).forEach((a, i) => {
      setTimeout(() => {
        if (!a.alive || state !== 'ch3') return;
        const healed = Math.min(a.maxHp - a.hp, amount * healScale());
        if (healed <= 0) return;
        a.hp += healed; updateHp(a);
        const burst = document.createElement('div'); burst.className = 'heal-burst';
        a.el.appendChild(burst); setTimeout(() => burst.remove(), 950);
        const c = contactPoint(a);
        healPop(c.x + rand(-8, 8), c.y - 20, '+' + Math.round(healed));
        spawnDust(c.x, c.y - 6, { size: rand(10, 16), dx: rand(-6, 6), dy: rand(-24, -12) });
      }, i * 90);
    });
  }
  function healPop(x, y, txt) {
    const d = document.createElement('div');
    d.className = 'dmg-pop heal';
    d.textContent = txt;
    d.style.left = x + 'px'; d.style.top = y + 'px';
    fxL.appendChild(d);
    requestAnimationFrame(() => d.classList.add('go'));
    setTimeout(() => d.remove(), 950);
  }

  // A warrior breaks off to run back to a friendly structure, grabs weapons /
  // supplies, then rejoins the front. (Skipped by the combat AI while away.)
  function sendResupply(s) {
    if (!s || !s.alive || s.commander || s.resupplying || s.flying) return;
    s.resupplying = true;
    const W = window.innerWidth;
    const backX = s.side === 'left' ? rand(W * 0.04, W * 0.15) : rand(W * 0.85, W * 0.96);
    s.el.style.transition = 'left 1.1s ease-in-out';
    s.el.style.left = backX + 'px'; s.x = backX;
    s.el.classList.toggle('flip-x', s.side === 'right');
    setTimeout(() => {
      if (!s.alive) { s.resupplying = false; return; }
      if (window.__sfx) window.__sfx.woodKnock(300);
      const pip = document.createElement('div'); pip.className = 'supply-pip';
      pip.textContent = pick(['⚔️','🛡️','✨','📦']);
      s.el.appendChild(pip); setTimeout(() => pip.remove(), 1200);
      sayBubble(s, pick(['re-armed!','got it','supplies!','for the tribe']), 1200);
    }, 1150);
    setTimeout(() => {
      if (!s.alive) { s.resupplying = false; return; }
      s.el.style.transition = 'left 1.1s ease-in-out';
      s.el.style.left = s.homeX + 'px'; s.x = s.homeX;
      s.el.classList.toggle('flip-x', s.side === 'left');
      setTimeout(() => { s.el.style.transition = ''; s.resupplying = false; }, 1150);
    }, 2700);
  }

  // Churning central dust cloud where the lines meet — the chaos of battle.
  function startBattleDust() {
    if (battleDustTimer) return;
    const layer = document.getElementById('battle-dust');
    battleDustTimer = setInterval(() => {
      if (combatPaused) return;
      const W = window.innerWidth, H = window.innerHeight;
      const n = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < n; i++) {
        spawnDust(W * 0.5 + rand(-W * 0.17, W * 0.17), rand(H * 0.5, H * 0.82), {
          layer, dark: Math.random() < 0.5, smoke: Math.random() < 0.3,
          size: rand(34, 84), dx: rand(-34, 34), dy: rand(-60, -12)
        });
      }
    }, 170);
    timers.push(battleDustTimer);
  }
  function stopBattleDust() {
    if (battleDustTimer) { clearInterval(battleDustTimer); battleDustTimer = null; }
    const layer = document.getElementById('battle-dust'); if (layer) layer.innerHTML = '';
  }

  let combatRunning = false;
  function runCombat() {
    if (combatRunning) return; // never two battle loops at once
    combatRunning = true;
    battleT0 = performance.now();
    esc.fatigueOn = false; esc.bloodOn = false; esc.duel = false; esc.duelTimer = 0;
    let battleEnd = false;
    let lastTs = performance.now();
    let rafId = null;
    combatPaused = false;
    // RPG HUD on, meters reset, everyone starts hungry for a fight
    mp.left = 0; mp.right = 0; specialActive = false;
    if (teamHud) teamHud.style.display = 'flex';
    [...leftTribe, ...rightTribe].forEach(s => { s.lastAtkAt = performance.now(); });
    updateTeamHud();

    // Battle ambience + behaviors: churning dust, periodic resupply runs, and
    // commanders rallying their ranks.
    startBattleDust();
    rep(() => {
      if (combatPaused) return;
      const pool = [...leftTribe, ...rightTribe].filter(s => s.alive && !s.commander && !s.captain && !s.resupplying && !s.flying && s.role !== 'support');
      if (pool.length > 4 && Math.random() < 0.4) sendResupply(pick(pool));
    }, 5200);
    rep(() => {
      if (combatPaused) return;
      if (leftCmd && leftCmd.alive) commanderRally(leftCmd);
      if (rightCmd && rightCmd.alive) setTimeout(() => { if (rightCmd && rightCmd.alive) commanderRally(rightCmd); }, 1100);
    }, 5400);
    // The wizard's mending comes FREQUENTLY — the east endures through healing
    rep(() => {
      if (combatPaused || specialActive) return;
      if (rightCmd && rightCmd.alive) wizardMendingRain(rightCmd, 12);
    }, 4200);
    // EARTH MAGIC — when the west pushes too deep, the stone itself answers
    rep(() => {
      if (combatPaused || specialActive || state !== 'ch3') return;
      const W = window.innerWidth;
      const intruders = leftTribe.filter(s => s.alive && s.x > W * 0.55).length;
      if (intruders >= 3 && performance.now() - lastEarthAt > 9000 && rightCmd && rightCmd.alive) castEarthSpires();
    }, 1600);
    // LONG-RANGE SUPPORT BARRAGE — west artillery (mortar + RPG) answers
    // east elemental magic (wind / fire / earth / water)
    rep(() => {
      if (combatPaused || specialActive) return;
      supportBarrage('left');
      setTimeout(() => { if (!combatPaused && !specialActive) supportBarrage('right'); }, rand(500, 1200));
    }, 2700);
    // MP trickles slowly on its own — the meters never sit dead
    rep(() => {
      if (combatPaused || state !== 'ch3') return;
      gainMp('left', 0.7); gainMp('right', 0.7);
    }, 1000);
    // WAR ESCALATION — fatigue, bloodlust, and the final duel
    rep(() => {
      if (combatPaused || state !== 'ch3') return;
      const m = battleMin();
      if (!esc.fatigueOn && m > 3) {
        esc.fatigueOn = true;
        warBanner('疲弊', 'WAR FATIGUE — ALL MENDING BEGINS TO WANE', '#b7a98c');
        if (window.__sfx) window.__sfx.taiko(0.6);
      }
      if (!esc.bloodOn && m > 4) {
        esc.bloodOn = true;
        warBanner('血気', 'BLOODLUST — EVERY BLOW GROWS HEAVIER', '#d9536a');
        if (window.__sfx) window.__sfx.taiko(0.9);
      }
      // FINAL DUEL — when the field thins to scraps and both commanders
      // still stand, the war stops hiding behind soldiers
      const la = leftTribe.filter(x => x.alive).length;
      const ra = rightTribe.filter(x => x.alive).length;
      if (!esc.duel && leftCmd && leftCmd.alive && rightCmd && rightCmd.alive && la <= 2 && ra <= 2) {
        esc.duelTimer += 2;
        if (esc.duelTimer >= 8) beginFinalDuel();
      } else if (!esc.duel) esc.duelTimer = 0;
      // while the duel runs, the commanders are LOCKED on each other
      if (esc.duel && leftCmd && leftCmd.alive && rightCmd && rightCmd.alive) {
        const until = performance.now() + 3000;
        leftCmd.forcedTarget = rightCmd;  leftCmd.forcedTargetUntil = until;
        rightCmd.forcedTarget = leftCmd; rightCmd.forcedTargetUntil = until;
      }
    }, 2000);
    // The vanguard blessing fades if the west commander falls
    rep(() => {
      if (leftCmd && leftCmd.alive) return;
      leftTribe.forEach(s => {
        if (s.vanguardBlessing) {
          s.vanguardBlessing = false;
          const d = s.el.querySelector('.vanguard-lite'); if (d) d.remove();
        }
      });
    }, 1000);
    // BURN ticks — ignited smileys smoulder until the fire runs out
    rep(() => {
      if (combatPaused) return;
      const nowT = performance.now();
      [...leftTribe, ...rightTribe].forEach(t => {
        if (!t.alive) { clearBurnFx(t); return; }
        if (t.burnUntil && nowT < t.burnUntil) {
          t.hp -= 4;
          updateHp(t);
          const c = contactPoint(t);
          dmgPop(c.x + rand(-8, 8), c.y - 14, 4, false, true);
          spawnDust(c.x, c.y - 8, { smoke: true, size: rand(8, 14), dy: rand(-20, -8) });
          if (t.hp <= 0) killBlow({ side: t.burnSide }, t, t.side === 'left' ? -1 : 1);
        } else if (t._burnFx) clearBurnFx(t);
      });
    }, 800);
    // IRON VANGUARD MENDING — the golden shields knit their bearers back
    // together every second; the commander's blessed few (lesser vanguard)
    // share that same mending for as long as he stands
    rep(() => {
      if (combatPaused) return;
      const nowT = performance.now();
      leftTribe.forEach(a => {
        if (!a.alive || a.hp >= a.maxHp) return;
        const shielded = a.shieldUntil && nowT < a.shieldUntil;
        const blessed = a.vanguardBlessing && leftCmd && leftCmd.alive;
        if (!shielded && !blessed) return;
        const amt = Math.min(a.maxHp - a.hp, (shielded ? 10 : 5) * healScale());
        if (amt <= 0) return;
        a.hp += amt;
        updateHp(a);
        const c = contactPoint(a);
        healPop(c.x + rand(-6, 6), c.y - 18, '+' + Math.round(amt));
      });
    }, 1000);
    // EAST PASSIVE — SPIRIT FLOW: magic runs in their veins; every east
    // smiley knits itself back together each second (stronger while the
    // archmage stands), soft green motes rising as the wounds close
    rep(() => {
      if (combatPaused) return;
      rightTribe.forEach(a => {
        if (!a.alive || a.hp >= a.maxHp) return;
        const amt = Math.min(a.maxHp - a.hp, ((rightCmd && rightCmd.alive) ? 6 : 3) * healScale());
        if (amt <= 0) return;
        a.hp += amt;
        updateHp(a);
        // quiet numbers only when the mending matters — no popup spam
        if (a.hp < a.maxHp * 0.9 && Math.random() < 0.5) {
          const c = contactPoint(a);
          healPop(c.x + rand(-6, 6), c.y - 18, '+' + Math.round(amt));
          spawnDust(c.x + rand(-8, 8), c.y - 6, { size: rand(7, 11), dy: rand(-18, -9) });
        }
      });
    }, 1000);
    // SHIELD BASH — when the east crowds the west commander, the great
    // shield answers
    rep(() => {
      if (combatPaused || specialActive) return;
      shieldBash(leftCmd);
    }, 6200);
    // TAUNT — at timed intervals the tank commander bellows a CHALLENGE:
    // nearby foes are goaded into attacking HIM, and while his stance holds
    // he DRINKS their blows as health
    rep(() => {
      if (combatPaused || specialActive) return;
      tankTaunt(leftCmd);
    }, 9500);
    // CAPTAIN MINI-ULTS — three captains a side, each with a signature blow
    captains.forEach((c, i) => { c.nextUltAt = performance.now() + 3500 + i * 2200 + rand(0, 1500); });
    rep(() => {
      if (combatPaused || specialActive || state !== 'ch3') return;
      const nowT = performance.now();
      captains.forEach(c => {
        if (!c || !c.alive || c.resupplying || c.striking) return;
        if ((c.stunUntil && nowT < c.stunUntil) || nowT < (c.nextUltAt || 0)) return;
        if (fireCaptainUlt(c)) c.nextUltAt = performance.now() + 9500 + rand(0, 3500);
        else c.nextUltAt = performance.now() + 1700;
      });
    }, 900);
    // TRUMP CARDS — each side plays one desperate card per battle
    sauceUsed = { left: false, right: false };
    rep(() => checkSpecialSauce(), 2000);

    const step = (ts) => {
      if (battleEnd) return;
      // Chapter moved on (skip / re-zero) — shut this loop down cleanly
      if (state !== 'ch3') { battleEnd = true; combatRunning = false; return; }
      // When a cutscene is playing, freeze the simulation but keep the loop alive
      if (combatPaused) {
        lastTs = ts;
        rafId = requestAnimationFrame(step);
        return;
      }
      // Hitstop — the whole battle freezes for a few frames on big hits
      if (ts < hitstopUntil) {
        lastTs = ts;
        rafId = requestAnimationFrame(step);
        return;
      }
      const dt = Math.min(0.06, (ts - lastTs) / 1000);
      lastTs = ts;
      const W = window.innerWidth;

      [...leftTribe, ...rightTribe].forEach(s => {
        if (!s.alive) return;
        if (s.resupplying || s.striking) { s.cooldown -= dt; return; }
        // STUNNED — frozen where they stand, stars circling
        if (s.stunUntil && performance.now() < s.stunUntil) return;

        // EAST COMMANDER — backline discipline: he reads the field, repels
        // or blinks away from anyone who gets close, and keeps himself deep
        if (s === rightCmd && s.commander && wizardCommanderMind(s, dt)) { s.cooldown -= dt; return; }

        // SUPPORT TEAMS — permanently stationed at the back edge; they hold
        // their post and bob in place. Their long-range fire comes from the
        // support-barrage loop, not the normal melee AI.
        if (s.role === 'support') {
          const bob = Math.sin(ts * 0.004 + s.homeX * 0.02) * 3;
          s.el.style.top = (s.baseY + bob) + 'px';
          s.el.classList.toggle('flip-x', s.side === 'right');
          s.cooldown -= dt;
          return;
        }

        // Healer behavior — east clerics and west medics both mend the line
        if ((s.cls.key === 'healer' || s.cls.key === 'medic') && s.cooldown <= 0 && Math.random() < 0.025) {
          const allies = (s.side === 'left' ? leftTribe : rightTribe).filter(a => a.alive && a !== s && a.hp < a.maxHp * 0.85);
          if (allies.length) {
            const target = pick(allies);
            healSpark(s, target);
            if (window.__sfx) {
              window.__sfx.healChime();
              if (Math.random() < 0.4) window.__sfx.speak('Heal!', 'healer');
            }
            target.hp = Math.min(target.maxHp, target.hp + 18 * healScale());
            updateHp(target);
            s.cooldown = 1.2;
            return;
          }
        }

        const enemies = (s.side === 'left' ? rightTribe : leftTribe).filter(e => e.alive);
        if (!enemies.length) return;

        // Find nearest enemy — melee prefers reachable, grounded foes
        // (the commander is the exception: he JUMPS to strike airborne foes)
        let candidates = enemies;
        if (MELEE_KEYS.includes(s.cls.key) && !s.flying && !s.commander) {
          const grounded = enemies.filter(e => !e.flying);
          if (grounded.length) candidates = grounded;
        }
        let target = candidates[0], best = Infinity;
        for (const e of candidates) {
          const ddx = e.x - s.x, ddy = e.y - s.y;
          const d = Math.hypot(ddx, ddy);
          if (d < best) { best = d; target = e; }
        }
        // TAUNTED — the challenge cannot be refused: all eyes on the tank
        let taunted = false;
        if (s.forcedTarget && s.forcedTarget.alive && s.forcedTargetUntil && performance.now() < s.forcedTargetUntil) {
          target = s.forcedTarget;
          taunted = true;
        }

        // Determine engagement X based on role — keep lanes!
        // Backline doesn't cross the midline; frontline does.
        const W2 = window.innerWidth;
        const mid = W2 * 0.5;
        let engageMinX, engageMaxX;
        if (s.role === 'backline') {
          engageMinX = s.side === 'left' ? W2 * 0.05 : mid + 20;
          engageMaxX = s.side === 'left' ? mid - 20 : W2 * 0.95;
        } else if (s.role === 'mid') {
          engageMinX = s.side === 'left' ? W2 * 0.10 : mid + 10;
          engageMaxX = s.side === 'left' ? mid + 80 : W2 * 0.90;
        } else { // frontline / skirmisher — full range, will cross midline
          engageMinX = W2 * 0.05;
          engageMaxX = W2 * 0.95;
        }
        // A taunted smiley abandons its lane discipline — it MUST answer
        if (taunted) { engageMinX = W2 * 0.05; engageMaxX = W2 * 0.95; }
        // The wizard commander never leaves the deep backline — until the
        // duel calls him forward
        if (s === rightCmd && !esc.duel) engageMinX = Math.max(engageMinX, W2 * 0.68);

        // Move toward target — actual frame-stepped motion (live positions)
        const dx = target.x - s.x;
        const dy = (target.baseY != null ? target.baseY : target.y) - (s.baseY != null ? s.baseY : s.y);
        const dist = Math.hypot(dx, dy);
        // Melee can leap up at fliers — judge engagement horizontally
        const distEff = (MELEE_KEYS.includes(s.cls.key) && target.flying) ? Math.abs(dx) : dist;
        const dirX = dx / (dist || 1);
        const dirY = dy / (dist || 1);

        const speedTable = {
          flying: 220, spear: 190, wizard: 110,
          samurai: 210, healer: 130, gunner: 120,
          armored: 130, giant: 100, sniper: 100,
          rocketeer: 115, medic: 135, commando: 230,
          frostmage: 115, pyromancer: 115, oni: 85
        };
        // If starved of a target too long, break formation and advance
        if (s.lastAtkAt && performance.now() - s.lastAtkAt > 5000 && s !== rightCmd) {
          engageMinX = W2 * 0.05; engageMaxX = W2 * 0.95;
        }

        let spd = (speedTable[s.cls.key] || 150);
        if (s.moraleUntil && performance.now() < s.moraleUntil) spd *= (s.morale || 1.3);
        // Water-soaked — the east's water spell slows the advance
        if (s.slowUntil && performance.now() < s.slowUntil) spd *= 0.5;

        // Engagement: stop just inside attack range
        const engageDist = s.range * 0.85;

        if (distEff > engageDist) {
          // March toward target — but constrained by role
          let moveX = dirX * spd * dt;
          // Backline / mid won't cross past their boundary
          const nextX = s.x + moveX;
          if (nextX < engageMinX) moveX = engageMinX - s.x;
          if (nextX > engageMaxX) moveX = engageMaxX - s.x;
          s.x += moveX;

          // Vertical motion: try to maintain home lane (keep spread!)
          // Drift toward homeY but allow some chase for fliers/skirmishers
          let targetY = s.homeY;
          if (s.role === 'skirmisher' || s.flying) {
            // Skirmishers/fliers move closer to target Y but with lane preference
            targetY = s.homeY * 0.6 + target.y * 0.4;
          }
          const dy2 = targetY - s.baseY;
          const moveY = Math.sign(dy2) * Math.min(Math.abs(dy2), spd * 0.4 * dt);
          s.baseY += moveY;

          if (s.flying) {
            const bob = Math.sin(ts * 0.005 + s.x * 0.01) * 6;
            s.el.style.top = (s.baseY + bob) + 'px';
            if (!s.casting) s.el.style.transform = `rotate(${dirX * 10}deg)`;
          } else {
            // Springy anime scurry — fast hop, lean into the run,
            // squash on landing / stretch in the air
            if (s.hopPhase == null) s.hopPhase = Math.random() * 6.28;
            const hop = Math.abs(Math.sin(ts * 0.016 + s.hopPhase));
            const grounded = hop < 0.22;
            s.el.style.top = (s.baseY - hop * 9) + 'px';
            if (!s.casting) {
              s.el.style.transform = `rotate(${dirX * 9}deg) ${grounded ? 'scale(1.07,.9)' : 'scale(.96,1.06)'}`;
            }
            if (grounded && !s.wasGrounded && Math.random() < 0.4) {
              const rr = s.el.getBoundingClientRect();
              spawnDust(rr.left + rr.width / 2 - dirX * 10, rr.top + rr.height, {
                size: rand(9, 18), dx: -dirX * rand(10, 26), dy: rand(-8, -2)
              });
            }
            s.wasGrounded = grounded;
          }
          s.el.style.left = s.x + 'px';
          s.el.classList.add('marching');
          const facingFlip = (dirX < 0) ? (s.side === 'right') : (s.side === 'left');
          s.el.classList.toggle('flip-x', facingFlip);
        } else {
          // In range — attack
          s.el.classList.remove('marching');
          if (!s.striking && !s.casting) s.el.style.transform = '';
          if (s.cooldown <= 0) {
            attackTarget(s, target);
            s.lastAtkAt = performance.now();
            // Faster war tempo — every class strikes more often
            const CD = { samurai: 0.5, giant: 1.1, wizard: 1.05, gunner: 1.15, spear: 0.8, flying: 0.6, healer: 0.8, armored: 0.9,
                         sniper: 1.4, rocketeer: 1.3, medic: 0.85, commando: 0.55, frostmage: 1.0, pyromancer: 1.0, oni: 0.95 };
            s.cooldown = (CD[s.cls.key] || 0.8) + Math.random() * 0.2;
            // WAR ROAR / special: boosted attack speed
            if (s.atkBoostUntil && performance.now() < s.atkBoostUntil) s.cooldown *= 0.5;
            // VANGUARD BLESSING — permanently faster strikes while the commander stands
            if (s.vanguardBlessing && leftCmd && leftCmd.alive) s.cooldown *= 0.65;
          }
          if (s.flying) {
            const bob = Math.sin(ts * 0.005 + s.x * 0.01) * 6;
            s.el.style.top = (s.baseY + bob) + 'px';
          }
        }
        s.cooldown -= dt;
      });

      // Gentle separation so warriors spread out instead of stacking up
      const movers = [...leftTribe, ...rightTribe].filter(s => s.alive && !s.resupplying && !s.striking && s.role !== 'support');
      for (let i = 0; i < movers.length; i++) {
        for (let j = i + 1; j < movers.length; j++) {
          const a = movers[i], b = movers[j];
          const dx = b.x - a.x;
          const ay = parseFloat(a.el.style.top) || a.baseY;
          const by = parseFloat(b.el.style.top) || b.baseY;
          const d = Math.hypot(dx, by - ay);
          const minD = 44;
          if (d > 0.1 && d < minD) {
            const push = (minD - d) * 0.3;
            const ux = dx / (d || 1);
            a.x -= ux * push; b.x += ux * push;
            a.el.style.left = a.x + 'px'; b.el.style.left = b.x + 'px';
          }
        }
      }

      const aliveL = leftTribe.filter(s => s.alive).length;
      const aliveR = rightTribe.filter(s => s.alive).length;
      bL.innerHTML = `The West Tribe<small>${aliveL} alive</small>`;
      bR.innerHTML = `The East Tribe<small>${aliveR} alive</small>`;
      updateTeamHud();

      // Full MP → the commander unleashes their special (cut-in first)
      if (!specialActive && !(window.__cutscene && window.__cutscene.active)) {
        if (mp.left >= MP_MAX && leftCmd && leftCmd.alive) triggerSpecial('left');
        else if (mp.right >= MP_MAX && rightCmd && rightCmd.alive) triggerSpecial('right');
      }

      if ((aliveL <= 2 && aliveR <= 2) || aliveL === 0 || aliveR === 0) {
        if (!battleEnd) {
          battleEnd = true;
          combatRunning = false;
          cancelAnimationFrame(rafId);
          stopBattleDust();
          // The grand finisher cut-in (always shown), then on to the God of Smileys
          const goCh4 = () => later(() => startChapter4(), 1200);
          if (window.__cutscene) {
            const duel = pickDuelFinisher();
            if (duel) {
              if (window.__sfx) { window.__sfx.startMusic('climax', { volume: 0.5 }); }
              window.__cutscene.play('finisher', {
                attacker: duel.attacker,
                defender: duel.defender,
                onDone: goCh4
              });
            } else { goCh4(); }
          } else { goCh4(); }
          return;
        }
      }
      rafId = requestAnimationFrame(step);
    };
    rafId = requestAnimationFrame(step);
    timers.push({ raf: rafId });
    // override clearTimers a bit — track raf
    const origClear = clearTimers;
    window.__cancelCombat = () => { battleEnd = true; combatRunning = false; cancelAnimationFrame(rafId); };
  }

  // ── ATTACKS — anime motion grammar ────────────────────────────
  const MELEE_KEYS = ['samurai', 'giant', 'armored', 'commando', 'oni'];

  function attackTarget(s, target) {
    if (MELEE_KEYS.includes(s.cls.key)) meleeStrike(s, target);
    else rangedAttack(s, target);
  }

  function contactPoint(t) {
    const r = t.el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  // Melee: ANTICIPATION (coil back) → DASH (afterimages, air-rip) →
  // CONTACT (slash smear + impact star + hitstop) → RECOVER (spring back)
  function meleeStrike(s, target) {
    if (s.striking || !s.alive) return;
    s.striking = true;
    const el = s.el;
    const dirX = target.x >= s.x ? 1 : -1;
    const startX = s.x, startY = s.baseY;
    el.classList.remove('marching');

    // 1 — coil: crouch away from the foe, squashed and loaded
    el.style.transition = 'transform .12s ease-out, left .12s ease-out';
    el.style.transform = `translate(0,3px) rotate(${-dirX * 10}deg) scale(1.1,.84)`;
    el.style.left = (s.x - dirX * 10) + 'px';

    later(() => {
      if (!s.alive) { s.striking = false; return; }
      // 2 — dash: explode to the target with a ghost trail
      const gap = (target.size || 50) * 0.7;
      const cx = target.x - dirX * gap;
      const cy = target.flying ? target.baseY : s.baseY;
      if (window.__sfx) window.__sfx.dashWhoosh(s.cls.key === 'giant' ? 0.7 : 1.1);
      dashTrail(s, 3, 130);
      el.style.transition = 'left .13s cubic-bezier(.3,0,.4,1), top .13s cubic-bezier(.3,0,.4,1), transform .13s ease-in';
      el.style.transform = `rotate(${dirX * 18}deg) scale(1.22,.86)`;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      s.x = cx; s.baseY = cy;

      later(() => {
        if (!s.alive) { s.striking = false; return; }
        // 3 — contact: smear + star + FREEZE, then the damage lands
        const c = contactPoint(target);
        const ang = dirX > 0 ? rand(-30, 30) : rand(150, 210);
        spawnSlashSmear(c.x, c.y, ang);
        spawnImpactStar(c.x, c.y, s.cls.key === 'giant' ? 100 : 62);
        el.style.transition = 'transform .1s ease-out';
        el.style.transform = `rotate(${dirX * 6}deg) scale(.94,1.06)`;
        if (window.__sfx) {
          window.__sfx.hitSpark();
          if (s.cls.key === 'giant') window.__sfx.giantStomp();
        }
        hitstop(s.cls.key === 'giant' ? 130 : 85);
        // Shield bash sends foes FLYING; others hit normal
        applyDamage(s, target, dirX, null, { kb: s.cls.key === 'armored' ? 1.9 : 1 });

        // 4 — recover: spring back to guard position
        later(() => {
          if (!s.alive) { s.striking = false; return; }
          const backX = startX + dirX * rand(-14, 26);
          el.style.transition = 'left .42s cubic-bezier(.25,1.5,.45,1), top .42s ease, transform .3s ease';
          el.style.transform = '';
          el.style.left = backX + 'px';
          el.style.top = startY + 'px';
          s.x = backX; s.baseY = startY;
          later(() => { el.style.transition = ''; s.striking = false; }, 440);
        }, 130);
      }, 140);
    }, 130);
  }

  // Ranged: recoil-windup → cast ring + snap release → fast projectile
  function rangedAttack(s, target) {
    if (!s.alive || s.casting) return;
    s.casting = true;
    const el = s.el;
    const dirX = target.x >= s.x ? 1 : -1;
    el.style.transition = 'transform .1s ease-out';
    el.style.transform = `rotate(${-dirX * 8}deg) scale(1.06,.92)`;
    const fr = el.getBoundingClientRect();
    spawnCastRing(fr.left + fr.width / 2 + dirX * 12, fr.top + fr.height / 2, s.side);
    later(() => {
      if (!s.alive) { s.casting = false; return; }
      el.style.transition = 'transform .16s ease-out';
      el.style.transform = `rotate(${dirX * 7}deg) scale(.96,1.05)`;
      fireProjectile(s, target, dirX);
      later(() => { s.casting = false; if (s.alive && !s.striking) el.style.transform = ''; }, 180);
    }, 110);
  }

  function fireProjectile(s, target, dirX) {
    const k = s.cls.key;
    if (k === 'gunner') return fireBurst(s, target, dirX);
    if (k === 'medic')  return fireBurst(s, target, dirX, 3);
    if (k === 'sniper') return fireSniper(s, target, dirX);
    if (k === 'rocketeer') return fireRPG(s, target, s.dmg, s.dmg * 0.55);
    if (k === 'wizard') return s.commander ? wizardCommanderAttack(s, target, dirX) : wizardElemental(s, target, dirX);
    if (k === 'frostmage') return fireFrost(s, target, dirX);
    if (k === 'pyromancer') return fireFlame(s, target, dirX);
    if (k === 'spear')  return fireSpear(s, target, dirX);
    // default dart — flyer feathers, healer hearts, etc.
    if (window.__sfx) {
      if (k === 'flying') window.__sfx.flap();
      else window.__sfx.swordSwing();
    }
    const a = projAnchor(s), b = projTargetPoint(target);
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const flyMs = Math.max(180, Math.min(420, dist * 0.5));
    spawnProjectile({
      x: a.x, y: a.y, tx: b.x, ty: b.y, ms: flyMs, w: 18, h: 18, spin: '540deg',
      html: `<svg viewBox="0 0 24 24" style="width:100%;height:100%;overflow:visible"><use href="#${s.cls.icon}"/></svg>`
    });
    later(() => {
      if (!target.alive) return;
      const c = contactPoint(target);
      spawnImpactStar(c.x, c.y, 44);
      applyDamage(s, target, dirX);
    }, flyMs);
  }

  // ── projectile plumbing ──
  function projAnchor(s) {
    const r = s.el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }
  function projTargetPoint(t) {
    const r = t.el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }
  function spawnProjectile({ x, y, tx, ty, ms, w, h, html, spin }) {
    const p = document.createElement('div');
    p.className = 'projectile';
    p.style.width = w + 'px'; p.style.height = h + 'px';
    p.style.left = (x - w / 2) + 'px';
    p.style.top  = (y - h / 2) + 'px';
    p.style.setProperty('--tx', (tx - x) + 'px');
    p.style.setProperty('--ty', (ty - y) + 'px');
    p.style.setProperty('--tr', spin || '0deg');
    p.style.setProperty('--fly', (ms / 1000).toFixed(3) + 's');
    p.innerHTML = html;
    fxL.appendChild(p);
    requestAnimationFrame(() => p.classList.add('go'));
    setTimeout(() => p.remove(), ms + 80);
    return p;
  }

  // LANCER — a thrown spear, aimed along its flight line, hits like a truck
  function fireSpear(s, target, dirX) {
    if (window.__sfx) window.__sfx.dashWhoosh(1.5);
    const a = projAnchor(s), b = projTargetPoint(target);
    const ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const flyMs = Math.max(150, Math.min(340, dist * 0.38));
    spawnProjectile({
      x: a.x, y: a.y, tx: b.x, ty: b.y, ms: flyMs, w: 50, h: 12,
      html: `<svg viewBox="0 0 50 12" style="width:100%;height:100%;overflow:visible;transform:rotate(${ang.toFixed(1)}deg)">
        <path d="M 2 6 L 40 6" stroke="#3a2218" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M 38 1.5 L 49 6 L 38 10.5 Z" fill="#3a2218"/>
        <path d="M 6 3 L 2 6 L 6 9" stroke="#3a2218" stroke-width="1.6" fill="none"/>
      </svg>`
    });
    later(() => {
      if (!target.alive) return;
      const c = contactPoint(target);
      spawnImpactStar(c.x, c.y, 56);
      applyDamage(s, target, dirX, null, { kb: 1.5 });
    }, flyMs);
  }

  // GUNNER — machine-gun burst: muzzle flashes, tracer rounds, sprayed hits
  function fireBurst(s, target, dirX, shots = 6) {
    const per = s.dmg / shots;
    for (let i = 0; i < shots; i++) {
      later(() => {
        if (!s.alive || !target.alive) return;
        if (window.__sfx) window.__sfx.gunShot();
        const a = projAnchor(s);
        const mx = a.x + dirX * (s.size || 50) * 0.55, my = a.y + 4;
        spawnImpactStar(mx, my, 18); // muzzle flash
        // recoil jitter
        s.el.style.transform = `rotate(${dirX * (5 + Math.random() * 4)}deg) translate(${-dirX * 3}px,0) scale(1.02,.96)`;
        const b = projTargetPoint(target);
        const tx = b.x + rand(-16, 16), ty = b.y + rand(-14, 14);
        const ang = Math.atan2(ty - my, tx - mx) * 180 / Math.PI;
        spawnProjectile({
          x: mx, y: my, tx, ty, ms: 130, w: 16, h: 4,
          html: `<div style="width:16px;height:3.5px;border-radius:2px;background:#3a2218;box-shadow:0 0 5px rgba(255,200,90,.95);transform:rotate(${ang.toFixed(1)}deg)"></div>`
        });
        later(() => {
          if (!target.alive) return;
          spawnDust(tx, ty, { dark: true, size: rand(10, 18), dx: dirX * rand(4, 16), dy: rand(-14, -4) });
          applyDamage(s, target, dirX, per, { light: i < shots - 1 });
        }, 130);
      }, i * 85);
    }
    later(() => { if (s.alive && !s.striking) s.el.style.transform = ''; }, shots * 85 + 140);
  }

  // WIZARD — blazing fireball with a smoke trail; explodes with SPLASH damage
  function fireOrb(s, target, dirX) {
    if (window.__sfx) window.__sfx.magicSpell();
    const a = projAnchor(s), b = projTargetPoint(target);
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const flyMs = Math.max(260, Math.min(560, dist * 0.7));
    const p = spawnProjectile({
      x: a.x, y: a.y, tx: b.x, ty: b.y, ms: flyMs, w: 24, h: 24, spin: '360deg',
      html: `<div style="width:22px;height:22px;border-radius:50%;border:2px solid #3a2218;
        background:radial-gradient(circle at 35% 35%, #ffe9a8, #ff9040 60%, #c33d12);
        box-shadow:0 0 14px 4px rgba(255,140,50,.6)"></div>`
    });
    // smoke trail sampled along the flight
    const trail = setInterval(() => {
      if (!p.isConnected) { clearInterval(trail); return; }
      const r = p.getBoundingClientRect();
      spawnDust(r.left + r.width / 2, r.top + r.height / 2, { smoke: true, size: rand(10, 18), dx: rand(-6, 6), dy: rand(-10, 2) });
    }, 55);
    setTimeout(() => clearInterval(trail), flyMs + 60);
    later(() => {
      if (!target.alive) return;
      const c = contactPoint(target);
      // EXPLOSION — star, fire-dust ring, freeze, splash
      spawnImpactStar(c.x, c.y, 110);
      for (let i = 0; i < 8; i++) {
        const aa = (i / 8) * Math.PI * 2;
        spawnDust(c.x, c.y, { dark: i % 2 === 0, size: rand(18, 34), dx: Math.cos(aa) * rand(30, 60), dy: Math.sin(aa) * rand(24, 48) });
      }
      hitstop(70);
      if (window.__sfx) window.__sfx.kaboom(0.55);
      const foes = (s.side === 'left' ? rightTribe : leftTribe).filter(e => e.alive);
      foes.forEach(e => {
        const er = e.el.getBoundingClientRect();
        const d = Math.hypot(er.left + er.width / 2 - c.x, er.top + er.height / 2 - c.y);
        // Wizard fireballs BLAST foes backward — and IGNITE whoever they struck
        if (e === target) { applyBurn(e, 2600, s.side); applyDamage(s, e, dirX, null, { kb: s.commander ? 2.6 : 1.5 }); }
        else if (d < 120) applyDamage(s, e, dirX, s.dmg * 0.5, { kb: s.commander ? 2.1 : 1.4 });
      });
    }, flyMs);
  }

  // SNIPER — one perfect shot: muzzle crack, a tracer that arrives instantly
  function fireSniper(s, target, dirX) {
    if (window.__sfx) { window.__sfx.gunShot(); window.__sfx.shing(); }
    const a = projAnchor(s);
    const mx = a.x + dirX * (s.size || 50) * 0.55, my = a.y - 2;
    spawnImpactStar(mx, my, 22); // muzzle flash
    const b = projTargetPoint(target);
    const ang = Math.atan2(b.y - my, b.x - mx) * 180 / Math.PI;
    spawnProjectile({
      x: mx, y: my, tx: b.x, ty: b.y, ms: 90, w: 30, h: 4,
      html: `<div style="width:30px;height:3px;border-radius:2px;background:#3a2218;box-shadow:0 0 6px rgba(255,220,120,.95);transform:rotate(${ang.toFixed(1)}deg)"></div>`
    });
    s.el.style.transform = `rotate(${-dirX * 9}deg) translate(${-dirX * 5}px,0)`;
    later(() => {
      if (!target.alive) return;
      const c = contactPoint(target);
      spawnImpactStar(c.x, c.y, 58);
      hitstop(55);
      applyDamage(s, target, dirX, null, { kb: 1.6 });
    }, 95);
  }

  // FROST MAGE — an ice shard that soaks the target in numbing cold (SLOW)
  function fireFrost(s, target, dirX) {
    if (window.__sfx) window.__sfx.magicSpell();
    const a = projAnchor(s), b = projTargetPoint(target);
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const flyMs = Math.max(200, Math.min(460, dist * 0.55));
    spawnProjectile({
      x: a.x, y: a.y, tx: b.x, ty: b.y, ms: flyMs, w: 20, h: 20, spin: '360deg',
      html: `<svg viewBox="0 0 24 24" style="width:100%;height:100%;overflow:visible">
        <path d="M12 1 L16 12 L12 23 L8 12 Z" fill="rgba(140,200,235,.85)" stroke="#2b5a78" stroke-width="1.8"/>
        <path d="M12 5 L12 19" stroke="rgba(255,255,255,.9)" stroke-width="1.4"/>
      </svg>`
    });
    later(() => {
      if (!target.alive) return;
      const c = contactPoint(target);
      const w = document.createElement('div');
      w.className = 'water-wave';
      w.style.left = (c.x - 34) + 'px'; w.style.top = (c.y - 20) + 'px';
      fxL.appendChild(w); setTimeout(() => w.remove(), 750);
      target.slowUntil = performance.now() + 2600;
      dmgPop(c.x, c.y - 34, 'CHILLED', false, true);
      applyDamage(s, target, dirX, null, { kb: 0.9 });
    }, flyMs);
  }

  // PYROMANCER — a flame bolt that IGNITES the target (burn ticks)
  function fireFlame(s, target, dirX) {
    if (window.__sfx) window.__sfx.magicSpell();
    const a = projAnchor(s), b = projTargetPoint(target);
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const flyMs = Math.max(200, Math.min(480, dist * 0.6));
    spawnProjectile({
      x: a.x, y: a.y, tx: b.x, ty: b.y, ms: flyMs, w: 18, h: 18,
      html: `<div style="width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #3a2218;background:radial-gradient(circle at 40% 60%, #ffe9a8, #ff9040 65%, #c33d12);box-shadow:0 0 10px rgba(255,140,50,.6)"></div>`
    });
    later(() => {
      if (!target.alive) return;
      const c = contactPoint(target);
      spawnImpactStar(c.x, c.y, 40);
      for (let i = 0; i < 4; i++) spawnDust(c.x + rand(-8, 8), c.y + rand(-8, 8), { smoke: i % 2 === 0, size: rand(10, 16), dy: rand(-18, -6) });
      applyBurn(target, 3000, s.side);
      applyDamage(s, target, dirX, null, { kb: 1.0 });
    }, flyMs);
  }

  // EAST WIZARD — a master of all four elements, switching modes at random:
  // FIRE burns · EARTH pushes back & stuns · WATER slows · WIND hurls fliers
  function wizardElemental(s, target, dirX) {
    const mode = pick(['fire', 'earth', 'water', 'wind']);
    if (mode === 'fire') {
      sayBubble(s, '炎ッ！', 900);
      return fireOrb(s, target, dirX); // the fireball ignites on impact
    }
    if (mode === 'earth') {
      sayBubble(s, '岩ッ！', 900);
      if (window.__sfx) window.__sfx.stoneSet();
      later(() => {
        if (!target.alive || state !== 'ch3') return;
        spawnSpire(target.x + (target.size || 50) / 2, window.innerHeight * 0.85, 44);
        const c2 = contactPoint(target);
        spawnImpactStar(c2.x, c2.y, 56);
        if (window.__sfx) window.__sfx.wallCrack();
        applyStun(target, 1200);
        applyDamage(s, target, dirX, null, { kb: 1.8 });
      }, 380);
      return;
    }
    if (mode === 'water') {
      sayBubble(s, '水ッ！', 900);
      if (window.__sfx) window.__sfx.waterSplash();
      later(() => {
        if (!target.alive || state !== 'ch3') return;
        const c = contactPoint(target);
        const w = document.createElement('div');
        w.className = 'water-wave';
        w.style.left = (c.x - 34) + 'px'; w.style.top = (c.y - 20) + 'px';
        fxL.appendChild(w); setTimeout(() => w.remove(), 750);
        target.slowUntil = performance.now() + 2800;
        dmgPop(c.x, c.y - 34, 'SLOWED', false, true);
        applyDamage(s, target, dirX, null, { kb: 0.8 });
      }, 300);
      return;
    }
    // WIND — a rushing gust; AIRBORNE foes are hurled tumbling across the sky
    sayBubble(s, '風ッ！', 900);
    if (window.__sfx) { window.__sfx.flap(); window.__sfx.dashWhoosh(1.3); }
    const gust = document.createElement('div');
    gust.className = 'wind-gust';
    gust.style.top = Math.max(40, (target.baseY != null ? target.baseY : target.y) - 20) + 'px';
    fxL.appendChild(gust); setTimeout(() => gust.remove(), 900);
    later(() => {
      if (!target.alive || state !== 'ch3') return;
      if (target.flying) blowAway(s, target, dirX);
      else applyDamage(s, target, dirX, null, { kb: 2.2 });
    }, 320);
  }

  // Blown away — an airborne foe is hurled tumbling across the sky
  function blowAway(s, target, dirX) {
    const W = window.innerWidth;
    const c = contactPoint(target);
    dmgPop(c.x, c.y - 30, 'BLOWN AWAY', false, true);
    for (let k = 0; k < 5; k++) spawnDust(c.x + rand(-12, 12), c.y + rand(-12, 12), { smoke: true, size: rand(10, 18), dx: dirX * rand(24, 48), dy: rand(-10, 6) });
    applyDamage(s, target, dirX, null, { kb: 0.5 });
    if (!target.alive || target.striking) return;
    target.x = Math.max(W * 0.03, Math.min(W * 0.95, target.x + dirX * rand(240, 340)));
    target.baseY = Math.max(window.innerHeight * 0.12, target.baseY - rand(20, 60));
    target.el.style.transition = 'left .7s cubic-bezier(.2,.7,.35,1), top .7s ease, transform .7s ease-in';
    target.el.style.left = target.x + 'px';
    target.el.style.top = target.baseY + 'px';
    target.el.style.transform = `rotate(${dirX * 540}deg)`;
    setTimeout(() => {
      if (!target.alive || target.striking) return;
      target.el.style.transition = 'transform .25s ease';
      target.el.style.transform = '';
      setTimeout(() => { if (target.alive && !target.striking) target.el.style.transition = ''; }, 260);
    }, 720);
  }

  // Shared damage + reactions. opts: {light} = tracer-round tick,
  // {kb} = knockback multiplier, {noBlock}, {noMp},
  // {trueDmg} = ignores golden shields, shield blocks and arcane barriers
  function applyDamage(s, target, dirX, dmgOverride, opts = {}) {
    if (!target.alive) return;
    let amount = dmgOverride != null ? dmgOverride : s.dmg;
    const nowT = performance.now();
    // BLOODLUST — the longer the war drags, the heavier every blow lands
    amount *= bloodScale();
    // FINAL DUEL — commanders trade killing blows, not taps
    if (esc.duel && s && s.commander) amount *= 1.4;
    // EAST COMMANDER — every strike he makes is TRUE DAMAGE
    if (s && s.trueDamage && !opts.trueDmg) opts.trueDmg = true;
    // War-chant damage buff (east commander's blessing)
    if (s && s.dmgBoostUntil && nowT < s.dmgBoostUntil) amount *= 1.35;
    // JUDGED — heaven's brand: the marked take heavier blows
    const targetJudged = target.judgedUntil && nowT < target.judgedUntil;
    if (targetJudged) amount *= 1.3;
    // EAST COMMANDER — arcane barrier: chance to fully nullify the blow
    // (set down for the final duel)
    if (!esc.duel && target.commander && target.cls && target.cls.key === 'wizard' && !opts.noBlock && !opts.trueDmg && Math.random() < 0.45) {
      const c = contactPoint(target);
      spawnImpactStar(c.x, c.y - 6, 32);
      spawnCastRing(c.x, c.y, target.side);
      if (window.__sfx) window.__sfx.sparkleShimmer();
      dmgPop(c.x, c.y - 26, 'NULL', false, true);
      return;
    }
    // TANK COMMANDER — TAUNT STANCE: while his challenge rings he DRINKS
    // the blows meant for him, turning damage into health (fatigue thins the
    // draught; the duel forbids it outright)
    if (!esc.duel && target.absorbUntil && nowT < target.absorbUntil) {
      const gain = Math.min(target.maxHp - target.hp, amount * 0.6 * healScale());
      if (gain > 0) { target.hp += gain; updateHp(target); }
      const cA = contactPoint(target);
      spawnImpactStar(cA.x - dirX * 14, cA.y, 30);
      healPop(cA.x, cA.y - 26, 'ABSORB +' + Math.round(gain));
      if (window.__sfx) window.__sfx.shing();
      return;
    }
    // Golden temporary shields (west special) soak most of the blow —
    // unless the blow is TRUE DAMAGE (judgement thunder pierces everything)
    if (!opts.trueDmg && target.shieldUntil && nowT < target.shieldUntil) {
      amount *= 0.35;
      const c0 = contactPoint(target);
      spawnImpactStar(c0.x, c0.y - 8, 26);
    }
    // BROAD SHIELD — shieldbearers catch blows on the shield: clang, spark, shrug.
    // The west commander's great shield blocks over half of everything —
    // but in the FINAL DUEL even the great shield falters (half chance,
    // and true damage strikes clean through it)
    let blockChance = target.cls && target.cls.key === 'armored'
      ? (target.commander ? 0.68 : 0.35) : 0;
    if (esc.duel) blockChance *= 0.5;
    // (the tank commander's great shield alone turns aside even TRUE damage)
    if (blockChance && !opts.noBlock && (!opts.trueDmg || (target.commander && !esc.duel)) && Math.random() < blockChance) {
      const c = contactPoint(target);
      spawnImpactStar(c.x - dirX * 16, c.y, 36);
      if (window.__sfx) window.__sfx.swordClang();
      dmgPop(c.x, c.y - 22, 'BLOCK', false, true);
      target.el.style.transition = 'transform .1s ease-out';
      target.el.style.transform = `translate(${dirX * 4}px,0) scale(1.04,.96)`;
      setTimeout(() => { if (target.alive && !target.striking) { target.el.style.transform = ''; } }, 140);
      amount *= 0.2;
      target.hp -= amount;
      updateHp(target);
      if (target.hp <= 0) killBlow(s, target, dirX);
      return;
    }
    // VANGUARD BLESSING — the west commander's chosen few hit harder
    if (s && s.vanguardBlessing && leftCmd && leftCmd.alive) amount *= 1.2;
    // CRITS — chance & multiplier are per-class stats; the blessing sharpens both
    let crit = false;
    if (!opts.light) {
      let cc = (s && s.critChance) || 0.12;
      let cd = (s && s.critDmg) || 1.6;
      if (s && s.vanguardBlessing && leftCmd && leftCmd.alive) { cc += 0.15; cd += 0.3; }
      if (targetJudged) cc += 0.20; // the marked are easy prey
      if (Math.random() < cc) { crit = true; amount *= cd; }
    }
    target.hp -= amount;
    updateHp(target);
    // MP: dealing damage charges your meter — and TAKING damage charges yours
    // too (comeback rule). Charge flows at FULL rate — ultimates come often.
    if (!opts.noMp && s && s.side) {
      let mpGain = amount * 0.03 + (target.hp <= 0 ? 2 : 0);
      // Striking the IRON VANGUARD's golden shields feeds the attacker far
      // less power — the vanguard gives nothing away
      if (target.shieldUntil && nowT < target.shieldUntil) mpGain *= 0.3;
      gainMp(s.side, mpGain);
    }
    if (!opts.noMp && target.side) gainMp(target.side, amount * 0.025);
    const cc = contactPoint(target);
    dmgPop(cc.x + rand(-10, 10), cc.y - 14, Math.round(amount), crit, opts.light);
    if (opts.light) {
      // tracer tick — flash only, no big reaction until the burst ends
      target.el.classList.remove('hit'); void target.el.offsetWidth; target.el.classList.add('hit');
      if (target.hp <= 0) killBlow(s, target, dirX);
      return;
    }
    if (window.__sfx) window.__sfx.hit();
    const tr = target.el.getBoundingClientRect();
    spawnDust(tr.left + tr.width / 2, tr.top + tr.height * 0.7, {
      dark: true, size: rand(18, 36), dx: dirX * rand(8, 30), dy: rand(-26, -6)
    });
    if (target.hp <= 0) { killBlow(s, target, dirX); return; }
    if (!opts.noReact) hitReaction(target, dirX, (opts.kb || 1) * (crit ? 1.3 : 1));
  }

  // Floating RPG damage number
  function dmgPop(x, y, val, crit, mini) {
    const d = document.createElement('div');
    d.className = 'dmg-pop' + (crit ? ' crit' : '') + (mini ? ' mini' : '');
    d.textContent = crit ? val + '!!' : val;
    d.style.left = x + 'px'; d.style.top = y + 'px';
    fxL.appendChild(d);
    requestAnimationFrame(() => d.classList.add('go'));
    setTimeout(() => d.remove(), 850);
  }

  /* ── STATUS EFFECTS — stun · burn · cleanse ── */
  function applyStun(t, ms) {
    if (!t || !t.alive) return;
    const c = contactPoint(t);
    // Commanders cannot be stunned — they anchor their armies
    if (t.commander) { dmgPop(c.x, c.y - 28, 'RESIST', false, true); return; }
    t.stunUntil = Math.max(t.stunUntil || 0, performance.now() + ms);
    t.el.classList.remove('marching');
    t.el.classList.add('stunned');
    dmgPop(c.x, c.y - 30, 'STUN', false, true);
    if (t._stunEl) t._stunEl.remove();
    const d = document.createElement('div');
    d.className = 'stun-stars';
    d.innerHTML = `<svg viewBox="0 0 44 18"><g fill="#ffd257" stroke="#3a2218" stroke-width="1.2">
      <path d="M6 9 l2.2 -1 l1 -2.2 l1 2.2 l2.2 1 l-2.2 1 l-1 2.2 l-1 -2.2 Z"/>
      <path d="M19 4.5 l2.2 -1 l1 -2.2 l1 2.2 l2.2 1 l-2.2 1 l-1 2.2 l-1 -2.2 Z"/>
      <path d="M32 9 l2.2 -1 l1 -2.2 l1 2.2 l2.2 1 l-2.2 1 l-1 2.2 l-1 -2.2 Z"/>
    </g></svg>`;
    t.el.appendChild(d);
    t._stunEl = d;
    setTimeout(() => {
      if (t._stunEl === d) { d.remove(); t._stunEl = null; t.el.classList.remove('stunned'); }
    }, ms + 30);
  }

  function applyBurn(t, ms, side) {
    if (!t || !t.alive) return;
    t.burnUntil = Math.max(t.burnUntil || 0, performance.now() + ms);
    t.burnSide = side;
    const c = contactPoint(t);
    dmgPop(c.x, c.y - 30, 'BURN', false, true);
    if (!t._burnFx) {
      const d = document.createElement('div');
      d.className = 'burn-fx';
      d.innerHTML = `<svg viewBox="0 0 20 24" style="width:100%;height:100%;overflow:visible">
        <path d="M10 2 q-6 8 -4.5 13 a 5 5 0 0 0 9.5 0 q 1.5 -6 -5 -13 z" fill="rgba(255,150,60,.8)" stroke="#3a2218" stroke-width="1.6"/>
        <path d="M8 16 q2 3 4.5 .5" fill="none" stroke="#3a2218" stroke-width="1.2"/>
      </svg>`;
      t.el.appendChild(d);
      t._burnFx = d;
    }
  }
  function clearBurnFx(t) {
    if (t._burnFx) { t._burnFx.remove(); t._burnFx = null; }
  }

  // IRON VANGUARD's cleanse — strips slow, stun and burn in one flash
  function cleanseStatuses(t) {
    const nowT = performance.now();
    const had = (t.slowUntil && nowT < t.slowUntil) || (t.stunUntil && nowT < t.stunUntil) || (t.burnUntil && nowT < t.burnUntil) || (t.judgedUntil && nowT < t.judgedUntil);
    t.slowUntil = 0; t.stunUntil = 0; t.burnUntil = 0; t.judgedUntil = 0;
    if (t._judgedFx) { t._judgedFx.remove(); t._judgedFx = null; }
    if (t._stunEl) { t._stunEl.remove(); t._stunEl = null; }
    t.el.classList.remove('stunned');
    clearBurnFx(t);
    if (had) {
      const c = contactPoint(t);
      dmgPop(c.x, c.y - 30, 'CLEANSED', false, true);
    }
  }

  // WEST PASSIVE — the commander's presence blesses a few front-liners with a
  // LESSER IRON VANGUARD: faster strikes, harder hits, deadlier crits — for as
  // long as the commander stands.
  function applyVanguardBlessing() {
    if (!leftCmd || !leftCmd.alive) return;
    const front = leftTribe
      .filter(s => s.alive && !s.commander && (s.role === 'frontline' || s.role === 'mid'))
      .slice(0, 3);
    front.forEach((s, i) => {
      s.vanguardBlessing = true;
      setTimeout(() => {
        if (!s.alive) return;
        const d = document.createElement('div');
        d.className = 'vanguard-lite';
        s.el.appendChild(d);
        const c = contactPoint(s);
        spawnImpactStar(c.x, c.y - 10, 26);
        if (window.__sfx) window.__sfx.shing();
      }, 600 + i * 240);
    });
  }

  /* ── SUPPORT BARRAGE — long-range fire from the stationed support teams ──
     WEST (modern): mortar shells lobbed in a high arc, RPG rockets.
     EAST (fantasy): wind gusts, fire orbs, earth spikes, water waves. */
  function supportBarrage(side) {
    if (state !== 'ch3') return;
    const tribe = side === 'left' ? leftTribe : rightTribe;
    const foes = (side === 'left' ? rightTribe : leftTribe).filter(e => e.alive);
    const sup = pick(tribe.filter(s => s.alive && s.role === 'support'));
    if (!sup || !foes.length) return;
    const target = pick(foes);
    if (side === 'left') {
      sup._ordFlip = !sup._ordFlip;
      if (sup._ordFlip) fireMortar(sup, target); else fireRPG(sup, target);
    } else {
      sup._spellIdx = ((sup._spellIdx || 0) + 1) % 4;
      castSupportSpell(sup, target, ['wind','fire','earth','water'][sup._spellIdx]);
    }
  }

  // WEST — MORTAR: a shell lobbed high with a whistle, falling into a blast
  function fireMortar(s, target) {
    if (!s.alive) return;
    if (window.__sfx) { window.__sfx.thunk(); window.__sfx.boomRamp(0.25, 0.18); }
    const a = projAnchor(s);
    const b = projTargetPoint(target);
    const tx = b.x + rand(-30, 30), ty = b.y + rand(-8, 8);
    // recoil puff at the tube
    spawnDust(a.x, a.y, { smoke: true, size: rand(14, 22), dy: rand(-20, -10) });
    const shell = document.createElement('div');
    shell.style.cssText = 'position:absolute; width:16px; height:16px; z-index:74; pointer-events:none;';
    shell.innerHTML = `<svg viewBox="0 0 16 16" style="width:100%;height:100%;overflow:visible">
      <ellipse cx="8" cy="8" rx="5" ry="7" fill="#4a545c" stroke="#3a2218" stroke-width="1.6"/>
      <path d="M8 15 L5 19 M8 15 L11 19" stroke="#3a2218" stroke-width="1.4"/>
    </svg>`;
    fxL.appendChild(shell);
    const t0 = performance.now(), ms = 1050;
    const apex = Math.min(a.y, ty) - rand(180, 260);
    let whistled = false;
    const step = (nowT) => {
      const p = Math.min(1, (nowT - t0) / ms);
      const x = a.x + (tx - a.x) * p;
      const y = (1 - p) * (1 - p) * a.y + 2 * (1 - p) * p * apex + p * p * ty;
      shell.style.left = (x - 8) + 'px';
      shell.style.top = (y - 8) + 'px';
      shell.style.transform = `rotate(${(-60 + p * 120).toFixed(0)}deg)`;
      if (!whistled && p > 0.55) { whistled = true; if (window.__sfx) window.__sfx.fallWhistle(); }
      if (p < 1 && shell.isConnected) requestAnimationFrame(step);
      else {
        shell.remove();
        if (state !== 'ch3') return;
        // IMPACT — blast ring, crater dust, AoE splash
        spawnImpactStar(tx, ty, 96);
        hitstop(50);
        if (window.__sfx) window.__sfx.kaboom(0.5);
        for (let i = 0; i < 7; i++) {
          const aa = (i / 7) * Math.PI * 2;
          spawnDust(tx, ty, { dark: i % 2 === 0, size: rand(16, 30), dx: Math.cos(aa) * rand(24, 50), dy: Math.sin(aa) * rand(18, 40) });
        }
        (s.side === 'left' ? rightTribe : leftTribe).filter(e => e.alive).forEach(e => {
          const er = e.el.getBoundingClientRect();
          const d = Math.hypot(er.left + er.width / 2 - tx, er.top + er.height / 2 - ty);
          if (d < 95) applyDamage(s, e, e.x > tx ? 1 : -1, d < 45 ? 16 : 10, { kb: 1.3 });
        });
      }
    };
    requestAnimationFrame(step);
  }

  // WEST — RPG: a rocket on a flat line with a smoke tail, ending in a blast
  // (also the ROCKETEER's standard attack, with class damage passed in)
  function fireRPG(s, target, mainDmg = 20, splashDmg = 12) {
    if (!s.alive || !target.alive) return;
    if (window.__sfx) { window.__sfx.dashWhoosh(0.6); window.__sfx.boomRamp(0.3, 0.25); }
    const a = projAnchor(s), b = projTargetPoint(target);
    const ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const flyMs = Math.max(320, Math.min(700, dist * 0.55));
    const p = spawnProjectile({
      x: a.x, y: a.y - 6, tx: b.x, ty: b.y, ms: flyMs, w: 34, h: 12,
      html: `<svg viewBox="0 0 34 12" style="width:100%;height:100%;overflow:visible;transform:rotate(${ang.toFixed(1)}deg)">
        <path d="M4 3 L22 3 L22 9 L4 9 Z" fill="#5a6a72" stroke="#3a2218" stroke-width="1.6"/>
        <path d="M22 2 L31 6 L22 10 Z" fill="#8c2f22" stroke="#3a2218" stroke-width="1.6"/>
        <path d="M4 3 L0 0 M4 9 L0 12" stroke="#3a2218" stroke-width="1.4"/>
      </svg>`
    });
    const trail = setInterval(() => {
      if (!p.isConnected) { clearInterval(trail); return; }
      const r = p.getBoundingClientRect();
      spawnDust(r.left + r.width / 2, r.top + r.height / 2, { smoke: true, size: rand(9, 16), dx: rand(-4, 4), dy: rand(-6, 4) });
    }, 50);
    setTimeout(() => clearInterval(trail), flyMs + 60);
    later(() => {
      if (state !== 'ch3') return;
      const c = target.alive ? contactPoint(target) : { x: b.x, y: b.y };
      spawnImpactStar(c.x, c.y, 104);
      hitstop(60);
      if (window.__sfx) window.__sfx.kaboom(0.55);
      for (let i = 0; i < 8; i++) {
        const aa = (i / 8) * Math.PI * 2;
        spawnDust(c.x, c.y, { dark: i % 2 === 0, size: rand(16, 32), dx: Math.cos(aa) * rand(26, 54), dy: Math.sin(aa) * rand(20, 44) });
      }
      (s.side === 'left' ? rightTribe : leftTribe).filter(e => e.alive).forEach(e => {
        const er = e.el.getBoundingClientRect();
        const d = Math.hypot(er.left + er.width / 2 - c.x, er.top + er.height / 2 - c.y);
        if (e === target) applyDamage(s, e, e.x > c.x ? 1 : -1, mainDmg, { kb: 1.8 });
        else if (d < 85) applyDamage(s, e, e.x > c.x ? 1 : -1, splashDmg, { kb: 1.4 });
      });
    }, flyMs);
  }

  // EAST — ELEMENTAL SUPPORT MAGIC: wind / fire / earth / water
  function castSupportSpell(s, target, kind, quiet) {
    if (!s.alive) return;
    const cast = txt => { if (!quiet) sayBubble(s, txt, 1400); spawnCastRing(contactPoint(s).x, contactPoint(s).y, s.side); };
    if (kind === 'fire') {
      cast('炎よッ！');
      if (window.__sfx) window.__sfx.magicSpell();
      fireOrb(s, target, target.x > s.x ? 1 : -1);
      return;
    }
    if (kind === 'earth') {
      cast('岩よッ！');
      const c = target.alive ? contactPoint(target) : null;
      if (!c) return;
      if (window.__sfx) window.__sfx.stoneSet();
      later(() => {
        if (state !== 'ch3' || !target.alive) return;
        spawnSpire(c.x, window.innerHeight * 0.85, 40);
        spawnImpactStar(c.x, c.y, 56);
        if (window.__sfx) window.__sfx.wallCrack();
        applyStun(target, 1000);
        applyDamage(s, target, target.x > window.innerWidth / 2 ? 1 : -1, 16, { kb: 1.5 });
      }, 420);
      return;
    }
    if (kind === 'water') {
      cast('水よッ！');
      if (window.__sfx) window.__sfx.waterSplash();
      later(() => {
        if (state !== 'ch3' || !target.alive) return;
        const c = contactPoint(target);
        // a blue wave ripple + soaked slow
        const w = document.createElement('div');
        w.className = 'water-wave';
        w.style.left = (c.x - 34) + 'px'; w.style.top = (c.y - 20) + 'px';
        fxL.appendChild(w); setTimeout(() => w.remove(), 750);
        for (let i = 0; i < 5; i++) spawnDust(c.x + rand(-16, 16), c.y + rand(-8, 8), { smoke: true, size: rand(10, 18), dy: rand(-20, -6) });
        target.slowUntil = performance.now() + 2600;
        target.cooldown = (target.cooldown || 0) + 1.2;
        applyDamage(s, target, target.x > window.innerWidth / 2 ? 1 : -1, 10, { kb: 0.8 });
        dmgPop(c.x, c.y - 34, 'SLOWED', false, true);
      }, 380);
      return;
    }
    // WIND — a rushing gust that shoves the nearest west attackers back
    cast('風よッ！');
    if (window.__sfx) { window.__sfx.flap(); window.__sfx.dashWhoosh(1.3); }
    const W = window.innerWidth;
    const gust = document.createElement('div');
    gust.className = 'wind-gust';
    gust.style.top = (window.innerHeight * 0.55) + 'px';
    fxL.appendChild(gust); setTimeout(() => gust.remove(), 900);
    later(() => {
      if (state !== 'ch3') return;
      leftTribe.filter(e => e.alive && !e.flying && e.x > W * 0.40)
        .sort((a2, b2) => b2.x - a2.x)
        .slice(0, 3)
        .forEach((e, i) => {
          setTimeout(() => {
            if (!e.alive) return;
            applyDamage(s, e, -1, 5, { kb: 2.2 });
            const c = contactPoint(e);
            for (let k = 0; k < 3; k++) spawnDust(c.x + rand(-10, 10), c.y + rand(-10, 10), { smoke: true, size: rand(10, 16), dx: -rand(20, 40), dy: rand(-8, 4) });
          }, i * 90);
        });
    }, 350);
  }

  /* ── EAST COMMANDER — the archmage's arsenal ─────────────────
     Every strike is TRUE DAMAGE with a killer's crit (see setupCommanders).
     QUAD ELEMENT: all four elements cast as one, at four different marks.
     ARCANE HOOK: reels the enemy's hiding backline out into the open.
     BLINK + REPULSE: he will not be cornered, and will not be pushed. */
  function wizardCommanderAttack(s, target, dirX) {
    s._cmdCast = (s._cmdCast || 0) + 1;
    const nowT = performance.now();
    // ARCANE HOOK — drag a lurking backliner across the field
    if (nowT > (s._nextHookAt || 0) && Math.random() < 0.30) {
      if (arcaneHook(s)) { s._nextHookAt = nowT + 11000; return; }
    }
    // QUAD ELEMENT — every fourth cast, the sky answers in four voices
    if (s._cmdCast % 4 === 0) return quadElementCast(s);
    wizardElemental(s, target, dirX);
  }

  function quadElementCast(s) {
    if (state !== 'ch3' || !s.alive) return;
    sayBubble(s, '四大・同時詠唱ッ!!', 1800);
    if (window.__sfx) { window.__sfx.magicSpell(); window.__sfx.sparkleShimmer(); window.__sfx.speak('yondai douji eishou', 'wizard'); }
    const cc = contactPoint(s);
    spawnCastRing(cc.x, cc.y, s.side);
    spawnCastRing(cc.x, cc.y - 22, s.side);
    const foes = leftTribe.filter(e => e.alive).sort(() => Math.random() - 0.5).slice(0, 4);
    if (!foes.length) return;
    ['fire', 'earth', 'water', 'wind'].forEach((kind, i) => {
      const t = foes[i % foes.length];
      setTimeout(() => {
        if (s.alive && t.alive && state === 'ch3') castSupportSpell(s, t, kind, true);
      }, 140 + i * 170);
    });
  }

  // ARCANE HOOK — a rune chain lashes across the field and REELS the
  // enemy's backline out of hiding, dumping them before the east line
  function arcaneHook(s) {
    const W = window.innerWidth;
    const prey = leftTribe

  /* ── FRONTLINE TIDE — how deep a smiley stands in enemy territory (0..1) ── */
  function depthInto(t) {
    const W = window.innerWidth;
    if (t.side === 'left') return Math.max(0, Math.min(1, (t.x - W * 0.5) / (W * 0.42)));

  // Heavy launch: big knockback + optional stun. Deep intruders fly farther
  // (tide), the iron vanguard never moves, oni guardians barely budge.
  function slamBack(t, dirX, dist, stunMs = 0) {
    if (!t || !t.alive || t.striking) return;
    const nowT = performance.now();
    // The wizard commander cannot be slammed — he blinks clear of the blow
    // (no blinking once the duel is joined)
    if (t.commander && t.cls && t.cls.key === 'wizard' && !esc.duel) {
      if (nowT > (t._nextBlinkAt || 0)) { t._nextBlinkAt = nowT + 4200; blinkTeleport(t); }
      else { const cB = contactPoint(t); dmgPop(cB.x, cB.y - 26, 'WARDED', false, true); }
      return;
    }

      const c = contactPoint(t);

    const homeward = t.side === 'left' ? dirX < 0 : dirX > 0;
    let d = dist * (homeward ? 1 + depthInto(t) * 1.4 : 1);
    if (t.cls && t.cls.key === 'oni') { d *= 0.35; stunMs *= 0.5; }
    if (t.commander) d *= 0.55;
    if (stunMs > 0) applyStun(t, stunMs);

      if (!t.alive || t.striking) return;

  /* ── WAR BANNER — big painted announcement for captain ults & trump cards ── */
