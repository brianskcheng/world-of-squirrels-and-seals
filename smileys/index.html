  function beginTraining() {
    [...leftTribe, ...rightTribe].forEach((s, idx) => {
      later(() => { if (state === 'ch2') previewClass(s); }, idx * 220);
    });
    if (window.__sfx) later(() => window.__sfx.fanfare(), 300);
  }

  function eastHardship() {
    rightTribe.slice(0, 3).forEach((s, i) => {
      later(() => {
        if (state === 'ch2' && s.alive) sayBubble(s, pick(['so hungry…','the well is dry…','nothing grows…']), 2400);
      }, 600 + i * 1100);
    });
  }

  // Day 76 — the east ACTUALLY looks over the wall: a small party crosses
  // the fields, two of them CLIMB the east face stone by stone and cling
  // near the top, heads peeking over at the west's plenty. A third cranes
  // up from the foot of the wall.
  function eastLooksOver() {
    if (state !== 'ch2') return;
    const wr = wallG.getBoundingClientRect();
    const climbers = rightTribe.slice(0, 2);
    const watcher = rightTribe[2];
    climbers.forEach((s, i) => {
      later(() => {
        if (state !== 'ch2' || !s.alive) return;
        s.looking = true; s.busy = true;
        s.lying = false; s.el.classList.remove('lying');
        // 1 — walk with intent to the foot of the wall
        const footX = wr.right + 8 + i * 34;
        s.el.classList.add('walking');
        s.el.classList.remove('flip-x'); // face the wall
        s.el.style.transition = 'left 2.2s ease-in-out';
        s.el.style.left = footX + 'px'; s.x = footX;
        later(() => {
          if (state !== 'ch2' || !s.alive) return;
          // 2 — climb the east face, stone by stone
          s.el.classList.remove('walking');
          s.el.classList.add('climbing');
          if (window.__sfx) { window.__sfx.stoneSet(); setTimeout(() => window.__sfx.stoneSet(), 900); }
          const clingX = wr.right - s.size * 0.58 + i * 18;
          const peekY = wr.top - s.size * 0.55 + i * 12; // head just above the parapet
          s.el.style.transition = 'left 2.8s ease-in-out, top 2.8s ease-in-out';
          s.el.style.left = clingX + 'px'; s.x = clingX;
          s.el.style.top = peekY + 'px';
          later(() => {
            if (state !== 'ch2' || !s.alive) return;
            // 3 — hold the top and STARE at the abundance
            s.el.classList.remove('climbing');
            sayBubble(s, pick(['look at it all…','they have iron…','so much grain…']), 2800);
            // small stunned peek-bobs as they take it in
            [1600, 3400].forEach(tt => later(() => {
              if (state !== 'ch2' || !s.alive) return;
              s.el.style.transition = 'top .5s ease-in-out';
              s.el.style.top = (peekY - 5) + 'px';
              later(() => { if (state === 'ch2' && s.alive) s.el.style.top = peekY + 'px'; }, 520);
            }, tt));
            // 4 — seen enough: climb back down and carry the news home
            later(() => {
              if (state !== 'ch2' || !s.alive) return;
              s.el.classList.add('climbing');
              s.el.style.transition = 'left 2.2s ease-in-out, top 2.2s ease-in-out';
              const downX = wr.right + 10 + i * 30;
              s.el.style.left = downX + 'px'; s.x = downX;
              s.el.style.top = s.baseY + 'px';
              if (window.__sfx) window.__sfx.stoneSet();
              later(() => {
                if (state !== 'ch2' || !s.alive) return;
                s.el.classList.remove('climbing');
                s.el.classList.add('walking', 'flip-x'); // turn for home
                const homeX = rand(window.innerWidth * 0.66, window.innerWidth * 0.90);
                const ms = Math.abs(homeX - s.x) / 0.085;
                s.el.style.transition = 'left ' + (ms / 1000).toFixed(2) + 's linear';
                s.el.style.left = homeX + 'px'; s.x = homeX;
                later(() => {
                  if (!s.alive) return;
                  s.el.classList.remove('walking');
                  s.looking = false; s.busy = false; // rejoin the day's bustle
                }, ms + 80);
              }, 2300);
            }, 5400);
          }, 2900);
        }, 2300);
      }, i * 700);
    });
    // the third hangs back at the foot, craning upward
    if (watcher) later(() => {
      if (state !== 'ch2' || !watcher.alive) return;
      watcher.looking = true; watcher.busy = true;
      watcher.lying = false; watcher.el.classList.remove('lying');
      watcher.el.classList.add('walking');
      watcher.el.classList.remove('flip-x');
      watcher.el.style.transition = 'left 2.4s ease-in-out';
      const tx = wr.right + 46;
      watcher.el.style.left = tx + 'px'; watcher.x = tx;
      later(() => {
        if (state !== 'ch2' || !watcher.alive) return;
        watcher.el.classList.remove('walking');
        sayBubble(watcher, 'what do you see?', 2600);
        // the answer sinks in — then off to spread the word
        later(() => {
          if (state !== 'ch2' || !watcher.alive) return;
          sayBubble(watcher, 'we must tell the others…', 2400);
          watcher.el.classList.add('walking', 'flip-x');
          const homeX = rand(window.innerWidth * 0.70, window.innerWidth * 0.92);
          const ms = Math.abs(homeX - watcher.x) / 0.085;
          watcher.el.style.transition = 'left ' + (ms / 1000).toFixed(2) + 's linear';
          watcher.el.style.left = homeX + 'px'; watcher.x = homeX;
          later(() => {
            if (!watcher.alive) return;
            watcher.el.classList.remove('walking');
            watcher.looking = false; watcher.busy = false;
          }, ms + 80);
        }, 5200);
      }, 2500);
    }, 1300);
  }

  function _runBuildStory(i) {
    if (state !== 'ch2' || !build) return;
    if (i >= BUILD_BEATS.length) { _finishBuildPhase(); return; }
    const b = BUILD_BEATS[i];
    // Days glide so the clock lands on this beat's day about when its line ends
    const estMs = Math.max(2800, Math.min(11000, b.text.length * 82));
    build.targetDay = b.day;
    build.rate = Math.max(0.25, (b.day - build.day) / (estMs / 1000));
    // Structures rise in rhythm with the words that describe them
    if (b.structs != null) {
      const spread = (plan, from, to) => {
        for (let k = from; k < to; k++) {
          later(() => { if (state === 'ch2') constructStruct(plan[k]); },
            ((k - from) + rand(0.25, 0.7)) / Math.max(1, to - from) * estMs * 0.85);
        }
      };
      spread(build.planL, build.placedL, Math.min(b.structs, build.planL.length));
      spread(build.planR, build.placedR, Math.min(b.structs, build.planR.length));
      build.placedL = Math.max(build.placedL, Math.min(b.structs, build.planL.length));
      build.placedR = Math.max(build.placedR, Math.min(b.structs, build.planR.length));
    }
    if (b.onStart) b.onStart();
    narrate(b.text, 'narrator', null, () => later(() => _runBuildStory(i + 1), 450));
  }

  // The last days of peace: the fracture spreads in escalating jolts, then war
  function _finishBuildPhase() {
    if (state !== 'ch2') return;
    if (build) { build.targetDay = 90; build.rate = 1.1; }
    [
      { rev: 0.33, lvl: 0.45, at: 500 },
      { rev: 0.50, lvl: 0.55, at: 1450 },
      { rev: 0.66, lvl: 0.68, at: 2400 },
      { rev: 0.81, lvl: 0.80, at: 3300 },
      { rev: 0.94, lvl: 0.92, at: 4200 }
    ].forEach(st => later(() => {
      if (state !== 'ch2') return;
      setCrackProgress(st.rev);
      crackJolt(st.lvl);
    }, st.at));
    later(() => startChapter3(), 5400);
  }

  function previewClass(s) {
    if (!s.plannedClass) return;
    const cls = s.plannedClass;
    const icon = document.createElement('div');
    icon.style.cssText = 'position:absolute; left:50%; top:-30px; transform:translateX(-50%); width:24px; height:24px; pointer-events:none; opacity:0; transition: opacity .5s ease;';
    icon.innerHTML = `<svg viewBox="0 0 24 24" style="width:100%;height:100%;overflow:visible"><use href="#${cls.icon}"/></svg>`;
    s.el.appendChild(icon);
    s.weaponIcon = icon;
    requestAnimationFrame(() => icon.style.opacity = '1');
    if (window.__sfx) {
      window.__sfx.sparkleShimmer();
    }
  }

  function sayBubble(s, text, ms=1500) {
    const old = s.el.querySelector('.bubble'); if (old) old.remove();
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    s.el.appendChild(b);
    setTimeout(() => { if (b.parentNode) b.remove(); }, ms);
  }

  function planBuilds(side) {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const ground = H * 0.85;
    const set = side === 'left' ? STRUCTS_LEFT : STRUCTS_RIGHT;
    const zoneMin = side === 'left' ? W * 0.015 : W * 0.575;
    const zoneMax = side === 'left' ? W * 0.425 : W * 0.985;
    const zoneW = zoneMax - zoneMin;
    // Two depth rows (front street + back street). Each row is laid out
    // SEQUENTIALLY — sizes scaled to fit the zone first — so footprints can
    // never overlap at ANY viewport width.
    const rows = [
      { y0: 0, scale: 1, z: 3, items: [] },                  // front street
      { y0: rand(16, 28), scale: 0.82, z: 2, items: [] }     // back street, a step up the slope
    ];
    set.forEach((sym, i) => {
      const row = rows[i % 2];
      const big = (sym === 's-tower' || sym === 's-barracks');
      row.items.push({ sym, sz: (big ? rand(105, 130) : rand(68, 100)) * row.scale, order: i });
    });
    const list = [];
    rows.forEach(row => {
      const pad = 14;
      const n = row.items.length;
      if (!n) return;
      // scale the whole row down if it physically cannot fit its street
      const rawSum = row.items.reduce((a, it) => a + it.sz, 0);
      const fit = Math.max(0.3, Math.min(1, (zoneW - pad * (n - 1)) / rawSum));
      // shuffle the street order so villages differ run to run
      const street = row.items.slice().sort(() => Math.random() - 0.5);
      const totalSz = rawSum * fit;
      const slack = Math.max(0, zoneW - totalSz - pad * (n - 1));
      // split the leftover room into random gaps (edges + between houses)
      const weights = Array.from({ length: n + 1 }, () => Math.random());
      const wSum = weights.reduce((a, b) => a + b, 0) || 1;
      let cursor = zoneMin + (weights[0] / wSum) * slack;
      street.forEach((it, k) => {
        const sz = it.sz * fit;
        list[it.order] = { sym: it.sym, x: cursor, y: ground - sz - row.y0, size: sz, side, z: row.z };
        cursor += sz + pad + (weights[k + 1] / wSum) * slack;
      });
    });
    return list;
  }

  // A build order is CARRIED OUT, not conjured: the nearest free builders
  // walk to the site with intent, turn to face the frame, and hammer while
  // it rises out of the ground in front of them.
  function constructStruct(b) {
    if (state !== 'ch2') return;
    const tribe = b.side === 'left' ? leftTribe : rightTribe;
    const cx = b.x + b.size / 2;
    const crew = tribe
      .filter(s => s.alive && !s.busy && !s.looking && !s.lying)
      .sort((p, q) => Math.abs(p.x - cx) - Math.abs(q.x - cx))
      .slice(0, 2);
    if (!crew.length) { placeStruct(b); return; }
    crew.forEach((s, i) => {
      s.busy = true;
      const standX = cx + (i === 0 ? -1 : 1) * (b.size / 2 + 10) - s.size / 2;
      s.el.classList.add('walking');
      s.el.classList.toggle('flip-x', standX > s.x); // face where you're walking
      s.el.style.transition = 'left 1.15s ease-in-out';
      s.el.style.left = standX + 'px';
      s.x = standX;
    });
    later(() => { if (state === 'ch2' && crew[0] && crew[0].alive) sayBubble(crew[0], pick(['this spot!','raise it up!','to work!','beams first!']), 1400); }, 300);
    // arrive → turn to the site → the frame rises under their hammers
    later(() => {
      if (state !== 'ch2') { crew.forEach(s => { s.busy = false; s.el.classList.remove('walking'); }); return; }
      crew.forEach(s => {
        s.el.classList.remove('walking');
        s.el.classList.toggle('flip-x', cx > s.x + s.size / 2); // face the building
      });
      placeStruct(b);
      // hammer through the raising, then step back into the day's bustle
      later(() => crew.forEach(s => { s.busy = false; }), 2100);
    }, 1200);
  }

  // The raising itself — the frame climbs out of the ground, dust kicking
  // off the foundation while the crew hammers beside it
  function placeStruct(b) {
    const d = document.createElement('div');
    d.className = 'struct';
    d.style.width = b.size + 'px';
    d.style.height = b.size + 'px';
    d.style.left = b.x + 'px';
    d.style.top  = b.y + 'px';
    d.style.zIndex = String(b.z || 3);
    d.style.transformOrigin = '50% 100%';
    d.style.transform = 'scaleY(0.05)';
    // defeat the old CSS pop-in (opacity:0 + structRise fill-forwards would
    // override the inline transform for its whole lifetime)
    d.style.animation = 'none';
    d.style.opacity = '1';
    d.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%;overflow:visible"><use href="#${b.sym}"/></svg>`;
    buildL.appendChild(d);
    requestAnimationFrame(() => {
      d.style.transition = 'transform 1.6s cubic-bezier(.3,1.18,.4,1)';
      d.style.transform = 'scaleY(1)';
    });
    const baseX = b.x + b.size / 2, baseY2 = b.y + b.size;
    for (let i = 0; i < 4; i++) {
      later(() => { if (state === 'ch2') spawnDust(baseX + rand(-b.size * 0.4, b.size * 0.4), baseY2, { size: rand(10, 20), dy: rand(-14, -4) }); }, 120 + i * 380);
    }
    // Build sounds match the MATERIAL being raised, not one generic clunk:
    // forges ring like an anvil, wells set like stone, farms rustle, the rest
    // are knocked together out of wood.
    if (window.__sfx) {
      const S = window.__sfx;
      const sym = b.sym;
      if (sym === 's-forge') {
        S.woodKnock(240);
        setTimeout(() => S.anvilClang(), 120);
        setTimeout(() => S.anvilClang(), 320);
      } else if (sym === 's-well') {
        S.stoneSet();
        setTimeout(() => S.stoneSet(), 160);
      } else if (sym === 's-farm') {
        S.woodKnock(520);
        setTimeout(() => S.rustle(), 110);
      } else if (sym === 's-tower' || sym === 's-barracks') {
        S.thunk(); // heavy frame drops first
        setTimeout(() => S.woodKnock(300), 130);
        setTimeout(() => S.woodKnock(300), 300);
      } else { // huts, tents — nail the timber together
        S.woodKnock();
        setTimeout(() => S.woodKnock(), 140);
        setTimeout(() => S.woodKnock(), 300);
      }
    }
  }

  /* ── Build-phase daily life — normal village behaviour, not random jitter:
     walk somewhere at a walking pace, stand still a while, stop for a chat
     with a neighbour, or lie down and watch the clouds. ── */
  function builderLife(s) {
    const roll = Math.random();
    if (roll < 0.40) return builderStroll(s);
    if (roll < 0.72) { // just stand there, being
      s.el.classList.remove('walking');
      s.actUntil = performance.now() + rand(2400, 5600);
      return;
    }
    if (roll < 0.87) return builderChat(s);
    return builderLieDown(s);
  }

  function builderStroll(s) {
    const W = window.innerWidth;
    const minX = s.side === 'left' ? W * 0.03 : W * 0.55;
    const maxX = s.side === 'left' ? W * 0.45 : W * 0.97;
    // a stroll, not a teleport: modest distance at a human walking pace
    const tx = Math.max(minX, Math.min(maxX, s.x + (Math.random() < 0.5 ? -1 : 1) * rand(90, 260)));
    const ms = Math.max(400, Math.abs(tx - s.x) / 0.085); // ~85px per second
    s.el.classList.add('walking');
    s.el.classList.toggle('flip-x', tx > s.x); // face where you're going
    s.el.style.transition = 'left ' + (ms / 1000).toFixed(2) + 's linear';
    s.el.style.left = tx + 'px';
    s.x = tx;
    s.actUntil = performance.now() + ms + rand(600, 1800);
    setTimeout(() => { if (s.alive && !s.busy) s.el.classList.remove('walking'); }, ms + 40);
  }

  function builderChat(s) {
    const tribe = s.side === 'left' ? leftTribe : rightTribe;
    const pal = tribe
      .filter(o => o !== s && o.alive && !o.busy && !o.looking && !o.lying && Math.abs(o.x - s.x) < 240)
      .sort((a, b) => Math.abs(a.x - s.x) - Math.abs(b.x - s.x))[0];
    if (!pal) return builderStroll(s);
    const nowT = performance.now();
    // walk over, stop a polite step away, and face each other
    const tx = pal.x + (s.x < pal.x ? -1 : 1) * s.size * 0.95;
    const ms = Math.max(350, Math.abs(tx - s.x) / 0.085);
    s.el.classList.add('walking');
    s.el.classList.toggle('flip-x', tx > s.x);
    s.el.style.transition = 'left ' + (ms / 1000).toFixed(2) + 's linear';
    s.el.style.left = tx + 'px'; s.x = tx;
    s.actUntil = nowT + ms + rand(3000, 4600);
    pal.actUntil = Math.max(pal.actUntil || 0, nowT + ms + 3000); // the pal stays put to listen
    setTimeout(() => {
      if (state !== 'ch2' || !s.alive || s.busy) return;
      s.el.classList.remove('walking');
      s.el.classList.toggle('flip-x', pal.x > s.x); // face each other
      pal.el.classList.toggle('flip-x', s.x > pal.x);
      sayBubble(s, pick(['fine day','good walls, eh?','harvest soon','look at that sky','my feet ache']), 2200);
      setTimeout(() => { if (state === 'ch2' && pal.alive && !pal.lying) sayBubble(pal, pick(['mm-hm','aye','haha','true, true']), 1800); }, 1400);
    }, ms + 40);
  }

  function builderLieDown(s) {
    const ms = rand(3800, 6600);
    s.lying = true;
    s.el.classList.remove('walking');
    s.el.classList.add('lying');
    s.actUntil = performance.now() + ms + 400;
    if (Math.random() < 0.6) setTimeout(() => {
      if (s.lying && s.alive && state === 'ch2') sayBubble(s, pick(['ahh…','zzz','clouds…','five minutes…']), 2000);
    }, 1000);
    setTimeout(() => {
      s.lying = false;
      if (s.alive) s.el.classList.remove('lying');
    }, ms);
  }

  /* ==================== CHAPTER 3 — ARMAGEDDON ==================== */
  function startChapter3() {
    if (state !== 'ch2') return;
    // Skip pressed before the ch2 curtain built the stage — build it now so
    // the war never starts with empty tribes
    if (!leftTribe.length || !rightTribe.length) _setupChapter2Stage();
    state = 'ch3';
    clearTimers();
    if (window.__cancelCombat) window.__cancelCombat(); // no ghost battle loops
    build = null;
    // Flush any still-queued build narration (only relevant when skipping ahead)
    if (window.__sfx && window.__sfx.stopSpeech) window.__sfx.stopSpeech();
    killCount = 0;
    lastEarthAt = 0;
    cutscenesPlayed = { charge: false, clash: false };
    if (window.__sfx) {
      window.__sfx.stopMusic();
    }
    sagaBanner.style.display = 'none';
    clock.style.display = 'none';

    // ── NARRATION-DRIVEN OPENING ──
    // Every beat waits for its line to be fully spoken before the next fires,
    // so the story and the visuals can never drift apart. (A beat is a
    // function(next); call next() to advance.)
    function storyBeats(steps, idx = 0) {
      if (state !== 'ch3' || idx >= steps.length) return;
      steps[idx](() => storyBeats(steps, idx + 1));
    }

    storyBeats([
      next => later(next, 500),

      // The grievance — spoken by the tribes themselves
      next => {
        const east = pick(rightTribe);
        if (east) sayBubble(east, 'Their granaries... full!', 3000);
        narrate('Their granaries... full! And ours are empty!', 'villager', 'An East Smiley', next);
      },
      next => {
        const east = pick(rightTribe.filter(s => s.alive));
        if (east) sayBubble(east, 'We take what they have.', 3000);
        narrate('We take what they have. Or we starve.', 'villager', 'An East Smiley', next);
      },
      next => {
        const west = pick(leftTribe.filter(s => s.alive));
        if (west) sayBubble(west, 'They are coming!', 3000);
        narrate('They are coming! Defend the forges!', 'villager', 'A West Smiley', next);
      },

      // The wall falls — and the narrator mourns it while the stones drop
      next => {
        shakeBurst();
        fellWall();
        narrate('And so the wall fell. And so the smileys forgot what wall meant.', 'narrator', null, next);
      },
      next => later(next, 700),

      // Chapter curtain. Armies transform behind it. The next beat fires only
      // after the post-curtain narration has finished.
      next => curtainTransition({
        num: 'CHAPTER THREE',
        name: 'Armageddon',
        sub: 'the wall has fallen · and so begins the war over wells, forges, and pride',
        narration: 'And the smileys, who once shared a single garden, raised their weapons against each other.',
        profile: 'narrator',
        holdMs: 3600,
        onMid: () => armWarriorsForBattle(),
        onNarrated: next
      }),

      // War cries — narrator sets it up, THEN the roar happens
      next => narrate('Two tribes faced each other across the rubble. And they roared.', 'narrator', null, next),
      next => { doWarCries(); later(next, 6000); },

      // The charge — the commanders bellow CHARGE, the ranks answer with a
      // rolling roar, and combat begins as the two lines collide
      next => narrate('And then... they charged.', 'narrator', null, next),
      next => {
        bannerTitle.textContent = 'Chapter III · Armageddon';
        bannerSub.textContent = 'last smiley standing';
        sagaBanner.style.display = 'block';
        if (leftCmd && leftCmd.alive) {
          sayBubble(leftCmd, '突撃ィィィッ!!', 2400);
          leftCmd.el.classList.add('act-wave'); setTimeout(() => leftCmd && leftCmd.el.classList.remove('act-wave'), 1400);
        }
        if (rightCmd && rightCmd.alive) setTimeout(() => {
          if (rightCmd && rightCmd.alive) sayBubble(rightCmd, '突撃ィィィッ!!', 2200);
        }, 260);
        if (window.__sfx) { window.__sfx.taiko(1.0); setTimeout(() => window.__sfx.taiko(0.85), 320); window.__sfx.dashWhoosh(0.7); }
        // the ranks roar back as they surge forward
        [...leftTribe, ...rightTribe].filter(s => s.alive && !s.commander).forEach((s, i) => {
          setTimeout(() => {
            if (!s.alive) return;
            sayBubble(s, pick(['うおおおおッ！','おおおおーッ！','いくぞおおッ！']), 1500);
            if (window.__sfx && i % 3 === 0) window.__sfx.speak('uwooooo', s.cls.key);
          }, 500 + (i % 10) * 140);
        });
        later(() => chargeBurst(), 700);
        // The bugle sounds the charge — combat engages as the horn peaks
        if (window.__sfx && window.__sfx.chargeHorn) window.__sfx.chargeHorn();
        later(() => runCombat(), 1500);
      }
    ]);
  }

  // Transform builders into their war-classes (used mid-curtain)
  function armWarriorsForBattle() {
    [...leftTribe, ...rightTribe].forEach(s => {
      // wall-climbers, loungers and work crews break off — war calls
      s.looking = false; s.busy = false; s.lying = false;
      s.el.classList.remove('walking', 'climbing', 'lying');
      const cls = s.plannedClass || pick(SIDE_CLASSES(s.side));
      assignClass(s, cls);
      s.el.classList.remove('builder');
      s.el.classList.add('warrior');
      s.el.querySelector('.hpbar').style.display = 'block';
      makeWarriorLook(s);
    });
    assignBattlefieldRoles(leftTribe);
    assignBattlefieldRoles(rightTribe);
    setupCommanders();
    setupCaptains();
    applyVanguardBlessing();
    saga.classList.add('armageddon');
    saga.classList.add('atmo-war');
    startEmbers();
    if (window.__sfx) window.__sfx.startMusic('battle', { volume: 0.42 });
  }

  // Commanders raise the call, the ranks answer
  function doWarCries() {
    const cries = {
      samurai: [['いざ、尋常に！','iza jinjou ni'],['侍の誇り！','samurai no hokori'],['覚悟ッ！','kakugo']],
      wizard:  [['星よ、集え！','hoshi yo tsudoe'],['魔の力！','ma no chikara'],['滅せよ！','messeyo']],
      giant:   [['粉砕ッ！','funsai'],['潰してやる！','tsubushite yaru'],['ぬうんッ！','nuuun']],
      flying:  [['天よりッ！','ten yori'],['翔けるッ！','kakeru']],
      spear:   [['一番槍ッ！','ichiban yari'],['突けッ！','tsukeee']],
      gunner:  [['掃射ッ！','soushaaa'],['撃ちまくれ！','uchimakure']],
      healer:  [['みんな、守る！','minna mamoru'],['希望はある！','kibou wa aru']],
      armored: [['壁となれッ！','kabe to nare'],['鉄の意志！','tetsu no ishi']],
      sniper:  [['狙い撃つッ！','neraiutsu'],['一発必中！','ippatsu hicchuu']],
      rocketeer: [['ぶっ放せッ！','buppanase'],['火力全開！','karyoku zenkai']],
      medic:   [['死なせないッ！','shinasenai'],['衛生兵だ！','eiseihei da']],
      commando: [['切り込めッ！','kirikome'],['突入だ！','totsunyuu da']],
      frostmage: [['凍てつけッ！','itetsuke'],['氷結！','hyouketsu']],
      pyromancer: [['燃え尽きろッ！','moetsukiro'],['爆炎！','bakuen']],
      oni: [['鬼神の壁ッ！','kishin no kabe'],['潰すゥッ！','tsubusuu']]
    };
    if (leftCmd && leftCmd.alive) { sayBubble(leftCmd, '西よ、起てェ！', 2000); if (window.__sfx) window.__sfx.speak('nishi yo tate', leftCmd.cls.key); leftCmd.el.classList.add('act-wave'); setTimeout(() => leftCmd && leftCmd.el.classList.remove('act-wave'), 1600); }
    if (window.__sfx) window.__sfx.taiko(0.7);
    setTimeout(() => {
      if (rightCmd && rightCmd.alive) { sayBubble(rightCmd, '東よ、征けェ！', 2000); if (window.__sfx) window.__sfx.speak('higashi yo yuke', rightCmd.cls.key); rightCmd.el.classList.add('act-wave'); setTimeout(() => rightCmd && rightCmd.el.classList.remove('act-wave'), 1600); }
      if (window.__sfx) window.__sfx.taiko(0.7);
    }, 1000);
    const ranks = [...leftTribe, ...rightTribe].filter(s => s.alive && !s.commander);
    ranks.forEach((s, i) => setTimeout(() => {
      if (!s.alive) return;
      const opt = pick(cries[s.cls.key] || [['いくぞッ！','ikuzo']]);
      if (window.__sfx) window.__sfx.speak(opt[1], s.cls.key);
      sayBubble(s, opt[0], 1500);
      s.el.classList.add('act-wave'); setTimeout(() => s.el.classList.remove('act-wave'), 1200);
    }, 2000 + (i % 8) * 240));
    if (window.__sfx) { setTimeout(() => window.__sfx.taiko(0.6), 2200); setTimeout(() => window.__sfx.taiko(0.7), 2800); }
  }

  // Every warrior bursts forward with ghost trails and dust
  function chargeBurst() {
    [...leftTribe, ...rightTribe].filter(x => x.alive).forEach((s, i) => {
      setTimeout(() => {
        if (!s.alive) return;
        s.morale = 1.9; s.moraleUntil = performance.now() + 2600;
        dashTrail(s, 3, 240);
        if (window.__sfx && i % 3 === 0) window.__sfx.dashWhoosh(rand(0.8, 1.2));
        const rr = s.el.getBoundingClientRect();
        spawnDust(rr.left + rr.width / 2, rr.top + rr.height, {
          size: rand(16, 30), dx: (s.side === 'left' ? -1 : 1) * rand(14, 30), dy: rand(-10, -2)
        });
      }, (i % 8) * 90);
    });
  }

  // Spread warriors across the battlefield by giving them role-based home positions.
  // Frontline charges in. Skirmishers flank wide. Backline holds back.
  function assignBattlefieldRoles(tribe) {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const ground = H * 0.85;
    // SUPPORT TEAM — a few smileys are permanently stationed at the back edge
    // to provide long-range fire: west = modern artillery, east = elemental magic
    const supportPref = k => (['gunner','sniper','rocketeer','wizard','frostmage','pyromancer'].includes(k)) ? 0 : (['spear','healer','medic'].includes(k)) ? 1 : 2;
    const supportPicks = tribe
      .filter(s => s.alive && !s.commander && s.cls.key !== 'giant' && s.cls.key !== 'flying' && s.cls.key !== 'oni')
      .sort((a, b) => supportPref(a.cls.key) - supportPref(b.cls.key))
      .slice(0, 3);
    let supIdx = 0;
    tribe.forEach((s, i) => {
      let role;
      // Class-driven role assignment
      if (['samurai','giant','armored','commando','oni'].includes(s.cls.key)) role = 'frontline';
      else if (['wizard','healer','medic','sniper','frostmage','pyromancer'].includes(s.cls.key)) role = 'backline';
      else if (s.cls.key === 'flying') role = 'skirmisher';
      else role = 'mid'; // gunner, rocketeer, lancer press just behind the line
      if (supportPicks.includes(s)) role = 'support';
      s.role = role;

      // Spread VERTICALLY across the battlefield to avoid clumping
      // Each smiley gets a unique vertical lane
      const verticalSpread = (i / tribe.length) * (H * 0.5) + (Math.random() - 0.5) * 60;
      const laneY = ground - 50 - verticalSpread;

      // Horizontal home position based on role
      let homeX;
      if (s.side === 'left') {
        if (role === 'frontline')   homeX = W * (0.30 + (i % 4) * 0.04);
        else if (role === 'mid')    homeX = W * (0.18 + (i % 4) * 0.04);
        else if (role === 'skirmisher') homeX = W * (0.25 + (i % 4) * 0.04);
        else if (role === 'support') homeX = W * (0.030 + (supIdx++) * 0.028);
        else                         homeX = W * (0.06 + (i % 4) * 0.04); // backline
      } else {
        if (role === 'frontline')   homeX = W * (0.66 + (i % 4) * 0.04);
        else if (role === 'mid')    homeX = W * (0.78 + (i % 4) * 0.04);
        else if (role === 'skirmisher') homeX = W * (0.71 + (i % 4) * 0.04);
        else if (role === 'support') homeX = W * (0.915 + (supIdx++) * 0.028);
        else                         homeX = W * (0.86 + (i % 4) * 0.04);
      }
      s.homeX = homeX + (role === 'support' ? (Math.random() - 0.5) * 14 : (Math.random() - 0.5) * 64);
      s.homeY = laneY;
      s.x = s.homeX;
      s.baseY = s.homeY;
      s.y = s.homeY;
      s.el.style.transition = 'left 1.4s ease, top 1.4s ease';
      s.el.style.left = s.homeX + 'px';
      s.el.style.top = s.homeY + 'px';
      // Flying still hovers higher
      if (s.cls.key === 'flying') {
        s.flying = true;
        s.homeY = Math.max(H * 0.18, laneY - rand(60, 140));
        s.baseY = s.homeY;
        s.el.style.top = s.homeY + 'px';
      }
      setTimeout(() => { s.el.style.transition = ''; }, 1500);
      // Emplacement props — west supports dig in behind sandbags with a mortar
      // tube; east supports stand in a glowing rune circle
      if (role === 'support') addSupportPost(s);
    });
  }

  function addSupportPost(s) {
    const old = s.el.querySelector('.support-post'); if (old) old.remove();
    const d = document.createElement('div');
    d.className = 'support-post';
    if (s.side === 'left') {
      d.innerHTML = `<svg viewBox="0 0 80 34" style="width:100%;height:100%;overflow:visible">

        <path d="M52 30 L60 12 L66 14 L60 31 Z" fill="#5a6a72" stroke="#3a2218" stroke-width="2"/>
        <ellipse cx="63" cy="13" rx="4" ry="2.4" fill="#3a2218"/>
        <path d="M50 31 L72 31" stroke="#3a2218" stroke-width="2.4" stroke-linecap="round"/>
      </svg>`;
    } else {

        <ellipse cx="40" cy="15" rx="34" ry="11" fill="none" stroke="rgba(156,53,38,.8)" stroke-width="2.4" stroke-dasharray="7 5"/>
        <ellipse cx="40" cy="15" rx="22" ry="7" fill="rgba(156,53,38,.10)" stroke="rgba(156,53,38,.55)" stroke-width="1.6"/>
        <path d="M40 4 L43 10 L40 8 L37 10 Z M12 15 L18 14 M68 15 L62 14" fill="rgba(156,53,38,.8)" stroke="rgba(156,53,38,.8)" stroke-width="1.4"/>
      </svg>`;
