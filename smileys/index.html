  /* ── CAPTAINS — three per side, each with a mini-ult of knockback & stun.
     WEST: special moves (scatter shot · burst volley · continuous melee).
     EAST: the elements (flame · frost · earth). ── */
  let captains = [];
  let sauceUsed = { left: false, right: false };
  const CAPTAIN_DEFS = {
    left: [
      { prefer: ['gunner','sniper'],       kind: 'scatter', jp: '散弾乱舞', en: 'SCATTER SHOT', kiai: 'sandan ranbu', col: '#9fc3e0' },
      { prefer: ['rocketeer','sniper'],    kind: 'burst',   jp: '連装砲火', en: 'BURST VOLLEY', kiai: 'rensou houka', col: '#9fc3e0' },
      { prefer: ['commando','armored'],    kind: 'blitz',   jp: '疾風連撃', en: 'BLITZ RUSH',   kiai: 'shippuu rengeki', col: '#9fc3e0' }

  function setupCaptains() {
    captains = [];

        const pool = tribe.filter(s => s.alive && !s.commander && !s.captain);

        for (const k of def.prefer) { cap = pool.find(s => s.cls.key === k); if (cap) break; }
        if (!cap) cap = pool[0];
        cap.captain = true;
        cap.ult = def;
        cap.nextUltAt = 0;
        cap.maxHp = Math.round(cap.maxHp * 1.5); cap.hp = cap.maxHp; updateHp(cap);
        const badge = document.createElement('div');
        badge.className = 'captain-badge';
        badge.innerHTML = `<svg viewBox="0 0 20 20" style="width:100%;height:100%;overflow:visible">

  function foesOf(c) { return (c.side === 'left' ? rightTribe : leftTribe).filter(e => e.alive); }
  function captainAnnounce(c) {
    sayBubble(c, c.ult.jp + 'ッ!!', 1800);
    if (window.__sfx) { window.__sfx.speak(c.ult.kiai, c.cls.key); window.__sfx.shing(); }

    const cc = contactPoint(c);

      c.el.style.transition = 'transform .14s ease-out';

        if (!c.alive || c.striking) return;
        c.el.style.transform = '';

  function fireCaptainUlt(c) {
    const foes = foesOf(c);

    const near = d => foes.filter(e => { const p = contactPoint(e); return Math.hypot(p.x - cc.x, p.y - cc.y) < d; });
    switch (c.ult.kind) {
      case 'scatter': { const t = near(430); if (!t.length) return false; ultScatter(c, t); return true; }
      case 'burst':   { const t = near(520); if (!t.length) return false; ultBurst(c, t); return true; }
      case 'blitz':   { const t = near(460); if (!t.length) return false; ultBlitz(c, t); return true; }
      case 'flame':   { const t = near(215); if (!t.length) return false; ultFlameNova(c, t); return true; }
      case 'frost':   { const t = frostBandTargets(c); if (!t.length) return false; ultFrostWave(c, t); return true; }
      case 'quake':   { const t = near(290); if (!t.length) return false; ultQuake(c, t); return true; }

  // WEST — SCATTER SHOT: a shotgun fan; everything in the cone is blasted back
  function ultScatter(c, targets) {
    captainAnnounce(c);

      if (!c.alive || state !== 'ch3') return;

  // WEST — BURST VOLLEY: four rapid shells walk onto the target, the last one huge
  function ultBurst(c, targets) {

      setTimeout(() => {
        if (!c.alive || state !== 'ch3') return;

        if (window.__sfx) { window.__sfx.dashWhoosh(0.7); window.__sfx.kaboom(0.7); }

        for (let i = 0; i < 8; i++) {

          const p = contactPoint(e);

            if (!e.alive) return;

            slamBack(e, e.x >= aim.x ? 1 : -1, rand(170, 240), 1400);
          }, i * 50);
        });

  }

  // WEST — BLITZ RUSH: continuous melee — carves through the line, ghost-fast
  function ultBlitz(c, targets) {
    captainAnnounce(c);
    c.striking = true;
    const chain = targets.slice().sort((a, b) => Math.abs(a.x - c.x) - Math.abs(b.x - c.x)).slice(0, 4);
    const startX = c.x, startY = c.baseY;
    let step = 0;
    const recover = () => {
      if (!c.alive) { c.striking = false; return; }
      c.el.style.transition = 'left .5s cubic-bezier(.25,1.4,.45,1), top .5s ease, transform .3s ease';
      c.el.style.transform = '';
      c.x = startX; c.baseY = startY;
      c.el.style.left = startX + 'px';
      c.el.style.top = startY + 'px';
      setTimeout(() => { if (c.alive) c.el.style.transition = ''; c.striking = false; }, 520);
    };
    const hop = () => {
      if (!c.alive || state !== 'ch3') { c.striking = false; return; }
      const e = chain[step];
      if (!e || !e.alive) { step++; if (step < chain.length) return hop(); return recover(); }
      const dirX = e.x >= c.x ? 1 : -1;
      dashTrail(c, 3, 150);
      if (window.__sfx) window.__sfx.dashWhoosh(1.2);
      c.el.style.transition = 'left .15s cubic-bezier(.3,0,.4,1), top .15s ease, transform .15s ease';
      c.x = e.x - dirX * 34; c.baseY = e.baseY != null ? e.baseY : c.baseY;
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.baseY + 'px';
      c.el.style.transform = `rotate(${dirX * 20}deg) scale(1.18,.86)`;
      setTimeout(() => {
        if (!c.alive || state !== 'ch3') { c.striking = false; return; }
        if (e.alive) {
          const p = contactPoint(e);
          spawnSlashSmear(p.x, p.y, dirX > 0 ? rand(-30, 30) : rand(150, 210));
          spawnImpactStar(p.x, p.y, 56);
          if (window.__sfx) window.__sfx.hitSpark();
          hitstop(55);
          const last = step === chain.length - 1;
          applyDamage(c, e, dirX, last ? 16 : 10, { noMp: true, noReact: true });
          slamBack(e, dirX, last ? rand(190, 260) : rand(70, 110), last ? 1500 : 500);
        }
        step++;
        if (step < chain.length) setTimeout(hop, 90);
        else recover();
      }, 160);
    };
    later(() => hop(), 420);
  }

  /* ── TRUMP CARDS — one desperate play per side, per battle ── */
  function teamHpPct(tribe) {
    let cur = 0, max = 0;
    tribe.forEach(s => { max += s.maxHp || 0; cur += s.alive ? Math.max(0, s.hp) : 0; });
    return max ? cur / max : 0;

  function checkSpecialSauce() {

    if (!sauceUsed.left && teamHpPct(leftTribe) < 0.45 && leftTribe.some(s => s.alive)) {

  // EAST TRUMP CARD — the ANCESTRAL SPIRIT DRAGON answers the drums of war

    const segs = [];
    const N = 9;
    for (let i = 0; i < N; i++) {

        d.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%;overflow:visible">
          <circle cx="50" cy="50" r="40" fill="rgba(196,87,63,.16)" stroke="#9c3526" stroke-width="4"/>
          <path d="M22 30 L8 8 L34 20 Z M78 30 L92 8 L66 20 Z" fill="#9c3526" stroke="#9c3526" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="36" cy="44" r="4" fill="#9c3526"/><circle cx="64" cy="44" r="4" fill="#9c3526"/>
          <path d="M30 64 Q50 80 70 64" fill="none" stroke="#9c3526" stroke-width="4" stroke-linecap="round"/>
          <path d="M42 22 Q50 6 58 22" fill="none" stroke="#9c3526" stroke-width="3"/>
        </svg>`;
      } else {
        d.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%;overflow:visible">
          <circle cx="50" cy="50" r="38" fill="rgba(196,87,63,${(0.14 - i * 0.01).toFixed(2)})" stroke="#9c3526" stroke-width="3.4"/>
          <path d="M35 20 Q50 4 65 20" fill="none" stroke="#9c3526" stroke-width="2.6"/>
        </svg>`;
      }
      fxL.appendChild(d);
      segs.push(d);
    }
    const t0 = performance.now();
    const durMs = 5200;
    const hitSet = new Set();
    const atk = (rightCmd && rightCmd.alive) ? rightCmd : { dmg: 16, side: 'right', cls: { key: 'wizard' } };
    const stepFn = (nowT) => {
      if (state !== 'ch3') { segs.forEach(s => s.remove()); return; }
      const p = (nowT - t0) / durMs;
      if (p >= 1) { segs.forEach((s, i) => setTimeout(() => s.remove(), i * 40)); return; }
      const headX = W + 80 - p * (W + 260);
      segs.forEach((d, i) => {
        const x = headX + i * 34;
        const y = H * 0.55 + Math.sin((x / W) * Math.PI * 3.2) * H * 0.11;
        d.style.left = (x - parseFloat(d.style.width) / 2) + 'px';
        d.style.top = (y - parseFloat(d.style.height) / 2) + 'px';
        if (i === 0 && Math.random() < 0.5) spawnDust(x - 20, y + rand(-14, 14), { smoke: Math.random() < 0.4, size: rand(10, 20), dx: rand(6, 18), dy: rand(-12, 4) });
      });
      const hy = H * 0.55 + Math.sin((headX / W) * Math.PI * 3.2) * H * 0.11;
      leftTribe.filter(e => e.alive && !hitSet.has(e)).forEach(e => {
        const pC = contactPoint(e);
        if (Math.abs(pC.x - headX) < 60 && Math.abs(pC.y - hy) < 110) {
          hitSet.add(e);
          spawnImpactStar(pC.x, pC.y, 66);
          if (window.__sfx) window.__sfx.hitSpark();
          applyBurn(e, 3000, 'right');
          applyDamage(atk, e, -1, 16, { noMp: true, noReact: true });
          slamBack(e, -1, rand(170, 250), Math.random() < 0.4 ? 1300 : 0);
        }
      });
      requestAnimationFrame(stepFn);
    };
    requestAnimationFrame(stepFn);
  }

  // Getting hit HURTS: white flash + knockback arc + squash
  function hitReaction(t, dirX, kbMult = 1) {
    const el = t.el;
    el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit');
    if (t.striking) return; // don't fight an in-flight strike tween
    // EAST COMMANDER — refuses to be pushed: he BLINKS out of the shove
    // (but the final duel is fought where he stands)
    if (t.commander && t.cls && t.cls.key === 'wizard' && !esc.duel) {
      const nowB = performance.now();
      if (nowB > (t._nextBlinkAt || 0)) { t._nextBlinkAt = nowB + 4200; blinkTeleport(t); }
      return;
    }
    // IRON VANGUARD — braced: they flash, but do not yield a single step
    if (t.kbImmuneUntil && performance.now() < t.kbImmuneUntil) {
      el.style.transition = 'transform .12s ease';
      el.style.transform = 'scale(1.06,.94)';
      setTimeout(() => {
        if (!t.alive || t.striking) return;
        el.style.transform = '';
        setTimeout(() => { if (t.alive && !t.striking) el.style.transition = ''; }, 140);
      }, 130);
      return;
    }
    const W = window.innerWidth;
    // FRONTLINE TIDE — the deeper into enemy ground a smiley stands, the
    // harder every blow hurls it back home: the battle surges back and forth
    const homeward = t.side === 'left' ? dirX < 0 : dirX > 0;
    const tide = homeward ? 1 + depthInto(t) * 1.7 : 1;
    let kb = rand(26, 44) * kbMult * tide;
    if (t.cls && t.cls.key === 'oni') kb *= 0.4; // the oni does not yield
    if (homeward && depthInto(t) > 0.55 && Math.random() < 0.35) {
      const cc2 = contactPoint(t);
      dmgPop(cc2.x, cc2.y - 34, 'REPELLED!', false, true);
    }
    t.x = Math.max(W * 0.03, Math.min(W * 0.97 - (t.size || 50), t.x + dirX * kb));
    el.style.transition = 'left .24s cubic-bezier(.2,.9,.35,1), transform .24s ease';
    el.style.left = t.x + 'px';
    el.style.transform = `rotate(${dirX * 13}deg) scale(.9,1.08)`;
    setTimeout(() => {
      if (!t.alive) return;
      el.style.transition = 'transform .18s ease';
      el.style.transform = '';
      setTimeout(() => { if (t.alive && !t.striking) el.style.transition = ''; }, 190);
    }, 250);
  }

  // The KO: launched spinning through the air with a whistle,
  // crashes down in dust — THEN the ghost rises
  function killBlow(s, target, dirX) {
    target.alive = false;
    killCount++;
    if (s && s.el && s.alive) s.kills = (s.kills || 0) + 1; // the war remembers
    // A COMMANDER FALLS — the whole field feels it
    if (target.commander) {
      const west = target.side === 'left';
      warBanner(west ? '西の大将、討死' : '東の大将、討死',
        (west ? 'THE WEST' : 'THE EAST') + ' COMMANDER HAS FALLEN', west ? '#9fc3e0' : '#ffb066');
      if (window.__sfx) window.__sfx.taiko(1.0);
      (west ? leftTribe : rightTribe).filter(a => a.alive && a !== target).slice(0, 4).forEach((a, i) =>
        setTimeout(() => { if (a.alive) sayBubble(a, pick(['隊長ーッ!!','そんな…','嘘だろ…','うわああッ']), 1600); }, 350 + i * 200));
    }
    const el = target.el;
    const c = contactPoint(target);
    spawnImpactStar(c.x, c.y, 96);
    hitstop(120);
    shakeBurst();
    if (window.__sfx) {
      window.__sfx.kaboom(0.8);
      window.__sfx.fallWhistle();
      if (Math.random() < 0.35) {
        const lastWords = ['Aaah!', 'No!', 'I have fallen!', 'Tell my mother...', 'Ugh!', 'Farewell!'];
        window.__sfx.speakRandom(pick(lastWords));
      }
    }
    dashTrail(target, 3, 260);
    const flyX = dirX * rand(120, 220);
    const W = window.innerWidth;
    const endX = Math.max(-60, Math.min(W + 10, target.x + flyX));
    el.style.transition = 'left .5s cubic-bezier(.25,.7,.45,1), top .5s cubic-bezier(.35,-.4,.7,1), transform .5s ease-in';
    el.style.left = endX + 'px';
    el.style.top = (target.baseY - rand(30, 80)) + 'px';
    el.style.transform = `rotate(${dirX * rand(380, 560)}deg) scale(.92)`;
    target.x = endX;
    later(() => {
      el.style.transition = '';
      el.style.transform = '';
      const rr = el.getBoundingClientRect();
      spawnDust(rr.left + rr.width / 2, rr.top + rr.height, { dark: true, size: rand(24, 44) });
      if (window.__sfx) { window.__sfx.thunk(); window.__sfx.ghostOut(); }
      el.classList.add('dead');
      later(() => { el.style.display = 'none'; }, 4000);
      maybeCutscene();
    }, 520);
  }

  // Pick a dramatic attacker + defender from opposing sides for a cutscene
  // Finisher always returns a duel: victor side pummels the other side
  // (using a fallen foe if none are still standing).
  function pickDuelFinisher() {
    const aliveL = leftTribe.filter(s => s.alive);
    const aliveR = rightTribe.filter(s => s.alive);
    const coolOrder = ['giant','oni','samurai','sniper','gunner','rocketeer','wizard','commando','pyromancer','frostmage','spear','flying','armored','medic','healer'];
    const byCool = arr => arr.slice().sort((a,b) => coolOrder.indexOf(a.cls.key) - coolOrder.indexOf(b.cls.key));
    let atkSide, defSide;
    if (aliveL.length && aliveR.length) { atkSide = Math.random() < 0.5 ? aliveL : aliveR; defSide = atkSide === aliveL ? rightTribe : leftTribe; }
    else if (aliveL.length) { atkSide = aliveL; defSide = rightTribe; }
    else if (aliveR.length) { atkSide = aliveR; defSide = leftTribe; }
    else { atkSide = leftTribe; defSide = rightTribe; }
    const attacker = byCool(atkSide)[0] || atkSide[0];
    const defender = pick(defSide) || defSide[0];
    if (!attacker || !defender) return null;
    return {
      attacker: { faceKey: attacker.faceKey, classKey: attacker.cls.key },
      defender: { faceKey: defender.faceKey, classKey: defender.cls.key }
    };
  }

  function pickDuel() {
    const aliveL = leftTribe.filter(s => s.alive);
    const aliveR = rightTribe.filter(s => s.alive);
    if (!aliveL.length || !aliveR.length) return null;
    // Prefer cool weapon classes as the attacker
    const coolOrder = ['giant','oni','samurai','sniper','gunner','rocketeer','wizard','commando','pyromancer','frostmage','spear','flying','armored','medic','healer'];
    const byCool = arr => arr.slice().sort((a,b) => coolOrder.indexOf(a.cls.key) - coolOrder.indexOf(b.cls.key));
    // Randomly choose which side attacks
    const leftAttacks = Math.random() < 0.5;
    const atkPool = leftAttacks ? byCool(aliveL) : byCool(aliveR);
    const defPool = leftAttacks ? aliveR : aliveL;
    const attacker = atkPool[0];
    const defender = pick(defPool);
    return {
      attacker: { faceKey: attacker.faceKey, classKey: attacker.cls.key },
      defender: { faceKey: defender.faceKey, classKey: defender.cls.key }
    };
  }

  function playCutscene(type) {
    if (!window.__cutscene) return;
    const duel = pickDuel();
    if (!duel) return;
    combatPaused = true;
    window.__cutscene.play(type, {
      attacker: duel.attacker,
      defender: duel.defender,
      onDone: () => { combatPaused = false; }
    });
  }

  function maybeCutscene() {
    if (state !== 'ch3') return;
    if (window.__cutscene && window.__cutscene.active) return;
    // First cut-in: "The Charge" after a few have fallen
    if (!cutscenesPlayed.charge && killCount >= 3) {
      cutscenesPlayed.charge = true;
      playCutscene('charge');
      return;
    }
    // Second cut-in: "The Clash" around the midpoint
    if (!cutscenesPlayed.clash && killCount >= 8) {
      cutscenesPlayed.clash = true;
      playCutscene('clash');
      return;
    }
  }

  function updateHp(s) {
    const bar = s.el.querySelector('.hpbar .hp');
    if (bar) bar.style.width = Math.max(0, s.hp / s.maxHp * 100) + '%';
  }

  function healSpark(from, to) {
    const fromR = from.el.getBoundingClientRect();
    const toR = to.el.getBoundingClientRect();
    const fx = fromR.left + fromR.width/2;
    const fy = fromR.top + fromR.height/2;
    const tx = toR.left + toR.width/2;
    const ty = toR.top + toR.height/2;
    const p = document.createElement('div');
    p.className = 'projectile';
    p.style.left = (fx - 11) + 'px';
    p.style.top  = (fy - 11) + 'px';
    p.style.setProperty('--tx', (tx - fx) + 'px');
    p.style.setProperty('--ty', (ty - fy) + 'px');
    p.innerHTML = `<svg viewBox="0 0 24 24" style="width:100%;height:100%;overflow:visible"><use href="#w-heart"/></svg>`;
    fxL.appendChild(p);
    requestAnimationFrame(() => p.classList.add('go'));
    setTimeout(() => p.remove(), 800);
  }

  /* ==================== CHAPTER 4 — GOD ==================== */
  function startChapter4() {
    if (state !== 'ch3') return;
    state = 'ch4';
    clearTimers();
    if (window.__cancelCombat) window.__cancelCombat();
    // Flush any battle voices still queued (only relevant when skipping ahead)
    if (window.__sfx && window.__sfx.stopSpeech) window.__sfx.stopSpeech();
    saga.classList.remove('armageddon');
    sagaBanner.style.display = 'none';
    if (teamHud) teamHud.style.display = 'none';

    // Beat runner — each beat waits for its narration to FINISH before the
    // next fires, so the closing scenes never outrun the storytelling.
    function godBeats(steps, idx = 0) {
      if (state !== 'ch4' || idx >= steps.length) return;
      steps[idx](() => godBeats(steps, idx + 1));
    }

    // The heavens open while the curtain line is still being spoken —
    // "a great light fell from the sky" lands as the light actually falls.
    later(() => {
      if (state !== 'ch4') return;
      saga.classList.remove('atmo-war');
      saga.classList.add('atmo-heaven');
      stopEmbers();
      saga.classList.add('heaven-on');
      // Silence the battle/climax bed so the divine choir lands clean.
      if (window.__sfx) { window.__sfx.stopMusic(); window.__sfx.divineChoir(); }
    }, 5500);

    godBeats([
      // Dramatic curtain transition — sets the closing tone
      next => curtainTransition({
        num: 'CHAPTER FOUR',
        name: 'The God of Smileys',
        sub: 'in the silence after the war · a great love descended',
        narration: 'And when the smileys had nearly destroyed each other, a great light fell from the sky. The God of Smileys had come.',
        profile: 'narrator',
        holdMs: 3800,
        onNarrated: next
      }),

      // Let the God finish the slow descent before speaking
      next => later(next, 1400),

      // The commandment — the words appear exactly as they are spoken
      next => {
        showMsg('“Love one another.”', 'said the God of Smileys');
        narrate('Love one another. I have asked little of you. I ask only this.', 'god', null, next);
      },
      next => later(next, 900),

      // HOLY LIGHT — a full white-out; at its peak the world is reborn in
      // colour, and the narration begins only as the light clears to reveal it.
      next => {
        if (window.__sfx) { window.__sfx.divineChoir(); window.__sfx.sparkleShimmer(); }
        flash.classList.add('holy','hold');
        flash.style.transition = 'opacity 0.45s ease';
        flash.style.opacity = '1';
        // at the peak of the white-out: revive everyone + flip the world to vibrant
        later(() => {
          saga.classList.add('renewed');
          [...leftTribe, ...rightTribe].forEach(s => {
            if (!s.alive) {
              s.alive = true;
              s.hp = s.maxHp;
              s.el.style.display = '';
              s.el.classList.remove('dead');
              s.el.classList.add('reborn');
              updateHp(s);
            }
            makePeaceful(s);
            makeVibrant(s);
          });
          // Repaint every house in a warm, sunlit hue (--ink reaches the <use>
          // line art) plus a soft colour glow so the building reads as vibrant.
          const HOUSE_INKS = ['#c0612e','#3f7d5a','#b88a2a','#9c6b3a','#5a7a9c','#a8472e'];
          buildL.querySelectorAll('.struct').forEach((st, i) => {
            const c = HOUSE_INKS[i % HOUSE_INKS.length];
            st.style.setProperty('--ink', c);
            st.style.filter = 'saturate(1.45) brightness(1.05) drop-shadow(0 1px 6px ' + c + '66)';
          });
        }, 620);
        // fade the white away to reveal the colourful, renewed world
        later(() => {
          flash.style.transition = 'opacity 1.9s ease';
          flash.style.opacity = '0';
        }, 980);
        later(() => {
          flash.classList.remove('go','holy','hold');
          flash.style.transition = '';
          flash.style.opacity = '';
        }, 3100);
        // hearts begin to drift up as the light clears
        later(() => {
          rep(() => {
            spawnHeart();
            if (window.__sfx && Math.random() < 0.5) window.__sfx.heartPop();
          }, 220);
        }, 1400);
        later(() => narrate('A fallen smiley opens its eyes — alive again, and the world reborn in colour.', 'narrator', null, next), 2000);
      },

      // The reborn greet each other — hearts over their heads as the line plays
      next => {
        [...leftTribe, ...rightTribe].slice(0, 6).forEach((s, i) => {
          later(() => sayBubble(s, '♡', 2200), 300 + i * 260);
        });
        narrate('“Friend... are you my friend?”', 'villager', 'A reborn Smiley', next);
      },
      next => narrate('No more fighting, they whispered. No more.', 'narrator', null, next),
      next => later(next, 600),

      // The embrace — the tribes walk into one another as the narrator says so
      next => {
        hideMsg();
        mergeTribes();
        narrate('And the smileys, who had nearly destroyed each other, embraced.', 'narrator', null, next);
      },
      next => later(next, 1000),

      // Finale — happy music, and only now does the choice appear
      next => {
        showMsg('A new world begins.', 'one community, woven together');
        if (window.__sfx) {
          window.__sfx.fanfare();
          window.__sfx.startMusic('happy', { volume: 0.4 });
        }
        later(() => choiceRow.classList.add('show'), 1800);
        next();
      }
    ]);
  }

  function spawnHeart() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const h = document.createElement('div');
    h.className = 'heart';
    h.style.left = rand(W * 0.1, W * 0.9) + 'px';
    h.style.top  = rand(H * 0.5, H * 0.85) + 'px';
    h.style.width  = rand(14, 30) + 'px';
    h.style.height = h.style.width;
    h.innerHTML = `<svg viewBox="0 0 24 24" style="width:100%;height:100%;overflow:visible"><use href="#heart-small"/></svg>`;
    fxL.appendChild(h);
    requestAnimationFrame(() => h.classList.add('go'));
    setTimeout(() => h.remove(), 3200);
  }

  function mergeTribes() {
    const W = window.innerWidth;
    // The embrace — a warm swell as the two tribes fold into one another.
    if (window.__sfx) window.__sfx.embrace();
    [...leftTribe, ...rightTribe].forEach((s, i) => {
      // Mix them all into the central plaza
      const center = W * 0.5;
      const tx = center + (i - (leftTribe.length + rightTribe.length) / 2) * 70 + rand(-30, 30);
      s.el.style.transition = 'left 3.5s cubic-bezier(.4,.05,.2,1), top 3.5s ease';
      s.el.style.left = tx + 'px';
      // Hide HP / weapon icons
      const hp = s.el.querySelector('.hpbar'); if (hp) hp.style.display = 'none';
      if (s.weaponIcon) s.weaponIcon.style.opacity = '0.2';
      s.x = tx;
      // wave
      s.el.classList.remove('warrior','flip-x','marching');
      s.el.style.transform = '';
      s.el.classList.add('act-wave');
    });

    // Move buildings drift slightly toward middle (symbolic merge)
    [...buildL.querySelectorAll('.struct')].forEach((b, i) => {
      const x = parseFloat(b.style.left);
      const newX = x + (window.innerWidth/2 - x) * 0.12;
      b.style.transition = 'left 3.5s ease';
      b.style.left = newX + 'px';
    });

    // The war's fiercest warrior is crowned in flowers — and is the first
    // to forswear it all
    const fiercest = [...leftTribe, ...rightTribe]
      .filter(s => (s.kills || 0) > 0)
      .sort((p, q) => (q.kills || 0) - (p.kills || 0))[0];
    if (fiercest) {
      const crown = document.createElement('div');
      crown.className = 'flower-crown';
      crown.innerHTML = `<svg viewBox="0 0 60 24" style="width:100%;height:100%;overflow:visible">
        <g stroke="#3a2218" stroke-width="1.1">
          <circle cx="12" cy="14" r="3.2" fill="#e8879c"/><circle cx="8.5" cy="11" r="2.2" fill="#f5d76e"/><circle cx="15.5" cy="11" r="2.2" fill="#f5d76e"/>
          <circle cx="30" cy="9" r="3.6" fill="#7fb5e0"/><circle cx="26" cy="6" r="2.3" fill="#f5d76e"/><circle cx="34" cy="6" r="2.3" fill="#f5d76e"/>
          <circle cx="48" cy="14" r="3.2" fill="#a8d18f"/><circle cx="44.5" cy="11" r="2.2" fill="#e8879c"/><circle cx="51.5" cy="11" r="2.2" fill="#e8879c"/>
        </g>
      </svg>`;
      fiercest.el.appendChild(crown);
      later(() => { if (state === 'ch4' || state === 'done') sayBubble(fiercest, 'never again.', 3200); }, 3200);
    }
  }

  /* ==================== CHOICE BUTTONS ==================== */
  // Guarded: these buttons must be inert while their row is hidden
  document.getElementById('btn-rezero').addEventListener('click', () => {
    if (choiceRow.classList.contains('show')) reZero();
  });
  document.getElementById('btn-happy').addEventListener('click', () => {
    if (choiceRow.classList.contains('show')) happilyEverAfter();
  });
  document.getElementById('btn-skip').addEventListener('click', () => {
    if (state === 'playground') startChapter2();
    else if (state === 'ch2') startChapter3();
    else if (state === 'ch3') startChapter4();
  });
  document.getElementById('btn-back').addEventListener('click', reZero);

  // "Begin the saga" — skip the playground and jump straight in
  const beginBtn = document.getElementById('btn-begin-saga');
  if (beginBtn) beginBtn.addEventListener('click', () => {
    if (window.__sfx) window.__sfx.unlock();
    if (state === 'playground') startChapter2();
  });

  function reZero() {
    clearTimers();
    if (window.__cancelCombat) window.__cancelCombat();
    state = 'playground';
    saga.classList.remove('on','heaven-on','armageddon','tribe-tinted','atmo-war','atmo-heaven','crack-shake','renewed','hitstop');
    hitstopUntil = 0;
    stopEmbers();
    stopBattleDust();
    leftCmd = null; rightCmd = null;
    captains = [];
    sauceUsed = { left: false, right: false };
    document.body.classList.remove('saga-active');
    if (teamHud) teamHud.style.display = 'none';
    mp.left = 0; mp.right = 0; specialActive = false;
    fxL.innerHTML = '';
    buildL.innerHTML = '';
    leftTribe = []; rightTribe = [];
    choiceRow.classList.remove('show');
    hideMsg();
    sagaBanner.style.display = 'none';
    clock.style.display = 'none';
    wallG.style.opacity = '1';
    wallG.style.height = '';
    build = null;
    if (window.__sfx) { window.__sfx.stopPeaceHum(); window.__sfx.stopMusic(); window.__sfx.stopSpeech(); window.__sfx.pop(); }
    if (window.__applySmileyMute) window.__applySmileyMute();
    if (window.__cutscene) window.__cutscene.stop();
    combatPaused = false;
    if (window.__pg) window.__pg.clearYard && window.__pg.clearYard();
    if (window.__pg) window.__pg.respawn && window.__pg.respawn();
    // Bring back the light, fun playground music
    pgMusicStarted = false;
    later(() => startPlaygroundMusic(), 400);
  }

  // ── Light, fun playground music (gesture-gated for autoplay policy) ──
  let pgMusicStarted = false;
  function startPlaygroundMusic() {
    if (pgMusicStarted || state !== 'playground') return;
    pgMusicStarted = true;
    if (window.__sfx) window.__sfx.startMusic('playground', { volume: 0.3 });
  }
  ['pointerdown','keydown','touchstart'].forEach(ev =>
    window.addEventListener(ev, startPlaygroundMusic, { passive: true })
  );

  function happilyEverAfter() {
    state = 'done';
    choiceRow.classList.remove('show');
    showMsg('And so they lived,<br>happily ever after. ♡');
    if (window.__sfx) window.__sfx.fanfare();
    // Keep hearts gently flowing
    rep(() => {
      spawnHeart();
      if (window.__sfx && Math.random() < 0.3) window.__sfx.heartPop();
    }, 380);
  }

  // Mute toggles
  function refreshMuteUi() {
    const m = window.__sfx && window.__sfx.muted;
    const lbl = m ? '🔇 Muted' : '🔊 Sound';
    const b1 = document.getElementById('btn-mute');
    const b2 = document.getElementById('btn-mute-global');
    if (b1) b1.textContent = lbl;
    if (b2) b2.textContent = lbl;
  }
  function toggleMute() {
    if (!window.__sfx) return;
    window.__sfx.unlock();
    window.__sfx.setMuted(!window.__sfx.muted);
    refreshMuteUi();
  }
  const bm1 = document.getElementById('btn-mute'); if (bm1) bm1.addEventListener('click', toggleMute);
  const bm2 = document.getElementById('btn-mute-global'); if (bm2) bm2.addEventListener('click', toggleMute);

  // Smiley-voice toggle (user preference). Saga phases force them off anyway.
  let userSmileyMuted = false;
  function applySmileyMute() {
    if (window.__sfx) window.__sfx.setSmileyVoiceMuted(userSmileyMuted || state !== 'playground');
    const lbl = userSmileyMuted ? '🔇 Smiley voices' : '😀 Smiley voices';
    ['btn-smiley','btn-smiley-global'].forEach(id => {
      const b = document.getElementById(id);
      if (b) { b.textContent = lbl; b.style.opacity = userSmileyMuted ? '0.6' : '1'; }
    });
  }
  function toggleSmiley() {
    if (window.__sfx) window.__sfx.unlock();
    userSmileyMuted = !userSmileyMuted;
    applySmileyMute();
  }
  ['btn-smiley','btn-smiley-global'].forEach(id => {
    const b = document.getElementById(id); if (b) b.addEventListener('click', toggleSmiley);
  });
  window.__applySmileyMute = applySmileyMute; // let saga phase changes re-apply

  // Subtitle toggle (captions on/off). Audio narration is unaffected — this is
  // purely whether the caption bar is shown.
  function applySubsUi() {
    const lbl = subtitlesEnabled ? '💬 Subtitles' : '💬 Subtitles off';
    ['btn-subs','btn-subs-global'].forEach(id => {
      const b = document.getElementById(id);
      if (b) { b.textContent = lbl; b.style.opacity = subtitlesEnabled ? '1' : '0.55'; }
    });
  }
  function toggleSubs() {
    subtitlesEnabled = !subtitlesEnabled;
    try { localStorage.setItem('wos-subtitles', subtitlesEnabled ? 'on' : 'off'); } catch (e) {}
    if (!subtitlesEnabled) subtitleBar.classList.remove('show');
    applySubsUi();
  }
  ['btn-subs','btn-subs-global'].forEach(id => {
    const b = document.getElementById(id); if (b) b.addEventListener('click', toggleSubs);
  });
  applySubsUi();

  /* ==================== TRIGGER FROM PLAYGROUND ==================== */
  // Watch yard fullness — when 2 yards each have at least 8 residents → start saga
  rep(() => {
    if (state !== 'playground') return;
    if (!window.__pg) return;
    const yards = window.__pg.yards || [];
    // Use DOM count fallback
    const counts = [...document.querySelectorAll('.playground-zone .count')]
      .map(el => parseInt((el.textContent || '0/10').split('/')[0], 10));
    const fullCount = counts.filter(c => c >= 8).length;
    if (fullCount >= 2) {
      startChapter2();
    }
  }, 800);

  // Expose helper for the playground engine to share residents
  if (window.__pg) {
    const orig = window.__pg;
    orig.allResidents = orig.allResidents || (() => {
      return [...document.querySelectorAll('.smiley.playground')];
    });
  }

  // Also: let user manually trigger via key 'S' for testing
  window.addEventListener('keydown', (e) => {
    if (e.key === 's' || e.key === 'S') {
      if (state === 'playground') startChapter2();
    }
    // Preview cutscenes any time with 1 / 2 / 3
    if (window.__cutscene && !window.__cutscene.active) {
      const demoDuel = pickDuel() || {
        attacker: { faceKey: 'angry', classKey: 'samurai' },
        defender: { faceKey: 'surprised', classKey: 'flying' }
      };
      if (e.key === '1') window.__cutscene.play('charge',   demoDuel);
      if (e.key === '2') window.__cutscene.play('clash',    demoDuel);
      if (e.key === '3') window.__cutscene.play('finisher', demoDuel);
    }
  });

})();
</script>

</body>
