<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>World of Smileys — Clash of Smileys</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f1ead6;
    --paper-2: #ebe2c3;
    --ink: #5a1810;
    --ink-2: #7a2418;
    --grid: rgba(90, 24, 16, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 30% 20%, var(--paper) 0%, var(--paper-2) 100%);
    background-image:
      radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
    background-size: 18px 18px;
    background-color: var(--paper);
    font-family: "Caveat", "Marker Felt", "Comic Sans MS", cursive;
    position: relative;
    color: var(--ink);
  }

  .stage { position: fixed; inset: 0; overflow: hidden; }

  .smiley {
    position: absolute;
    width: 110px; height: 110px;
    transform-origin: center center;
    will-change: transform;
    pointer-events: auto;
    cursor: grab;
    touch-action: none;
  }
  .smiley.dragging { cursor: grabbing; z-index: 50; }
  .smiley.playground { cursor: grab; z-index: 5; }

  .smiley svg {
    width: 100%; height: 100%;
    display: block;
    overflow: visible;
  }

  /* Pen strokes */
  .ink { fill: none; stroke: var(--ink); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  .ink-thin { stroke-width: 1.8; }
  .ink-fill { fill: var(--ink); stroke: none; }

  @keyframes rollR { 0% { transform: translate(-160px, 0) rotate(0deg); } 100% { transform: translate(calc(100vw + 160px), 0) rotate(720deg); } }
  @keyframes rollL { 0% { transform: translate(calc(100vw + 160px), 0) rotate(0deg); } 100% { transform: translate(-160px, 0) rotate(-720deg); } }
  @keyframes tumble {
    0%   { transform: translate(-150px, 10vh) rotate(0deg) scale(1); }
    25%  { transform: translate(28vw, -8vh)   rotate(220deg) scale(0.95); }
    50%  { transform: translate(58vw, 18vh)   rotate(540deg) scale(1.05); }
    75%  { transform: translate(80vw, -4vh)   rotate(820deg) scale(0.9); }
    100% { transform: translate(calc(100vw + 150px), 12vh) rotate(1080deg) scale(1); }
  }
  @keyframes bounce {
    0%   { transform: translate(-140px, 0) rotate(0deg); }
    20%  { transform: translate(20vw, -30vh) rotate(140deg); }
    40%  { transform: translate(40vw, 0)     rotate(280deg); }
    60%  { transform: translate(60vw, -22vh) rotate(420deg); }
    80%  { transform: translate(80vw, 0)     rotate(560deg); }
    100% { transform: translate(calc(100vw + 140px), -8vh) rotate(720deg); }
  }
  @keyframes drift {
    0%   { transform: translate(-130px, 0) rotate(-10deg); }
    50%  { transform: translate(50vw, -6vh) rotate(180deg); }
    100% { transform: translate(calc(100vw + 130px), 4vh) rotate(370deg); }
  }

  @keyframes faceWobble {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }
  .face-wrap {
    width: 100%; height: 100%;
    animation: faceWobble 1.6s ease-in-out infinite;
    transform-origin: center;
  }

  /* Stickman limbs animation */
  @keyframes armWaveL { 0%,100% { transform: rotate(-15deg); } 50% { transform: rotate(35deg); } }
  @keyframes armWaveR { 0%,100% { transform: rotate(15deg); }  50% { transform: rotate(-35deg); } }
  @keyframes legKickL { 0%,100% { transform: rotate(-8deg); }  50% { transform: rotate(18deg); } }
  @keyframes legKickR { 0%,100% { transform: rotate(8deg); }   50% { transform: rotate(-18deg); } }

  /* Walking gait — bigger leg swing + arm counter-swing */
  @keyframes walkArmL { 0%,100% { transform: rotate(-30deg); } 50% { transform: rotate(35deg); } }
  @keyframes walkArmR { 0%,100% { transform: rotate(30deg); }  50% { transform: rotate(-35deg); } }
  @keyframes walkLegL { 0%,100% { transform: rotate(-25deg); } 50% { transform: rotate(25deg); } }
  @keyframes walkLegR { 0%,100% { transform: rotate(25deg); }  50% { transform: rotate(-25deg); } }

  /* Wave one hand high */
  @keyframes waveHi { 0%,100% { transform: rotate(-160deg); } 50% { transform: rotate(-130deg); } }

  /* Dance — both arms up, hips wiggle */
  @keyframes danceArmL { 0%,100% { transform: rotate(-100deg); } 50% { transform: rotate(-150deg); } }
  @keyframes danceArmR { 0%,100% { transform: rotate(100deg); }  50% { transform: rotate(150deg); } }
  @keyframes danceLeg  { 0%,100% { transform: rotate(-15deg); }  50% { transform: rotate(15deg); } }

  /* Body bops */
  @keyframes bodyBop   { 0%,100% { transform: translateY(0); }   50% { transform: translateY(-4px); } }
  @keyframes bodyJump  { 0% { transform: translateY(0); } 30% { transform: translateY(-50px); } 60% { transform: translateY(0); } 100% { transform: translateY(0); } }
  @keyframes bodySway  { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-2px) rotate(2deg); } }
  @keyframes bodyDance { 0%,100% { transform: translateX(-3px) translateY(-2px) rotate(-3deg); } 50% { transform: translateX(3px) translateY(-6px) rotate(3deg); } }

  .limbs { pointer-events: none; }
  .limb-arm-l { transform-origin: 22px 60px; animation: armWaveL 1.4s ease-in-out infinite; }
  .limb-arm-r { transform-origin: 78px 60px; animation: armWaveR 1.4s ease-in-out infinite; }
  .limb-leg-l { transform-origin: 38px 88px; animation: legKickL 0.9s ease-in-out infinite; }
  .limb-leg-r { transform-origin: 62px 88px; animation: legKickR 0.9s ease-in-out infinite; }

  /* behavior overrides — applied to the .face-wrap so it inherits to limbs */
  .smiley.playground { transition: left 1s ease-in-out, top 0.5s ease-out; }
  .smiley.playground .face-wrap { animation: bodySway 2.4s ease-in-out infinite; }

  .smiley.act-walk .face-wrap   { animation: bodyBop 0.5s ease-in-out infinite; }
  .smiley.act-walk .limb-arm-l  { animation: walkArmL 0.5s ease-in-out infinite; }
  .smiley.act-walk .limb-arm-r  { animation: walkArmR 0.5s ease-in-out infinite; }
  .smiley.act-walk .limb-leg-l  { animation: walkLegL 0.5s ease-in-out infinite; }
  .smiley.act-walk .limb-leg-r  { animation: walkLegR 0.5s ease-in-out infinite; }

  .smiley.act-jump .face-wrap   { animation: bodyJump 0.7s ease-out; }
  .smiley.act-jump .limb-arm-l  { animation: armWaveL 0.35s ease-in-out infinite; }
  .smiley.act-jump .limb-arm-r  { animation: armWaveR 0.35s ease-in-out infinite; }

  .smiley.act-wave .limb-arm-r  { animation: waveHi 0.35s ease-in-out infinite; }

  .smiley.act-dance .face-wrap  { animation: bodyDance 0.4s ease-in-out infinite; }
  .smiley.act-dance .limb-arm-l { animation: danceArmL 0.4s ease-in-out infinite; }
  .smiley.act-dance .limb-arm-r { animation: danceArmR 0.4s ease-in-out infinite; }
  .smiley.act-dance .limb-leg-l { animation: danceLeg 0.4s ease-in-out infinite; }
  .smiley.act-dance .limb-leg-r { animation: danceLeg 0.4s ease-in-out infinite reverse; }

  .smiley.flip-x .face-wrap { transform: scaleX(-1); }
  .smiley.flip-x.act-walk .face-wrap { animation: bodyBop 0.5s ease-in-out infinite; transform: scaleX(-1); }

  /* speech bubble */
  .bubble {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(-4px);
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 10px;
    padding: 4px 8px;
    font-size: 14px;
    font-family: "Caveat", cursive;
    color: var(--ink);
    white-space: nowrap;
    pointer-events: none;
    animation: bubblePop 0.2s ease-out;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -5px; left: 50%;
    width: 8px; height: 8px;
    background: var(--paper);
    border-right: 1.5px solid var(--ink);
    border-bottom: 1.5px solid var(--ink);
    transform: translateX(-50%) rotate(45deg);
  }
  @keyframes bubblePop {
    from { opacity: 0; transform: translateX(-50%) translateY(2px) scale(0.7); }
    to   { opacity: 1; transform: translateX(-50%) translateY(-4px) scale(1); }
  }

  /* Stack of yards along the bottom */
  .playground-stack {
    position: fixed;
    left: 4vw; right: 4vw;
    bottom: 0;
    pointer-events: none;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .playground-zone {
    position: relative;
    width: 100%;
    height: 22vh;
    pointer-events: none;
    transition: height 0.5s ease, background 0.25s ease;
  }
  .playground-zone.hot { background: rgba(90, 24, 16, 0.06); }
  .playground-zone svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }
  .playground-zone .label {
    position: absolute;
    top: 10px; left: 16px;
    font-size: 22px;
    transform: rotate(-1deg);
    opacity: 0.7;
  }
  .playground-zone .count {
    position: absolute;
    bottom: 8px; right: 18px;
    font-size: 18px;
    opacity: 0.55;
  }

  /* Headline */
  .title {
    position: fixed; top: 22px; left: 28px;
    font-size: 26px; font-weight: 600; letter-spacing: 0.5px;
    transform: rotate(-2deg); z-index: 10; pointer-events: none;
  }
  .title small {
    display: block; font-size: 14px; opacity: 0.6; margin-top: -2px;
    font-weight: 400; transform: rotate(1deg) translateX(8px);
  }

  .hint {
    position: fixed; top: 24px; right: 28px;
    font-size: 16px; opacity: 0.55; transform: rotate(1deg);
    z-index: 10; pointer-events: none; max-width: 220px; text-align: right;
  }

  .squig { width: 110px; height: 8px; margin-top: 2px; overflow: visible; }

  /* React tweaks panel mount */
  #tweaks-root { position: fixed; z-index: 2147483647; }

  /* ============================================================
     SAGA — chapters 2/3/4 overlay
     ============================================================ */
  .saga {
    position: fixed; inset: 0; z-index: 100;
    pointer-events: none;
    opacity: 0; transition: opacity 1.2s ease;
    background: var(--paper);
    background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
    background-size: 18px 18px;
  }
  .saga.on { opacity: 1; pointer-events: auto; }

  /* ── Atmospheric sky + per-chapter color grading ── */
  .sky-layer {
    position: absolute; inset: 0; z-index: 0;
    pointer-events: none;
    /* default = warm dawn (build day) */
    background:
      radial-gradient(ellipse 120% 80% at 70% 12%, rgba(255,228,170,0.9) 0%, transparent 55%),
      linear-gradient(to bottom, #fbeecb 0%, #f3e6c4 42%, #e7d4a6 72%, #d8c89a 100%);
    background-color: #f3e6c4;
    transition: background 2.2s ease, filter 2.2s ease;
  }
  /* War: brooding storm — desaturated, deep ember-red horizon */
  .saga.atmo-war .sky-layer {
    background:
      radial-gradient(ellipse 140% 90% at 50% 120%, rgba(180,40,20,0.55) 0%, transparent 55%),
      radial-gradient(ellipse 100% 60% at 30% 8%, rgba(120,90,90,0.4) 0%, transparent 60%),
      linear-gradient(to bottom, #3a2b2f 0%, #5a3a34 38%, #7c4634 66%, #9c4e2e 100%);
    background-color: #4a3330;
  }
  /* Heaven: radiant gold */
  .saga.atmo-heaven .sky-layer {
    background:
      radial-gradient(ellipse 120% 100% at 50% 18%, rgba(255,248,210,0.95) 0%, rgba(255,232,170,0.5) 40%, transparent 72%),
      linear-gradient(to bottom, #fdf3d2 0%, #f7e7b8 50%, #efd9a0 100%);
    background-color: #f9eecb;
  }

  /* Color grading wash over the whole scene */
  .grade-layer {
    position: absolute; inset: 0; z-index: 35;
    pointer-events: none; opacity: 0;
    mix-blend-mode: multiply;
    transition: opacity 2s ease, background 2s ease;
    background: linear-gradient(to bottom, rgba(60,20,20,0.0), rgba(40,10,10,0.0));
  }
  .saga.atmo-war .grade-layer {
    opacity: 1;
    background:
      radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(30,8,8,0.5) 100%),
      linear-gradient(to bottom, rgba(90,30,20,0.25), rgba(40,10,10,0.45));
  }
  .saga.atmo-heaven .grade-layer {
    opacity: 1; mix-blend-mode: screen;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,240,190,0.5) 0%, transparent 65%);
  }

  /* When at war, ink lines glow lighter against the dark sky */
  .saga.atmo-war .landscape .ink,
  .saga.atmo-war .landscape .ink-thin { stroke: rgba(245,225,200,0.55); }
  .saga.atmo-war .landscape #ground-path { fill: rgba(20,8,8,0.35); }

  /* Drifting atmosphere particles (embers in war, motes otherwise) */
  .atmo-particles { position: absolute; inset: 0; z-index: 33; pointer-events: none; overflow: hidden; }
  .ember {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,180,90,0.95), rgba(255,90,40,0.2) 70%, transparent);
    will-change: transform, opacity;
  }
  @keyframes emberRise {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    15%  { opacity: 0.9; }
    100% { transform: translateY(-95vh) translateX(var(--drift, 30px)) scale(0.3); opacity: 0; }
  }

  .chapter-card {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%) rotate(-1.5deg);
    text-align: center;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .chapter-card.show { opacity: 1; transform: translate(-50%, -50%) rotate(-1.5deg) scale(1); }
  .chapter-card .num { font-size: 22px; opacity: 0.55; letter-spacing: 2px; }
  .chapter-card .name { font-size: 88px; font-weight: 700; line-height: 1; }
  .chapter-card .sub { font-size: 24px; opacity: 0.7; margin-top: 6px; }

  .saga-clock {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    font-size: 22px; opacity: 0.65; z-index: 150;
    background: rgba(241,234,214,0.7);
    padding: 4px 14px; border: 1.5px solid var(--ink); border-radius: 14px;
    transform-origin: center;
  }
  .saga-clock .big { font-size: 28px; font-weight: 700; margin-right: 6px; }

  .saga-banner {
    position: absolute; top: 22px; left: 28px;
    font-size: 26px; font-weight: 600; transform: rotate(-2deg);
    z-index: 150;
  }
  .saga-banner small { display: block; font-size: 14px; opacity: 0.6; font-weight: 400; }

  /* Landscape: ground, mountains, sky */
  .landscape { position: absolute; inset: 0; overflow: hidden; }
  .landscape svg { width: 100%; height: 100%; display: block; overflow: visible; }

  /* Buildings/structures container */
  .build-layer { position: absolute; inset: 0; pointer-events: none; }
  .build-layer .struct {
    position: absolute;
    width: 100px; height: 100px;
    transform-origin: center bottom;
    opacity: 0;
    animation: structRise 0.6s ease-out forwards;
  }
  @keyframes structRise {
    from { opacity: 0; transform: translateY(8px) scale(0.7); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Smileys placed in the world */
  .world-smiley {
    position: absolute;
    width: 56px; height: 56px;
    transform-origin: center;
    will-change: transform, left, top;
  }
  .world-smiley svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .world-smiley.builder .face-wrap { animation: bodyBop 0.45s ease-in-out infinite; }
  .world-smiley .hpbar {
    position: absolute; left: 0; right: 0; top: -10px;
    height: 4px; background: rgba(90,24,16,0.15);
    border: 1px solid var(--ink); border-radius: 3px;
    overflow: hidden;
  }
  .world-smiley .hpbar .hp {
    height: 100%; background: var(--ink); width: 100%;
    transition: width 0.3s ease;
  }
  .world-smiley.dead { animation: ghostFloat 4s ease-out forwards; }
  @keyframes ghostFloat {
    0%   { opacity: 1; transform: rotate(0deg); }
    20%  { opacity: 0.7; transform: rotate(180deg) translateY(-20px); }
    100% { opacity: 0;  transform: rotate(540deg) translateY(-200px); }
  }

  /* Hammering animation for builders */
  @keyframes hammer {
    0%, 100% { transform: rotate(-12deg); }
    50%      { transform: rotate(40deg); }
  }
  .world-smiley.builder .limb-arm-r { animation: hammer 0.35s ease-in-out infinite; }

  /* Sword swing for warriors */
  @keyframes swing {
    0%, 100% { transform: rotate(-30deg); }
    50%      { transform: rotate(80deg); }
  }
  .world-smiley.warrior .limb-arm-r { animation: swing 0.45s ease-in-out infinite; }

  /* Battle-hardened warrior look — bolder lines, war-paint glow */
  .world-smiley.warrior-look .ink { stroke-width: 3.4; }
  .world-smiley.warrior-look .ink-thin { stroke-width: 2.6; }
  .world-smiley.warrior-look { filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3)); }
  @keyframes bandFlutter { 0%,100% { transform: skewY(-1deg) translateY(0); } 50% { transform: skewY(2deg) translateY(-1px); } }
  .world-smiley.warrior-look .war-band { animation: bandFlutter 0.5s ease-in-out infinite; transform-origin: center; }

  /* Wall in the middle */
  .great-wall {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: 18%; width: 6%; height: 56%;
    z-index: 30;
  }
  .great-wall svg { width: 100%; height: 100%; overflow: visible; }
  .wall-stone {
    fill: rgba(90,24,16,0.05);
    stroke: var(--ink); stroke-width: 2;
  }
  .crack {
    fill: none; stroke: var(--ink); stroke-width: 2.4;
    stroke-dasharray: 200; stroke-dashoffset: 200;
    transition: stroke-dashoffset 1s linear;
  }

  /* Falling wall pieces */
  @keyframes wallFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(220px) rotate(var(--r, 90deg)); opacity: 0.2; }
  }
  .wall-piece { animation: wallFall 1.2s ease-in forwards; transform-origin: center; }

  /* Projectiles, spells, fx */
  .fx-layer { position: absolute; inset: 0; pointer-events: none; z-index: 60; }
  .projectile {
    position: absolute; width: 18px; height: 18px;
    pointer-events: none;
  }
  .projectile svg { width: 100%; height: 100%; overflow: visible; }
  @keyframes flyTo {
    from { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    to   { transform: translate(var(--tx), var(--ty)) rotate(var(--tr, 720deg)); opacity: 0.9; }
  }
  .projectile.go { animation: flyTo var(--fly, 0.55s) linear forwards; }

  @keyframes hitFlash {
    0%, 100% { filter: none; }
    50%      { filter: brightness(1.4) saturate(0); }
  }
  .world-smiley.hit { animation: hitFlash 0.25s ease; }

  @keyframes shake {
    0%, 100% { transform: translate(0,0); }
    25%      { transform: translate(-2px, 1px); }
    50%      { transform: translate(2px, -1px); }
    75%      { transform: translate(-1px, 2px); }
  }
  .saga.armageddon .landscape { animation: shake 0.18s linear infinite; }

  /* Brief shake burst when wall cracks */
  @keyframes shakeBurst {
    0% { transform: translate(0,0); }
    10% { transform: translate(-6px, 3px); }
    20% { transform: translate(7px, -2px); }
    30% { transform: translate(-5px, -3px); }
    40% { transform: translate(4px, 4px); }
    55% { transform: translate(-3px, 2px); }
    70% { transform: translate(2px, -2px); }
    85% { transform: translate(-1px, 1px); }
    100% { transform: translate(0,0); }
  }
  .saga.crack-shake .landscape { animation: shakeBurst 0.6s cubic-bezier(.4,0,.6,1); }
  .saga.crack-shake #build-layer, .saga.crack-shake #fx-layer { animation: shakeBurst 0.6s cubic-bezier(.4,0,.6,1); }

  /* Heaven / God descending */
  .heaven {
    position: absolute; top: -40%; left: 0; right: 0; height: 80%;
    background: radial-gradient(ellipse at 50% 100%,
      rgba(255, 244, 200, 0.95) 0%,
      rgba(255, 240, 180, 0.6) 35%,
      rgba(255, 240, 180, 0) 70%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease, top 3s ease;
    z-index: 40;
  }
  .saga.heaven-on .heaven { opacity: 1; top: -10%; }

  .god {
    position: absolute; left: 50%; top: -30%;
    transform: translateX(-50%);
    width: 280px; height: 280px;
    z-index: 50;
    transition: top 5s cubic-bezier(.4,.1,.4,1), opacity 2s ease;
    opacity: 0;
  }
  .god svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 30px rgba(255, 220, 120, 0.9)); }
  .god .rays {
    position: absolute; inset: -40%;
    background: conic-gradient(
      from 0deg,
      rgba(255, 240, 180, 0.4) 0deg, transparent 18deg,
      rgba(255, 240, 180, 0.35) 36deg, transparent 54deg,
      rgba(255, 240, 180, 0.4) 72deg, transparent 90deg,
      rgba(255, 240, 180, 0.35) 108deg, transparent 126deg,
      rgba(255, 240, 180, 0.4) 144deg, transparent 162deg,
      rgba(255, 240, 180, 0.4) 180deg, transparent 198deg,
      rgba(255, 240, 180, 0.35) 216deg, transparent 234deg,
      rgba(255, 240, 180, 0.4) 252deg, transparent 270deg,
      rgba(255, 240, 180, 0.35) 288deg, transparent 306deg,
      rgba(255, 240, 180, 0.4) 324deg, transparent 342deg
    );
    border-radius: 50%;
    animation: spinRays 24s linear infinite;
    z-index: -1;
  }
  @keyframes spinRays { to { transform: rotate(360deg); } }
  .saga.heaven-on .god { opacity: 1; top: 8%; }

  .saga-message {
    position: absolute;
    left: 50%; top: 38%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 32px;
    line-height: 1.2;
    max-width: 80%;
    z-index: 90;
    opacity: 0;
    transition: opacity 1.2s ease;
    text-shadow: 0 0 20px rgba(241,234,214,0.9);
  }
  .saga-message.show { opacity: 1; }

<style>
  /* ── Wall crack: jagged reveal + jolts ── */

  @keyframes wallJolt {
    0%,100% { transform: translateX(-50%); }
    15% { transform: translateX(calc(-50% - 6px)) scaleY(1.012); }
    35% { transform: translateX(calc(-50% + 7px)) scaleY(0.988); }
    55% { transform: translateX(calc(-50% - 5px)); }
    78% { transform: translateX(calc(-50% + 3px)); }

  /* ── Dust / debris puffs ── */

    animation: bodyBop 0.9s ease-in-out infinite;
  }
  .cmd-hat {
    position: absolute; left: -18%; top: -62%;
    width: 136%; height: 78%;
    pointer-events: none; z-index: 5;
    transform: rotate(-5deg);
  }
  .rally-ring.heal { border-color: rgba(110, 205, 125, .9); }

  /* ── Status effects: dizzy stun stars · burning ── */
  .stun-stars {
    position: absolute; left: 50%; top: -44px;
    width: 44px; height: 18px; transform: translateX(-50%);
    pointer-events: none; z-index: 7;
  }
  .stun-stars svg { width: 100%; height: 100%; overflow: visible; animation: stunOrbit 0.9s linear infinite; transform-origin: center; }
  @keyframes stunOrbit { 0%,100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }
  .world-smiley.stunned .face-wrap,
  .world-smiley.stunned .limbs g { animation-play-state: paused !important; }
  .world-smiley.stunned .face-wrap { filter: saturate(.45) brightness(1.06); }
  .burn-fx {
    position: absolute; left: 50%; top: -16px;
    width: 20px; height: 24px;
    pointer-events: none; z-index: 7;
    transform-origin: bottom center;
    animation: burnFlick .32s ease-in-out infinite;
  }
  @keyframes burnFlick {
    0%,100% { transform: translateX(-50%) scale(1); opacity: .9; }
    50%     { transform: translateX(-50%) scale(1.16, .9); opacity: 1; }
  }

  /* ── Captains · trump cards · frontline tide ── */
  .captain-badge {
    position: absolute; left: 50%; top: -48px;
    width: 22px; height: 22px; transform: translateX(-50%);
    pointer-events: none; z-index: 6;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.35));
    animation: bodyBop 1.3s ease-in-out infinite;
  }
  .captain-ring {
    position: absolute; inset: -8%;
    border-radius: 50%;
    pointer-events: none; z-index: 3;
    opacity: .55;
    animation: vanguardSpin 9s linear infinite;
  }
  .war-banner {
    position: absolute; left: 50%; top: 24%;
    transform: translate(-50%,-50%) rotate(-2deg) scale(.6);
    font-family: 'Caveat', cursive; font-weight: 700;
    font-size: 74px; line-height: 1;
    color: #f7edd3;
    -webkit-text-stroke: 2px #3a2218;
    text-shadow: 0 3px 0 #3a2218, 0 0 30px rgba(0,0,0,.45);
    text-align: center;
    z-index: 210; pointer-events: none;
    opacity: 0;
    transition: transform .2s cubic-bezier(.2,1.5,.4,1), opacity .2s ease;
  }
  .war-banner .sub {
    display: block; font-size: 24px; letter-spacing: .18em;
    -webkit-text-stroke: 0; margin-top: 6px;
    text-shadow: 0 1px 0 #3a2218, 0 0 12px rgba(0,0,0,.5);
  }
  .war-banner.show { opacity: 1; transform: translate(-50%,-50%) rotate(-2deg) scale(1); }

  .nova-ring {
    position: absolute; width: 24px; height: 24px;
    border: 4px solid rgba(255,150,60,.95); border-radius: 50%;
    box-shadow: 0 0 20px rgba(255,120,40,.75), inset 0 0 12px rgba(255,120,40,.55);
    pointer-events: none; z-index: 72;
    animation: novaRing .68s ease-out forwards;
  }
  @keyframes novaRing { from { transform: scale(.4); opacity: 1; } to { transform: scale(17); opacity: 0; } }

  .paper-jet { position: absolute; left: -80px; width: 58px; height: 26px; z-index: 74; pointer-events: none; }

  .dragon-seg { position: absolute; z-index: 73; pointer-events: none; will-change: left, top; }
</style>

<script>
/* =====================================================================
   PLAYGROUND ENGINE
   Globals exposed for the React tweaks panel:
     window.__pg.config      — live config
     window.__pg.respawn()   — rebuild the wandering crowd
     window.__pg.clearYard() — sends yard residents back into the wild
     window.__pg.giveAllLimbs(bool)
     window.__pg.setInkColor(hex)
   ===================================================================== */
(function () {
  const FACES = {
    happy:    'f-happy',
    grin:     'f-grin',
    wink:     'f-wink',
    surprised:'f-surprised',
    smug:     'f-smug',
    laugh:    'f-laugh',
    cool:     'f-cool',
    tongue:   'f-tongue',
    meh:      'f-meh',
    sleepy:   'f-sleepy',
    shy:      'f-shy',
    angry:    'f-angry'
  };
  const ALL_FACE_KEYS = Object.keys(FACES);

  const MOTIONS = {
    rollR:  { duration: [6, 10] },
    rollL:  { duration: [7, 11] },
    tumble: { duration: [9, 14] },
    bounce: { duration: [8, 12] },
    drift:  { duration: [10, 16] }
  };

  const stage = document.getElementById('stage');
  const stackEl = document.getElementById('playground-stack');
  const yardTpl = document.getElementById('yard-template');

  // Live config — tweaked from the React panel
  const config = {
    chaos: 1.0,            // multiplier for spawn count + speed
    autoLimbs: false,      // every spawned smiley gets limbs
    faceFilter: ALL_FACE_KEYS.slice(), // which faces are allowed
    inkColor: '#5a1810'
  };

  const MAX_PER_YARD = 10;
  const MAX_YARDS = 6;

  let wanderers = []; // currently animating
  /** @type {{el:HTMLElement, residents:HTMLElement[], idx:number}[]} */
  let yards = [];
  let nextYardId = 1;

  function createYard() {
    if (yards.length >= MAX_YARDS) return null;
    const node = yardTpl.content.firstElementChild.cloneNode(true);
    const id = nextYardId++;
    node.dataset.yardId = String(id);
    node.querySelector('.label').textContent = `— yard ${id} —`;
    stackEl.appendChild(node);
    const yard = { el: node, residents: [], idx: yards.length };
    yards.push(yard);
    updateYardLabel(yard);
    rebalanceYardHeights();
    return yard;
  }

  function destroyYard(yard) {
    if (yard.residents.length) return; // safety
    yard.el.remove();
    yards = yards.filter(y => y !== yard);
    yards.forEach((y, i) => y.idx = i);
    rebalanceYardHeights();
  }

  function rebalanceYardHeights() {
    // when more yards visible, each gets shorter so they all fit
    const n = Math.max(1, yards.length);
    const h = n === 1 ? 28
            : n === 2 ? 20
            : n === 3 ? 16
            : n === 4 ? 13
            : n === 5 ? 11
            :          10;
    yards.forEach(y => y.el.style.height = h + 'vh');
    // After height change, re-snap residents
    requestAnimationFrame(() => yards.forEach(y => snapResidentsToGround(y)));
  }

  function updateYardLabel(yard) {
    yard.el.querySelector('.count').textContent = `${yard.residents.length}/${MAX_PER_YARD}`;
  }

  function findYardAtPoint(clientX, clientY) {
    for (const y of yards) {
      const r = y.el.getBoundingClientRect();
      if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) return y;
    }
    return null;
  }

  function leastFullOpenYard() {
    // First, look for an existing yard with space
    let best = null;
    for (const y of yards) {
      if (y.residents.length < MAX_PER_YARD) {
        if (!best || y.residents.length < best.residents.length) best = y;
      }
    }
    if (best) return best;
    // No space — try to create a new one
    return createYard();
  }

  function snapResidentsToGround(yard) {
    const yr = yard.el.getBoundingClientRect();
    const groundLineY = yr.top + yr.height * 0.78;
    yard.residents.forEach(rEl => {
      const sz = rEl.getBoundingClientRect().width;
      const newY = groundLineY - sz * 1.24;
      rEl.style.top = newY + 'px';
      rEl.dataset.groundY = String(newY);
    });
  }

  function yardOf(el) {
    const id = el.dataset.yardId;
    return yards.find(y => y.el.dataset.yardId === id) || null;
  }

  function rand(min, max) { return min + Math.random() * (max - min); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function allowedFaces() {
    const list = config.faceFilter.length ? config.faceFilter : ALL_FACE_KEYS;
    return list.map(k => FACES[k]);
  }

  function makeLimbsSvg() {
    return `<svg class="limbs" viewBox="0 0 100 100" style="position:absolute; inset:0; overflow:visible;"><use href="#limbs" /></svg>`;
  }

  function spawn(faceId, motionName, opts = {}) {
    const motion = MOTIONS[motionName];
    const el = document.createElement('div');
    el.className = 'smiley';

    const size = opts.size || rand(70, 150);
    el.style.width = size + 'px';
    el.style.height = size + 'px';

    const top = opts.top != null ? opts.top : rand(5, 60);
    el.style.top = top + 'vh';
    el.style.left = '0';

    const baseDur = opts.duration || rand(motion.duration[0], motion.duration[1]);
    // chaos affects speed: more chaos → faster
    const dur = baseDur / Math.max(0.4, config.chaos);
    const delay = opts.delay || 0;

    el.style.animation = `${motionName} ${dur}s linear ${delay}s infinite`;
    el.dataset.face = faceId;
    el.dataset.motion = motionName;

    const limbsHtml = (opts.limbs ?? config.autoLimbs) ? makeLimbsSvg() : '';
    el.innerHTML = `
      <div class="face-wrap" style="animation-duration:${rand(1.2,2.4).toFixed(2)}s; animation-delay:${rand(-2,0).toFixed(2)}s;">
        <svg viewBox="0 0 100 100" style="position:absolute; inset:0;"><use href="#${faceId}" /></svg>
        ${limbsHtml}
      </div>
    `;

    stage.appendChild(el);
    attachDrag(el);
    return el;
  }

  function clearWanderers() {
    wanderers.forEach(el => el.remove());
    wanderers = [];
  }

  function populate() {
    clearWanderers();
    const faces = allowedFaces();
    if (!faces.length) return;

    const chaos = config.chaos;
    const laneCount = Math.max(2, Math.round(4 * Math.min(1.5, chaos)));
    const perLane = Math.max(2, Math.round(4 * Math.min(1.4, chaos)));
    const tumblerCount = Math.round(8 * chaos);
    const starCount = Math.max(1, Math.round(3 * Math.min(1.3, chaos)));

    const lanes = [];
    for (let i = 0; i < laneCount; i++) {
      lanes.push({ motion: i % 2 === 0 ? 'rollR' : 'rollL', top: 6 + (i / laneCount) * 55 });
    }

    lanes.forEach((lane, li) => {
      const dur = rand(9, 13);
      for (let i = 0; i < perLane; i++) {
        wanderers.push(spawn(faces[(li * perLane + i) % faces.length], lane.motion, {
          top: lane.top + rand(-2, 2),
          size: rand(64, 96),
          duration: dur,
          delay: -((dur / perLane) * i)
        }));
      }
    });

    for (let i = 0; i < tumblerCount; i++) {
      const m = pick(['tumble','bounce','drift']);
      const dur = rand(MOTIONS[m].duration[0], MOTIONS[m].duration[1]);
      wanderers.push(spawn(pick(faces), m, {
        size: rand(50, 100),
        duration: dur,
        delay: -rand(0, dur)
      }));
    }

    for (let i = 0; i < starCount; i++) {
      const m = pick(Object.keys(MOTIONS));
      const dur = rand(MOTIONS[m].duration[0], MOTIONS[m].duration[1]) * 1.3;
      wanderers.push(spawn(pick(faces), m, {
        size: rand(120, 170),
        top: rand(12, 50),
        duration: dur,
        delay: -rand(0, dur)
      }));
    }
  }

  /* =================== DRAG + DROP =================== */
  function attachDrag(el) {
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (window.__sfx) { window.__sfx.unlock(); window.__sfx.pop(); }
      const wasInYard = el.classList.contains('playground');
      // Capture current visual position before removing animation
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;

      el.style.animation = 'none';
      el.style.transform = 'rotate(0deg)';
      el.style.left = (cx - r.width / 2) + 'px';
      el.style.top  = (cy - r.height / 2) + 'px';
      el.classList.remove('playground');
      el.classList.add('dragging');

      // remove from yard list if necessary
      if (wasInYard) {
        stopYardBehavior(el);
        const yard = yardOf(el);
        if (yard) {
          yard.residents = yard.residents.filter(x => x !== el);
          updateYardLabel(yard);
          // Destroy empty trailing yards (keep yard 1 always)
          if (yard.residents.length === 0 && yards.length > 1 && yard !== yards[0]) {
            destroyYard(yard);
          }
        }
        delete el.dataset.yardId;
      } else {
        wanderers = wanderers.filter(x => x !== el);
      }
      el.classList.remove('act-walk','act-jump','act-wave','act-dance','flip-x');

      el.setPointerCapture(e.pointerId);
      const offX = e.clientX - cx;
      const offY = e.clientY - cy;

      const onMove = (ev) => {
        const x = ev.clientX - offX - r.width / 2;
        const y = ev.clientY - offY - r.height / 2;
        el.style.left = x + 'px';
        el.style.top  = y + 'px';

        const hovered = findYardAtPoint(ev.clientX, ev.clientY);
        yards.forEach(y => y.el.classList.toggle('hot', y === hovered && y.residents.length < MAX_PER_YARD));
      };
      const onUp = (ev) => {
        el.releasePointerCapture(e.pointerId);
        el.removeEventListener('pointermove', onMove);
        el.removeEventListener('pointerup', onUp);
        el.classList.remove('dragging');
        yards.forEach(y => y.el.classList.remove('hot'));

        const hovered = findYardAtPoint(ev.clientX, ev.clientY);
        // If hovered yard is full, try to spill into a new yard
        let targetYard = null;
        if (hovered) {
          if (hovered.residents.length < MAX_PER_YARD) targetYard = hovered;
          else targetYard = leastFullOpenYard();
        }

        if (targetYard) {
          if (window.__sfx) window.__sfx.thunk();
          placeInYard(el, targetYard, ev.clientX);
        } else {
          // Released into the wild — re-attach a wandering animation from current position
          // For simplicity: send it on a drift across the screen from where it sits.
          ensureLimbs(el, config.autoLimbs);
          // convert px-position back to vh top, then animate it
          const top = (parseFloat(el.style.top) / window.innerHeight) * 100;
          el.style.top = top + 'vh';
          el.style.left = '0';
          const m = pick(['drift', 'tumble', 'rollR']);
          const dur = rand(MOTIONS[m].duration[0], MOTIONS[m].duration[1]) / Math.max(0.4, config.chaos);
          el.style.animation = `${m} ${dur}s linear 0s infinite`;
          el.dataset.motion = m;
          wanderers.push(el);
        }
      };

      el.addEventListener('pointermove', onMove);
      el.addEventListener('pointerup', onUp);
    });
  }

  /* =================== YARD BEHAVIOR LOOP ===================
     Each yard resident runs an idle AI: pick a random action every
     few seconds (idle, walk, jump, wave, dance, chat). Walking moves
     them along the ground; jumping does an arcing hop in place. */
  const ACTIONS = ['idle','walk','walk','jump','wave','dance','chat'];
  const SAYINGS = ['hi','wheee',':)','hey!','wow','hehe','hmm','ok','♪','la la','oof','psst'];

  function placeInYard(el, yard, preferredClientX) {
    ensureLimbs(el, true);
    el.classList.add('playground');
    el.dataset.yardId = yard.el.dataset.yardId;
    const sz = el.getBoundingClientRect().width;
    const yr = yard.el.getBoundingClientRect();
    const groundLineY = yr.top + yr.height * 0.78;
    let x = (preferredClientX != null ? preferredClientX : (yr.left + yr.width / 2)) - sz / 2;
    let y = groundLineY - sz * 1.24;
    x = Math.max(yr.left + 8, Math.min(yr.right - sz - 8, x));
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.transform = 'rotate(0deg)';
    el.dataset.groundY = String(y);
    yard.residents.push(el);
    updateYardLabel(yard);
    rebalanceYardHeights();
    startYardBehavior(el);
  }

  function yardBoundsOf(el) {
    const yard = yardOf(el);
    return yard ? yard.el.getBoundingClientRect() : null;
  }

  function clearActClasses(el) {
    el.classList.remove('act-walk','act-jump','act-wave','act-dance');
  }

  function stopYardBehavior(el) {
    if (el.__yardTimer) { clearTimeout(el.__yardTimer); el.__yardTimer = null; }
    clearActClasses(el);
    const b = el.querySelector('.bubble'); if (b) b.remove();
  }

  function sayBriefly(el, text, ms = 1400) {
    const old = el.querySelector('.bubble'); if (old) old.remove();
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    el.appendChild(b);
    if (window.__sfx) window.__sfx.speakRandom(text);
    setTimeout(() => { if (b.parentNode) b.remove(); }, ms);
  }

  function startYardBehavior(el) {
    stopYardBehavior(el);
    const tick = () => {
      if (!el.classList.contains('playground')) return;
      const action = pick(ACTIONS);
      const dur = doAction(el, action);
      el.__yardTimer = setTimeout(tick, dur + rand(200, 600));
    };
    el.__yardTimer = setTimeout(tick, rand(200, 1200));
  }

  function doAction(el, action) {
    clearActClasses(el);
    const yr = yardBoundsOf(el);
    if (!yr) return 1000;
    const sz = el.getBoundingClientRect().width;
    const x = parseFloat(el.style.left) || 0;
    const y = parseFloat(el.style.top) || 0;

    if (action === 'idle') {
      return rand(800, 1800);
    }
    if (action === 'walk') {
      // walk left or right toward a target inside yard bounds
      const dir = Math.random() < 0.5 ? -1 : 1;
      const dist = rand(40, 180) * dir;
      let tx = x + dist;
      const minX = yr.left + 8;
      const maxX = yr.right - sz - 8;
      // bounce off walls — flip dir
      if (tx < minX) tx = minX;
      if (tx > maxX) tx = maxX;
      el.classList.toggle('flip-x', dir < 0);
      el.classList.add('act-walk');
      // travel time proportional to distance
      const travel = Math.max(800, Math.abs(tx - x) * 14);
      // override the transition for this travel
      el.style.transition = `left ${travel}ms linear, top 0.5s ease-out`;
      requestAnimationFrame(() => { el.style.left = tx + 'px'; });
      return travel;
    }
    if (action === 'jump') {
      el.classList.add('act-jump');
      // duration matches bodyJump keyframes (0.7s)
      return 700;
    }
    if (action === 'wave') {
      el.classList.add('act-wave');
      if (Math.random() < 0.6) sayBriefly(el, pick(SAYINGS), 1200);
      return rand(1200, 2200);
    }
    if (action === 'dance') {
      el.classList.add('act-dance');
      return rand(1600, 3000);
    }
    if (action === 'chat') {
      sayBriefly(el, pick(SAYINGS), 1200);
      return 1200;
    }
    return 1000;
  }

  function ensureLimbs(el, want) {
    const wrap = el.querySelector('.face-wrap');
    if (!wrap) return;
    const has = !!wrap.querySelector('.limbs');
    if (want && !has) {
      wrap.insertAdjacentHTML('beforeend', makeLimbsSvg());
    } else if (!want && has) {
      wrap.querySelector('.limbs').remove();
    }
  }

  function totalResidents() {
    return yards.reduce((n, y) => n + y.residents.length, 0);
  }

  function allResidents() {
    return yards.flatMap(y => y.residents);
  }

  /* =================== RECRUITER ===================
     Every few seconds, a yard resident may "recruit": picks a wandering
     smiley, waves them in, and a target spot in some open yard. */
  function recruitOne() {
    const residents = allResidents();
    if (!residents.length || !wanderers.length) return;
    const yard = leastFullOpenYard();
    if (!yard) return; // all yards full + can't create more
    const recruiter = pick(residents);
    const target = pick(wanderers);
    if (!recruiter || !target) return;

    // Recruiter waves and shouts
    sayBriefly(recruiter, pick(['come!','join us!','this way!','hey you!']), 1500);
    recruiter.classList.add('act-wave');
    setTimeout(() => recruiter.classList.remove('act-wave'), 1400);

    // Take target out of the wild and fly them to the chosen yard
    wanderers = wanderers.filter(x => x !== target);
    const tr = target.getBoundingClientRect();
    target.style.animation = 'none';
    target.style.transition = 'left 1.6s cubic-bezier(.4,.1,.4,1), top 1.6s cubic-bezier(.3,.8,.4,1), transform 1.6s ease';
    target.style.left = tr.left + 'px';
    target.style.top  = tr.top  + 'px';

    requestAnimationFrame(() => {
      ensureLimbs(target, true);
      const yr = yard.el.getBoundingClientRect();
      const sz = target.getBoundingClientRect().width;
      const groundLineY = yr.top + yr.height * 0.78;
      const tx = rand(yr.left + 20, yr.right - sz - 20);
      const ty = groundLineY - sz * 1.24;
      target.style.left = tx + 'px';
      target.style.top  = ty + 'px';
      target.style.transform = 'rotate(0deg)';
    });

    setTimeout(() => {
      target.classList.add('playground');
      target.style.transition = 'left 1s ease-in-out, top 0.5s ease-out';
      target.dataset.yardId = yard.el.dataset.yardId;
      yard.residents.push(target);
      updateYardLabel(yard);
      rebalanceYardHeights();
      startYardBehavior(target);
      sayBriefly(target, pick(['hi!','hello','yay','♪']), 1100);
    }, 1700);
  }

  setInterval(() => {
    // recruitment cadence scales with chaos a bit
    if (Math.random() < 0.55 * Math.min(1.5, config.chaos)) recruitOne();
  }, 4500);

  /* =================== LEAVE HOME ===================
     Some residents get bored and decide to wander off again — they fly back
     into the wild, freeing up space so others can move in. */
  function leaveHome(el) {
    const yard = yardOf(el);
    if (!yard) return;
    stopYardBehavior(el);
    sayBriefly(el, pick(['bye!','later','peace','adios','byyye','off i go']), 1100);

    // Remove from yard
    yard.residents = yard.residents.filter(x => x !== el);
    delete el.dataset.yardId;
    updateYardLabel(yard);

    // Animate flying off-screen, then return as a wanderer
    const r = el.getBoundingClientRect();
    el.classList.remove('playground','act-walk','act-jump','act-wave','act-dance','flip-x');
    el.style.transition = 'left 1.4s cubic-bezier(.5,-.2,.7,1), top 1.4s cubic-bezier(.3,.6,.5,1), transform 1.4s ease';
    el.style.left = r.left + 'px';
    el.style.top  = r.top  + 'px';
    requestAnimationFrame(() => {
      const dir = Math.random() < 0.5 ? -1 : 1;
      const flyX = dir < 0 ? -180 : window.innerWidth + 80;
      const flyY = rand(40, window.innerHeight * 0.4);
      el.style.left = flyX + 'px';
      el.style.top  = flyY + 'px';
      el.style.transform = `rotate(${rand(-540, 540)}deg)`;
    });

    setTimeout(() => {
      el.style.transition = '';
      ensureLimbs(el, config.autoLimbs);
      const top = (rand(8, 80));
      el.style.top = top + 'vh';
      el.style.left = '0';
      el.style.transform = '';
      const m = pick(['drift', 'tumble', 'rollR']);
      const dur = rand(MOTIONS[m].duration[0], MOTIONS[m].duration[1]) / Math.max(0.4, config.chaos);
      el.style.animation = `${m} ${dur}s linear 0s infinite`;
      el.dataset.motion = m;
      wanderers.push(el);

      // Drop empty trailing yards (keep yard 1)
      if (yard.residents.length === 0 && yards.length > 1 && yard !== yards[0]) {
        destroyYard(yard);
      }
    }, 1500);
  }

  setInterval(() => {
    const residents = allResidents();
    if (residents.length < 3) return; // keep at least a couple at home
    // Higher chance to leave when yards are crowded
    const total = totalResidents();
    const capacity = yards.length * MAX_PER_YARD;
    const fullness = capacity ? total / capacity : 0;
    const baseChance = 0.18 + 0.5 * fullness;
    if (Math.random() < baseChance * Math.min(1.5, config.chaos)) {
      leaveHome(pick(residents));
    }
  }, 5200);

  /* =================== RESIDENT-TO-RESIDENT INTERACTIONS ===================
     Periodically check: any two residents standing close to each other?
     They wave/chat at each other. */
  const CHATS = ['hi!','hey',':)','wow','heya','♪','sup','hello','psst','hehe'];
  setInterval(() => {
    const residents = allResidents();
    if (residents.length < 2) return;
    const a = pick(residents);
    // chat only with neighbors in the SAME yard
    const aYard = yardOf(a);
    if (!aYard) return;
    const others = aYard.residents.filter(x => x !== a);
    if (!others.length) return;
    // find nearest neighbor
    const ar = a.getBoundingClientRect();
    let best = null, bestD = Infinity;
    for (const o of others) {
      const or = o.getBoundingClientRect();
      const dx = (or.left + or.width/2) - (ar.left + ar.width/2);
      const dy = (or.top + or.height/2) - (ar.top + ar.height/2);
      const d = Math.hypot(dx, dy);
      if (d < bestD) { bestD = d; best = o; }
    }
    if (best && bestD < 220) {
      // face each other
      const ax = ar.left + ar.width/2;
      const bx = best.getBoundingClientRect().left + best.getBoundingClientRect().width/2;
      a.classList.toggle('flip-x', bx < ax);
      best.classList.toggle('flip-x', ax < bx);
      sayBriefly(a, pick(CHATS), 1300);
      setTimeout(() => sayBriefly(best, pick(CHATS), 1200), 600);
      a.classList.add('act-wave');
      setTimeout(() => a.classList.remove('act-wave'), 1400);
      setTimeout(() => {
        best.classList.add('act-wave');
        setTimeout(() => best.classList.remove('act-wave'), 1200);
      }, 700);
    }
  }, 3200);

  /* =================== Public API =================== */
  window.__pg = {
    config,
    respawn() { populate(); },
    clearYard() {
      // boot residents back into the wild
      const all = allResidents();
      all.forEach(el => {
        stopYardBehavior(el);
        el.classList.remove('playground','act-walk','act-jump','act-wave','act-dance','flip-x');
        el.style.transition = '';
        delete el.dataset.yardId;
        const top = (parseFloat(el.style.top) / window.innerHeight) * 100;
        el.style.top = Math.max(5, Math.min(50, top)) + 'vh';
        el.style.left = '0';
        const m = pick(['drift','tumble','bounce']);
        const dur = rand(MOTIONS[m].duration[0], MOTIONS[m].duration[1]) / Math.max(0.4, config.chaos);
        el.style.animation = `${m} ${dur}s linear 0s infinite`;
        wanderers.push(el);
      });
      yards.forEach(y => { y.residents = []; updateYardLabel(y); });
      // Drop all yards except the first
      [...yards].slice(1).forEach(y => destroyYard(y));
      rebalanceYardHeights();
    },
    giveAllLimbs(want) {
      [...wanderers, ...allResidents()].forEach(el => ensureLimbs(el, want || el.classList.contains('playground')));
    },
    setInkColor(hex) {
      document.documentElement.style.setProperty('--ink', hex);
    },
    setChaos(v) {
      config.chaos = v;
      // Update existing wanderer speeds (don't fully respawn — feels jarring)
      wanderers.forEach(el => {
        const m = el.dataset.motion;
        if (!m) return;
        const dur = rand(MOTIONS[m].duration[0], MOTIONS[m].duration[1]) / Math.max(0.4, v);
        el.style.animation = `${m} ${dur}s linear ${(-rand(0,dur)).toFixed(2)}s infinite`;
      });
    },
    allResidents,
    yards
  };

  // Create the first yard, then populate the wild
  createYard();
  populate();

  // Re-snap residents on viewport resize
  window.addEventListener('resize', () => {
    requestAnimationFrame(() => yards.forEach(y => snapResidentsToGround(y)));
  });
})();
</script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "chaos": 1,
  "autoLimbs": false,
  "inkColor": "#6a2b24",
  "faces": [
    "happy",
    "wink",
    "surprised",
    "smug",
    "laugh",
    "tongue",
    "meh",
    "sleepy",
    "shy",
    "angry",

  ]
}/*EDITMODE-END*/;

const ALL_FACE_KEYS = ["happy","grin","wink","surprised","smug","laugh","cool","tongue","meh","sleepy","shy","angry"];

function FaceChip({ faceKey, on, onToggle }) {
  return (
    <button
      type="button"
      onClick={onToggle}
      title={faceKey}
      style={{
        appearance: 'none',
        border: on ? '1.5px solid rgba(41,38,27,.7)' : '1px dashed rgba(41,38,27,.25)',
        background: on ? 'rgba(255,255,255,.85)' : 'rgba(255,255,255,.3)',
        opacity: on ? 1 : 0.45,
        borderRadius: 8, padding: 2, width: 38, height: 38,
        cursor: 'default', transition: 'all .15s'
      }}
    >
      <svg viewBox="0 0 100 100" style={{ width: '100%', height: '100%' }}>
        <use href={`#f-${faceKey}`} />
      </svg>
    </button>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks to live config
  React.useEffect(() => {
    if (!window.__pg) return;
    window.__pg.config.faceFilter = t.faces;
    window.__pg.config.autoLimbs = t.autoLimbs;
    window.__pg.setInkColor(t.inkColor);
  }, [t.faces, t.autoLimbs, t.inkColor]);

  React.useEffect(() => {
    if (!window.__pg) return;
    window.__pg.setChaos(t.chaos);
  }, [t.chaos]);

  React.useEffect(() => {
    if (!window.__pg) return;
    window.__pg.giveAllLimbs(t.autoLimbs);
  }, [t.autoLimbs]);

  const toggleFace = (key) => {
    const set = new Set(t.faces);
    if (set.has(key)) set.delete(key); else set.add(key);
    setTweak('faces', Array.from(set));
  };

  return (
    <TweaksPanel title="Playground tweaks">
      <TweakSection label="Chaos">
        <TweakSlider
          label="Energy"
          value={Number(t.chaos.toFixed(2))}
          min={0.2} max={2.5} step={0.05}
          onChange={(v) => setTweak('chaos', v)}
        />
        <div style={{ fontSize: 10.5, color: 'rgba(41,38,27,.55)', marginTop: -2 }}>
          spawn count + roll speed
        </div>
      </TweakSection>

      <TweakSection label="Limbs">
        <TweakToggle
          label="All smileys grow arms & legs"
          value={t.autoLimbs}
          onChange={(v) => setTweak('autoLimbs', v)}
        />
        <div style={{ fontSize: 10.5, color: 'rgba(41,38,27,.55)' }}>
          dropping one in the yard always gives it limbs
        </div>
      </TweakSection>

      <TweakSection label="Ink">
        <TweakColor
          label="Pen color"
          value={t.inkColor}
          onChange={(v) => setTweak('inkColor', v)}
        />
      </TweakSection>

      <TweakSection label="Cast">
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(6, 1fr)',
          gap: 4, marginTop: 2
        }}>
          {ALL_FACE_KEYS.map(k => (
            <FaceChip key={k} faceKey={k}
              on={t.faces.includes(k)}
              onToggle={() => toggleFace(k)} />
          ))}
        </div>
        <div style={{ fontSize: 10.5, color: 'rgba(41,38,27,.55)', marginTop: 4 }}>
          tap to mute a face
        </div>
      </TweakSection>

      <TweakSection label="">
        <div style={{ display: 'flex', gap: 6 }}>
          <TweakButton label="Respawn" onClick={() => window.__pg && window.__pg.respawn()} />
          <TweakButton label="Empty yard" onClick={() => window.__pg && window.__pg.clearYard()} secondary />
        </div>
      </TweakSection>
    </TweaksPanel>
  );
}

const root = ReactDOM.createRoot(document.getElementById('tweaks-root'));
root.render(<App />);
</script>

(function () {

  // Ordered to match the narration: homes first, then wells/farms/forges, then military

  // Weapon classes — the WEST fields a MODERN army (guns, rockets, steel),

    { key:'commando',  icon:'w-knife',  hp: 130, dmg: 22, range: 70,  name:'Commando',     crit: 0.20, critDmg: 1.8 },  // knife rush

    // Glass cannons of the old arts — lower hp than western steel, but the

    { key:'flying',    icon:'w-wings',  hp: 95,  dmg: 22, range: 380, name:'Flyer',        crit: 0.18, critDmg: 1.8 },

    { key:'spear',     icon:'w-spear',  hp: 110, dmg: 30, range: 320, name:'Lancer',       crit: 0.16, critDmg: 1.8 },
    { key:'samurai',   icon:'w-katana', hp: 135, dmg: 33, range: 70,  name:'Samurai',      crit: 0.25, critDmg: 2.1 },
    { key:'healer',    icon:'w-heart',  hp: 105, dmg: 14, range: 220, name:'Cleric',       crit: 0.08, critDmg: 1.6 },
    { key:'frostmage', icon:'w-frost',  hp: 85,  dmg: 28, range: 320, name:'Frost Mage',   crit: 0.13, critDmg: 1.9 },  // chills → SLOW
    { key:'pyromancer',icon:'w-flame',  hp: 85,  dmg: 29, range: 320, name:'Pyromancer',   crit: 0.15, critDmg: 1.9 },  // ignites → BURN
    { key:'giant',     icon:'w-fist',   hp: 250, dmg: 38, range: 90,  name:'Giant', scale: 1.6, crit: 0.12, critDmg: 2.1 },
    { key:'oni',       icon:'w-club',   hp: 290, dmg: 27, range: 80,  name:'Oni Guardian', scale: 1.45, crit: 0.10, critDmg: 1.8 },  // the east's immovable wall
  ];
  const ALL_CLASSES = [...WEST_CLASSES, ...EAST_CLASSES];
  const SIDE_CLASSES = side => side === 'left' ? WEST_CLASSES : EAST_CLASSES;

  const saga    = document.getElementById('saga');
  const buildL  = document.getElementById('build-layer');
  const fxL     = document.getElementById('fx-layer');
  const wallG   = document.getElementById('great-wall');
  const wallStones = document.getElementById('wall-stones');
  const wallCracks = document.getElementById('wall-cracks');
  const card    = document.getElementById('chapter-card');
  const chNum   = document.getElementById('ch-num');
  const chName  = document.getElementById('ch-name');
  const chSub   = document.getElementById('ch-sub');
  const clock   = document.getElementById('saga-clock');
  const clockBig= document.getElementById('clock-big');
  const clockSub= document.getElementById('clock-sub');
  const sagaBanner = document.getElementById('saga-banner');
  const bannerTitle = document.getElementById('banner-title');
  const bannerSub = document.getElementById('banner-sub');
  const bL = document.getElementById('banner-left');
  const bR = document.getElementById('banner-right');
  const sagaMsg = document.getElementById('saga-message');
  const choiceRow = document.getElementById('choice-row');
  const flash = document.getElementById('flash');
  const subtitleBar = document.getElementById('subtitle-bar');
  const subtitleText = document.getElementById('subtitle-text');
  const subtitleSpeaker = document.getElementById('subtitle-speaker');
  const curtain = document.getElementById('curtain');
  const curtainNum = document.getElementById('curtain-num');
  const curtainName = document.getElementById('curtain-name');
  const curtainSub = document.getElementById('curtain-sub');

  let state = 'playground'; // playground | ch2 | ch3 | ch4 | done
  let leftTribe = [];   // array of {el, hp, maxHp, cls, x, y, alive, side}
  let rightTribe = [];
  let timers = [];
  let ch2Done = false, ch3Done = false;
  let combatPaused = false;
  let killCount = 0;
  let cutscenesPlayed = { charge: false, clash: false };

  function clearTimers() { timers.forEach(t => clearTimeout(t) || clearInterval(t)); timers = []; }
  function later(fn, ms) { const t = setTimeout(fn, ms); timers.push(t); return t; }
  function rep(fn, ms)   { const t = setInterval(fn, ms); timers.push(t); return t; }
  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

  function showCard(num, name, sub, dur=2400) {
    chNum.textContent = num;
    chName.textContent = name;
    chSub.textContent = sub;
    card.classList.add('show');
    if (window.__sfx) window.__sfx.chapterWhoosh();
    later(() => card.classList.remove('show'), dur);
  }

  function showMsg(text, sub='') {
    sagaMsg.innerHTML = text + (sub ? `<div class="small">${sub}</div>` : '');
    sagaMsg.classList.add('show');
  }
  function hideMsg() { sagaMsg.classList.remove('show'); }

  function flashScreen() {
    flash.classList.add('go');
    later(() => flash.classList.remove('go'), 120);
  }

  // Brief shake — for wall cracks (no white flash)
  function shakeBurst() {
    saga.classList.add('crack-shake');
    later(() => saga.classList.remove('crack-shake'), 600);
  }

  /* ── ANIME BATTLE DYNAMICS ──────────────────────────────────
     hitstop freeze-frames, dash afterimages, impact stars,
     slash smears, cast rings. The grammar of a good anime hit:
     anticipation → burst → FREEZE → consequence. */
  let hitstopUntil = 0;
  function hitstop(ms) {
    hitstopUntil = Math.max(hitstopUntil, performance.now() + ms);
    saga.classList.add('hitstop');
    setTimeout(() => {
      if (performance.now() >= hitstopUntil - 8) saga.classList.remove('hitstop');
    }, ms + 12);
  }

  function spikePts(n, rO, rI) {
    const p = [];
    for (let i = 0; i < n * 2; i++) {
      const r = i % 2 === 0 ? rO : rI;
      const a = (i / (n * 2)) * Math.PI * 2 - Math.PI / 2;
      p.push((Math.cos(a) * r).toFixed(1) + ',' + (Math.sin(a) * r).toFixed(1));
    }
    return p.join(' ');
  }

  // Spiky manga impact star that pops at the point of contact
  function spawnImpactStar(x, y, size) {
    const d = document.createElement('div');
    d.className = 'hit-star';
    d.style.left = (x - size / 2) + 'px';
    d.style.top  = (y - size / 2) + 'px';
    d.style.width = size + 'px'; d.style.height = size + 'px';
    d.innerHTML = `<svg viewBox="-60 -60 120 120">
      <polygon points="${spikePts(9, 56, 20)}" fill="#fff6dd" stroke="#3a2218" stroke-width="4"/>
      <polygon points="${spikePts(9, 30, 12)}" fill="none" stroke="#3a2218" stroke-width="2"/>
    </svg>`;
    d.style.transform = 'scale(.25) rotate(0deg)';
    d.style.opacity = '0';
    d.style.transition = 'transform .12s cubic-bezier(.2,1.4,.4,1), opacity .08s';
    fxL.appendChild(d);
    requestAnimationFrame(() => { d.style.transform = 'scale(1) rotate(10deg)'; d.style.opacity = '1'; });
    setTimeout(() => {
      d.style.transition = 'transform .14s ease-in, opacity .14s';
      d.style.transform = 'scale(1.3) rotate(16deg)';
      d.style.opacity = '0';
    }, 130);
    setTimeout(() => d.remove(), 300);
  }

  // Crescent slash smear — the arc a blade rips through the air
  function spawnSlashSmear(x, y, angleDeg) {
    const size = rand(90, 130);
    const d = document.createElement('div');
    d.className = 'slash-smear';

  // One afterimage ghost at the fighter's CURRENT visual position
  function spawnAfterimage(s) {
    if (!s || !s.el || !s.el.isConnected) return;

  // Trail of afterimages sampled over `span` ms while a dash tween runs

  // ---- SUBTITLES + NARRATION ----

    wizard: 'A Wizard',
    samurai: 'A Samurai',
    healer: 'A Healer',

  let subtitleHideTimer = null;
  let subtitlesEnabled = true;
  try { subtitlesEnabled = localStorage.getItem('wos-subtitles') !== 'off'; } catch (e) {}
  function showSubtitle(text, profileKey, opts) {
    if (!text) {
      subtitleBar.classList.remove('show');
      return;
    }
    if (!subtitlesEnabled) { subtitleBar.classList.remove('show'); return; }
    subtitleText.textContent = text;
    subtitleSpeaker.textContent = (opts && opts.speakerLabel) || SPEAKER_LABELS[profileKey] || '';
    subtitleBar.classList.add('show');
    if (subtitleHideTimer) clearTimeout(subtitleHideTimer);
    // The narrator's own onend hides the line exactly when speech stops (see
    // sounds.js → subtitleCb(null)). This timer is only a generous safety net so a
    // caption is never orphaned if onend never fires — it must outlast the slow
    // narrator voice, so captions never vanish before the line is finished.
    const dur = Math.max(8000, 130 * text.length);
    subtitleHideTimer = setTimeout(() => subtitleBar.classList.remove('show'), dur);
  }
  // Wire up to sounds.js subtitle callback
  if (window.__sfx && window.__sfx.setSubtitleCallback) {
    window.__sfx.setSubtitleCallback((text, profileKey, opts) => showSubtitle(text, profileKey, opts));
  }

  // Convenience: speak + show subtitle. Captioned, since this is story narration.
  // `speakerLabel` overrides the caption attribution (e.g. 'An East Smiley').
  // `onDone` fires when the line has been fully SPOKEN — use it to chain scene
  // beats so the visuals never outrun the storytelling.
  function narrate(text, profileKey='narrator', speakerLabel, onDone) {
    if (window.__sfx) window.__sfx.speak(text, profileKey, { caption: true, speakerLabel, onDone });
    else {
      showSubtitle(text, profileKey, { speakerLabel });
      if (onDone) setTimeout(onDone, Math.max(1900, text.length * 48));
    }
  }

  // ---- CURTAIN TRANSITIONS ----
  // Drops the curtain (whoosh + boom), holds with the title, lifts with a
  // rising sweep — and only THEN does the narrator begin speaking, so the
  // transition sound and the voice never fight each other.
  function curtainTransition({ num, name, sub, narration, profile='narrator', speaker, holdMs=3600, onMid, onNarrated }) {
    // Drop
    curtainNum.textContent = num || '';
    curtainName.textContent = name || '';
    curtainSub.textContent = sub || '';
    curtain.classList.remove('exit');
    curtain.classList.add('show');
    if (window.__sfx) (window.__sfx.curtainDrop || window.__sfx.chapterWhoosh)();
    later(() => { if (onMid) onMid(); }, 700);
    // Lift — with its own transition whoosh
    later(() => {
      curtain.classList.add('exit');
      if (window.__sfx && window.__sfx.curtainLift) window.__sfx.curtainLift();
    }, holdMs);
    later(() => {
      curtain.classList.remove('show');
      curtain.classList.remove('exit');
      // Narration starts only after the transition has fully cleared
      if (narration) narrate(narration, profile, speaker, onNarrated);
      else if (onNarrated) onNarrated();
    }, holdMs + 1100);
  }

  // Convert a viewport y to a "ground" y for placement
  function groundY() { return window.innerHeight * 0.85; }

  function makeWorldSmiley(faceKey, side, opts={}) {
    const el = document.createElement('div');

        <svg class="limbs" viewBox="0 0 100 100" style="position:absolute; inset:0; overflow:visible;"><use href="#limbs" /></svg>
      </div>

    if (side === 'left') el.classList.add('flip-x');
    el.style.left = (opts.x || 0) + 'px';
    el.style.top  = (opts.y || groundY() - size) + 'px';
    el.querySelector('.hpbar').style.display = 'none';
    fxL.appendChild(el);
    return el;
  }

  // ── Dust / debris puff at a screen point ──
  function spawnDust(x, y, opts={}) {
    const layer = opts.layer || fxL;

  // ── Wall crack state + a single impactful crack "jolt" ──
  let crackPaths = [], crackLens = [], crackTotal = 0;
  function crackJolt(level) {
    // hard shake of the wall itself + a screen-shake burst
    wallG.classList.remove('jolt','jolt-hard'); void wallG.offsetWidth;
    wallG.classList.add(level >= 0.7 ? 'jolt-hard' : 'jolt');
    shakeBurst();
    // the cracks glow briefly as they split
    crackPaths.forEach(p => p.classList.add('flash-on'));
    setTimeout(() => crackPaths.forEach(p => p.classList.remove('flash-on')), 220);
    // dust + debris jetting from the fracture
    const r = wallG.getBoundingClientRect();
    const n = 3 + Math.floor(level * 7);
    for (let i = 0; i < n; i++) {
      spawnDust(r.left + rand(-6, r.width + 6), r.top + rand(0, r.height), {
        dark: true, size: rand(16, 18 + level*40), dx: rand(-50, 50), dy: rand(6, 50 + level*40)
      });
    }
    if (window.__sfx) window.__sfx.crackHit(level);
  }

  function buildWall() {
    wallStones.innerHTML = '';
    wallCracks.innerHTML = '';
    // 8 stones stacked
    for (let i = 0; i < 8; i++) {
      const y = i * 50;
      const stagger = i % 2 === 0 ? 0 : 6;
      const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
      r.setAttribute('class', 'wall-stone');
      r.setAttribute('x', stagger);
      r.setAttribute('y', y);
      r.setAttribute('width', 60 - stagger * 2);
      r.setAttribute('height', 50);
      r.dataset.idx = i;
      wallStones.appendChild(r);
    }
    // Jagged, branching cracks (a forking fault line, not smooth curves)
    const cracks = [
      'M 30 4 L 26 40 L 35 72 L 23 112 L 33 152 L 21 196 L 32 240 L 19 286 L 31 330 L 25 378 L 30 398',
      'M 35 72 L 14 96 L 7 128',
      'M 33 152 L 51 180 L 57 212',
      'M 32 240 L 15 268 L 9 302',
      'M 31 330 L 49 356 L 55 388',
      'M 23 112 L 9 132'
    ];
    crackPaths = []; crackLens = []; crackTotal = 0;
    cracks.forEach((d, i) => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d', d);
      p.setAttribute('class', 'crack');
      p.setAttribute('stroke-width', i === 0 ? 3.2 : 2.2);
      wallCracks.appendChild(p);
      const len = p.getTotalLength ? p.getTotalLength() : 220;
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      crackPaths.push(p); crackLens.push(len); crackTotal += len;
    });
  }

  function setCrackProgress(p) {
    // Reveal cracks cumulatively along their real lengths (spine first, then
    // branches) so the fracture spreads as a connected network.
    if (!crackPaths.length) return;
    let reveal = Math.max(0, Math.min(1, p)) * crackTotal;
    for (let i = 0; i < crackPaths.length; i++) {
      const len = crackLens[i];
      const shown = Math.max(0, Math.min(len, reveal));
      crackPaths[i].style.strokeDashoffset = (len - shown);
      reveal -= len;
    }
  }

  function fellWall() {
    // A final, decisive fracture before it goes — full crack network + dust burst
    setCrackProgress(1);
    crackJolt(1);
    if (window.__sfx) window.__sfx.wallCollapse();
    const r = wallG.getBoundingClientRect();
    for (let i = 0; i < 22; i++) {
      setTimeout(() => spawnDust(r.left + rand(-10, r.width + 10), r.top + rand(0, r.height), {
        dark: true, size: rand(24, 70), dx: rand(-70, 70), dy: rand(20, 90)
      }), i * 45);
    }
    // Animate each stone falling with a varied delay & rotation
    const stones = wallStones.querySelectorAll('rect');
    stones.forEach((s, i) => {
      const r = (Math.random() - 0.5) * 90;
      const dx = (Math.random() - 0.5) * 60;
      const dy = (8 - i) * 50 + Math.random() * 80;
      s.classList.add('wall-piece');
      s.style.setProperty('--r', r + 'deg');
      s.style.transitionDelay = (i * 90) + 'ms';
      s.style.animationDelay = (i * 90) + 'ms';
      // Custom transform via inline animation
      s.style.transform = `translate(${dx}px, ${dy}px) rotate(${r}deg)`;
      s.style.transition = `transform 1.1s cubic-bezier(.5,.05,.7,1) ${i*90}ms, opacity 1.1s linear ${i*90}ms`;
      s.style.opacity = '0.1';
    });
    later(() => { wallG.style.opacity = '0'; }, 1300);
  }

  /* ==================== CHAPTER 2 — BUILD ==================== */
  // Build-phase state — the day clock is driven BY the narration (see
  // _runBuildStory): days glide toward each beat's day while its line is
  // spoken, so story and visuals can never drift apart.
  let build = null;

  function startChapter2() {
    if (state !== 'playground') return;
    state = 'ch2';
    document.body.classList.add('saga-active');
    saga.classList.add('on');
    if (window.__sfx) { window.__sfx.stopMusic(); } // fade out playground theme
    if (window.__applySmileyMute) window.__applySmileyMute(); // saga silences smiley chatter

    // Opening curtain — the stage is built behind it (onMid); the story beats
    // begin only once the opening line has been fully spoken (onNarrated).
    curtainTransition({
      num: 'CHAPTER TWO',
      name: 'Build day',
      sub: 'two yards full · the smileys go forth, divided',
      narration: 'Once, all the smileys lived together in a single garden. But the garden grew crowded. Two yards filled. Then a third.',
      profile: 'narrator',
      holdMs: 3600,
      onMid: () => _setupChapter2Stage(),
      onNarrated: () => _runBuildStory(0)
    });
  }

  function _setupChapter2Stage() {
    // Idempotent per run — a skip racing the chapter-2 curtain must never
    // build a second generation of tribes (stale HUD / ghost-army bug)
    if (leftTribe.length || rightTribe.length) return;
    const left = [];
    const right = [];
    const allRes = (window.__pg && window.__pg.allResidents && window.__pg.allResidents()) || [];
    const pool = allRes.length ? allRes : [];
    pool.forEach((el, i) => {
      const faceKey = (el.dataset.face || 'f-happy').replace('f-','');
      (i % 2 === 0 ? left : right).push(faceKey);
    });
    while (left.length  < 12) left.push(pick(FACE_KEYS));
    while (right.length < 12) right.push(pick(FACE_KEYS));

    fxL.innerHTML = '';
    leftTribe = [];
    rightTribe = [];

    const W = window.innerWidth;
    const H = window.innerHeight;
    const groundLineY = H * 0.85;

    // Pre-assign character classes so they develop their identities during
    // build. West drills a MODERN arsenal; east studies the FANTASY arts.
    const westPool = [...WEST_CLASSES, ...WEST_CLASSES].sort(() => Math.random() - 0.5);
    const eastPool = [...EAST_CLASSES, EAST_CLASSES[1], EAST_CLASSES[3], EAST_CLASSES[8]].sort(() => Math.random() - 0.5); // oni ×2 guaranteed — the east holds its line

    left.slice(0, 12).forEach((fk, i) => {
      const x = rand(W * 0.05, W * 0.36);
      const sz = rand(48, 60);
      const el = makeWorldSmiley(fk, 'left',  { x, y: groundLineY - sz, size: sz });
      el.classList.add('builder');
      el.style.setProperty('--ink', TRIBE_COLORS.left);
      const s = { el, faceKey: fk, side: 'left', alive: true, x, y: groundLineY - sz, baseY: groundLineY - sz, size: sz, plannedClass: westPool[i % westPool.length], cooldown: 0, vx: 0, vy: 0 };
      leftTribe.push(s);
    });
    right.slice(0, 12).forEach((fk, i) => {
      const x = rand(W * 0.64, W * 0.95);
      const sz = rand(48, 60);
      const el = makeWorldSmiley(fk, 'right', { x, y: groundLineY - sz, size: sz });
      el.classList.add('builder');
      el.style.setProperty('--ink', TRIBE_COLORS.right);
      const s = { el, faceKey: fk, side: 'right', alive: true, x, y: groundLineY - sz, baseY: groundLineY - sz, size: sz, plannedClass: eastPool[i % eastPool.length], cooldown: 0, vx: 0, vy: 0 };
      rightTribe.push(s);
    });

    // The wall starts LOW — it grows taller only when the story says it does
    wallG.style.opacity = '1';
    wallG.style.transition = 'opacity 0.6s ease, height 5s ease-in-out';
    wallG.style.height = '22%';
    buildWall();
    setCrackProgress(0);

    bL.innerHTML = 'The West Tribe<small>builders & dreamers</small>';
    bR.innerHTML = 'The East Tribe<small>makers & wanderers</small>';
    saga.classList.add('tribe-tinted');

    // Build-up tension theme — steady, rising, determined
    if (window.__sfx) {
      window.__sfx.startMusic('build', { volume: 0.4 });
    }

    clock.style.display = 'block';
    sagaBanner.style.display = 'block';
    bannerTitle.textContent = 'Chapter II · The Building';
    bannerSub.textContent = 'three months. forge your warriors.';

    // Narration-driven day clock — days GLIDE toward the current beat's day
    // while the narrator speaks, slowing down whenever the story needs time.
    build = {
      day: 1, targetDay: 4, rate: 0.4,   // gentle drift during the opening line
      planL: planBuilds('left'), planR: planBuilds('right'),
      placedL: 0, placedR: 0, shownDay: 0,
      lastT: performance.now(), chatterIdx: 0
    };
    rep(() => {
      if (state !== 'ch2' || !build) return;
      const nowT = performance.now();
      const dt = Math.min(0.25, (nowT - build.lastT) / 1000);
      build.lastT = nowT;
      if (build.day < build.targetDay) {
        build.day = Math.min(build.targetDay, build.day + build.rate * dt);
      }
      const d = Math.floor(build.day);
      if (d !== build.shownDay) {
        build.shownDay = d;
        clockBig.textContent = `Day ${d}`;
        clockSub.textContent = 'of 90';
      }
    }, 80);

    // Random builder chatter — bubbles only, no TTS (narrator carries the story)
    rep(() => {
      if (!build || Math.random() >= 0.5) return;
      const s = pick(leftTribe.concat(rightTribe));
      if (s && s.alive && !s.lying) sayBubble(s, BUILDER_LINES[build.chatterIdx++ % BUILDER_LINES.length]);
    }, 1900);

    const BUILDER_LINES = [
      'lift it up','more bricks','over here','heavy','one more','almost done','perfect','keep going',
      'i got it','look out','phew','yes!','hammer time','build build build','high five'
    ];

    // Daily village life — each smiley keeps its own unhurried schedule:
    // stroll somewhere, stand a while, stop for a chat, lie down in the sun
    rep(() => {
      const nowT = performance.now();
      [...leftTribe, ...rightTribe].forEach(s => {
        if (!s.alive || s.busy || s.looking || s.lying) return;
        if (s.actUntil == null) { s.actUntil = nowT + rand(200, 3200); return; } // staggered starts
        if (nowT < s.actUntil) return;
        builderLife(s);
      });
    }, 600);
  }

  // ── Narrative beats for the build phase ──
  // Each line, as it is SPOKEN, glides the clock to `day` and raises `structs`
  // structures per side in rhythm with the words. `onStart` fires as the line
  // begins; the next beat waits for this line to finish. Days slow down
  // automatically when the narrator needs more time.
  const BUILD_BEATS = [
    { day: 14, structs: 1, text: 'And so they parted. The west smileys went one way. The east smileys, the other.' },
    { day: 22, structs: 3, text: 'They built huts of wood and walls of stone.',
      onStart: () => growWall('40%') },
    { day: 30, structs: 6, text: 'They dug wells. They tilled farms. They made forges.' },
    { day: 40, structs: 8, text: 'And the wall between them grew tall. Both sides agreed: this is where we end, and you begin.',
      onStart: () => growWall('56%') },
    { day: 50, structs: 9, text: 'Each smiley discovered a gift. Some learned magic. Some forged blades. Some grew wings.',
      onStart: () => beginTraining() },
    { day: 60, text: 'But on the East side, the harvest failed. Their well ran dry.',
      onStart: () => eastHardship() },
    { day: 68, text: 'On the West side, the granaries overflowed. The forges glowed bright.' },
    { day: 76, text: 'The East smileys looked over the wall. They saw the abundance. They saw the iron.',
      onStart: () => eastLooksOver() },
    { day: 82, text: 'Whispers became plans. Plans became hunger. Hunger became fury.' },
    { day: 87, text: 'The wall began to crack. And no smiley could remember why they had built it.',
      onStart: () => later(() => { if (state === 'ch2') { setCrackProgress(0.16); crackJolt(0.35); } }, 700) }
  ];

  function growWall(h) {
    wallG.style.height = h;
    if (window.__sfx) window.__sfx.stoneSet();
